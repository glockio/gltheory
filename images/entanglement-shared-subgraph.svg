<!-- DESCRIPTION: Three panels. Panel 1 "THEY INTERACT": two nodes (A and B) close together, both connected to a shared subgraph node (SH) below them. Label: "Shared value subgraph forms." Panel 2 "THEY SEPARATE": A and B moved far apart on the graph (many position-edge hops between them), but both still connected to (SH) via value edges. Position distance shown as a long gray dashed path. Value connection shown as direct solid orange lines to SH. Label: "Position edges rewired. Value subgraph unchanged. SH is still shared." Panel 3 "ONE IS MEASURED": consumer demands A's value. A evaluates → SH evaluates → commits result R. B then evaluates → SH already committed to R → B returns correlated result. Label: "SH evaluates once. Both read same committed result." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- PANEL 1: THEY INTERACT -->
  <rect x="10" y="10" width="270" height="280" rx="6" fill="none" stroke="#a8dadc" stroke-width="1"/>
  <text x="145" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="700">1. THEY INTERACT</text>

  <!-- Node A -->
  <circle cx="110" cy="80" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="110" y="85" text-anchor="middle" font-size="11" fill="white" font-weight="700">A</text>

  <!-- Node B (close to A) -->
  <circle cx="180" cy="80" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="180" y="85" text-anchor="middle" font-size="11" fill="white" font-weight="700">B</text>

  <!-- Position edge between A and B (close) -->
  <line x1="124" y1="80" x2="166" y2="80" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="145" y="73" text-anchor="middle" font-size="7" fill="#7a7a6a">pos</text>

  <!-- Shared subgraph node SH below -->
  <circle cx="145" cy="160" r="16" fill="#d35400" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="145" y="164" text-anchor="middle" font-size="9" fill="white" font-weight="700">SH</text>

  <!-- Value edges from A and B to SH -->
  <line x1="110" y1="94" x2="138" y2="145" stroke="#d35400" stroke-width="2"/>
  <line x1="180" y1="94" x2="152" y2="145" stroke="#d35400" stroke-width="2"/>

  <!-- Small label on edges -->
  <text x="108" y="125" font-size="7" fill="#d35400">val</text>
  <text x="170" y="125" font-size="7" fill="#d35400">val</text>

  <!-- Label -->
  <text x="145" y="210" text-anchor="middle" font-size="10" fill="#1a1a2e">Shared value subgraph</text>
  <text x="145" y="225" text-anchor="middle" font-size="10" fill="#1a1a2e">forms.</text>

  <!-- PANEL 2: THEY SEPARATE -->
  <rect x="300" y="10" width="290" height="280" rx="6" fill="none" stroke="#a8dadc" stroke-width="1"/>
  <text x="445" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="700">2. THEY SEPARATE</text>

  <!-- Node A (far left) -->
  <circle cx="335" cy="70" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="335" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="700">A</text>

  <!-- Node B (far right) -->
  <circle cx="555" cy="70" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="555" y="75" text-anchor="middle" font-size="11" fill="white" font-weight="700">B</text>

  <!-- Long dashed position path between A and B (many hops) -->
  <path d="M 349,70 L 370,70 L 390,70 L 410,70 L 430,70 L 450,70 L 470,70 L 490,70 L 510,70 L 530,70 L 541,70"
        fill="none" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  <!-- Small intermediate position nodes -->
  <circle cx="370" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="390" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="410" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="430" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="450" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="470" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="490" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="510" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="530" cy="70" r="2.5" fill="#7a7a6a" opacity="0.4"/>
  <text x="445" y="60" text-anchor="middle" font-size="7" fill="#7a7a6a">many position hops</text>

  <!-- Shared subgraph node SH (center below) -->
  <circle cx="445" cy="170" r="16" fill="#d35400" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="445" y="174" text-anchor="middle" font-size="9" fill="white" font-weight="700">SH</text>

  <!-- Value edges from A and B to SH (solid orange, direct) -->
  <line x1="335" y1="84" x2="432" y2="158" stroke="#d35400" stroke-width="2.5"/>
  <line x1="555" y1="84" x2="458" y2="158" stroke="#d35400" stroke-width="2.5"/>

  <text x="370" y="130" font-size="8" fill="#d35400" font-weight="600">val</text>
  <text x="510" y="130" font-size="8" fill="#d35400" font-weight="600">val</text>

  <!-- Labels -->
  <text x="445" y="210" text-anchor="middle" font-size="9" fill="#1a1a2e">Position edges rewired.</text>
  <text x="445" y="224" text-anchor="middle" font-size="9" fill="#1a1a2e">Value subgraph unchanged.</text>
  <text x="445" y="240" text-anchor="middle" font-size="10" fill="#d35400" font-weight="600">SH is still shared.</text>

  <!-- PANEL 3: ONE IS MEASURED -->
  <rect x="610" y="10" width="280" height="280" rx="6" fill="none" stroke="#a8dadc" stroke-width="1"/>
  <text x="750" y="32" text-anchor="middle" font-size="12" fill="#1a1a2e" font-weight="700">3. ONE IS MEASURED</text>

  <!-- Consumer arrow -->
  <text x="640" y="60" font-size="8" fill="#7a7a6a">consumer</text>
  <path d="M 650,64 L 670,78" fill="none" stroke="#7a7a6a" stroke-width="1.2"/>
  <polygon points="668,76 674,80 666,82" fill="#7a7a6a"/>

  <!-- Node A (measured) -->
  <circle cx="680" cy="90" r="14" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="680" y="95" text-anchor="middle" font-size="11" fill="white" font-weight="700">A</text>

  <!-- Node B -->
  <circle cx="820" cy="90" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="820" y="95" text-anchor="middle" font-size="11" fill="white" font-weight="700">B</text>

  <!-- SH node (committed, now green) -->
  <circle cx="750" cy="170" r="16" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="750" y="174" text-anchor="middle" font-size="9" fill="white" font-weight="700">SH</text>

  <!-- Result R next to SH -->
  <rect x="774" y="160" width="24" height="20" rx="3" fill="#1e8449" opacity="0.2" stroke="#1e8449" stroke-width="1"/>
  <text x="786" y="174" text-anchor="middle" font-size="9" fill="#1e8449" font-weight="700">R</text>

  <!-- Evaluation flow arrows: A -> SH -> R -->
  <line x1="680" y1="104" x2="742" y2="156" stroke="#1e8449" stroke-width="2"/>
  <text x="695" y="138" font-size="7" fill="#1e8449">eval</text>

  <!-- B reads SH (already committed) -->
  <line x1="820" y1="104" x2="758" y2="156" stroke="#d35400" stroke-width="2"/>
  <text x="800" y="138" font-size="7" fill="#d35400">reads R</text>

  <!-- "committed" label -->
  <text x="750" y="200" text-anchor="middle" font-size="8" fill="#1e8449" font-weight="600">committed</text>

  <!-- Correlated result indicator on B -->
  <text x="845" y="88" font-size="8" fill="#1e8449" font-weight="600">correlated</text>
  <text x="845" y="98" font-size="8" fill="#1e8449" font-weight="600">result</text>

  <!-- Labels -->
  <text x="750" y="228" text-anchor="middle" font-size="9" fill="#1a1a2e">SH evaluates once.</text>
  <text x="750" y="244" text-anchor="middle" font-size="9" fill="#1a1a2e">Both read same</text>
  <text x="750" y="260" text-anchor="middle" font-size="10" fill="#1a1a2e" font-weight="600">committed result.</text>
</svg>
