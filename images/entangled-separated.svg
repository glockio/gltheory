<!-- DESCRIPTION: Wide figure. A on far left, B on far right. Long dashed gray position path between them (many hops). Both have direct orange value edges going to shared node SH (center-bottom). Two edge types labeled: "POSITION EDGES (gray, dashed) — rewired when particles move" and "VALUE EDGE (orange, solid) — unchanged by movement." Shared node is purple/pending. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- Background -->
  <rect width="900" height="300" fill="#faf8f3" rx="4"/>

  <!-- Position path (gray dashed) — many hops across the top -->
  <!-- Intermediate hop nodes -->
  <circle cx="160" cy="75" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="240" cy="65" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="320" cy="72" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="400" cy="62" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="480" cy="70" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="560" cy="65" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="640" cy="72" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>
  <circle cx="720" cy="68" r="8" fill="#f5f2eb" stroke="#999" stroke-width="1.5"/>

  <!-- Position edges (gray dashed hops) -->
  <line x1="110" y1="90" x2="152" y2="80" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="168" y1="75" x2="232" y2="67" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="248" y1="65" x2="312" y2="72" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="328" y1="72" x2="392" y2="64" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="408" y1="62" x2="472" y2="68" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="488" y1="70" x2="552" y2="66" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="568" y1="66" x2="632" y2="72" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="648" y1="72" x2="712" y2="70" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="728" y1="70" x2="790" y2="85" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Distance label above position path -->
  <text x="450" y="45" text-anchor="middle" font-size="11" fill="#999" font-weight="600">← — — — ENORMOUS DISTANCE (many hops) — — — →</text>

  <!-- Particle A (far left) -->
  <circle cx="90" cy="105" r="26" fill="#eef6fb" stroke="#2471a3" stroke-width="2.5"/>
  <text x="90" y="111" text-anchor="middle" font-size="16" fill="#2471a3" font-weight="700">A</text>

  <!-- Particle B (far right) -->
  <circle cx="810" cy="100" r="26" fill="#eef6fb" stroke="#2471a3" stroke-width="2.5"/>
  <text x="810" y="106" text-anchor="middle" font-size="16" fill="#2471a3" font-weight="700">B</text>

  <!-- Shared node SH (center bottom, purple/pending) -->
  <circle cx="450" cy="210" r="22" fill="#f9f5fd" stroke="#7d3c98" stroke-width="3" stroke-dasharray="6,3"/>
  <text x="450" y="216" text-anchor="middle" font-size="14" fill="#7d3c98" font-weight="700">SH</text>
  <text x="450" y="247" text-anchor="middle" font-size="10" fill="#7d3c98" font-weight="600">PENDING — nobody asked</text>

  <!-- Value edge: A → SH (orange, solid) -->
  <line x1="108" y1="126" x2="432" y2="198" stroke="#d35400" stroke-width="2.5"/>

  <!-- Value edge: B → SH (orange, solid) -->
  <line x1="792" y1="121" x2="468" y2="198" stroke="#d35400" stroke-width="2.5"/>

  <!-- Legend box -->
  <rect x="30" y="260" width="320" height="30" rx="4" fill="none"/>
  <line x1="40" y1="275" x2="70" y2="275" stroke="#999" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="76" y="279" font-size="10" fill="#999">POSITION EDGES — rewired when particles move</text>

  <rect x="540" y="260" width="340" height="30" rx="4" fill="none"/>
  <line x1="550" y1="275" x2="580" y2="275" stroke="#d35400" stroke-width="2.5"/>
  <text x="586" y="279" font-size="10" fill="#d35400">VALUE EDGES — unchanged by movement</text>
</svg>
