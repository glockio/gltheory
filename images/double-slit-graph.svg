<!-- DESCRIPTION: Two-panel comparison. LEFT: No consumer at slits — both paths stay in-flight (purple dashed), overlap at screen, interference pattern appears. RIGHT: Consumer at slit — one path commits early, other dies, no interference. Same graph, different consumer, different outcome. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ======== LEFT PANEL: NO CONSUMER AT SLITS ======== -->

  <!-- Panel title -->
  <text x="220" y="28" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="700">NO CONSUMER AT SLITS</text>

  <!-- Source node (green committed) -->
  <circle cx="50" cy="160" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="50" y="157" text-anchor="middle" font-size="7" fill="white" font-weight="700">SRC</text>
  <text x="50" y="166" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,0.7)">committed</text>

  <!-- Fork: Source to Slit A -->
  <line x1="62" y1="152" x2="108" y2="100" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <!-- Fork: Source to Slit B -->
  <line x1="62" y1="168" x2="108" y2="220" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>

  <!-- Slit A node (purple dashed, in-flight) -->
  <circle cx="120" cy="90" r="10" fill="none" stroke="#7d3c98" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="120" y="94" text-anchor="middle" font-size="7" fill="#7d3c98" font-weight="600">A</text>
  <text x="120" y="75" text-anchor="middle" font-size="8" fill="#7a7a6a">SLIT A</text>

  <!-- Slit B node (purple dashed, in-flight) -->
  <circle cx="120" cy="230" r="10" fill="none" stroke="#7d3c98" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="120" y="234" text-anchor="middle" font-size="7" fill="#7d3c98" font-weight="600">B</text>
  <text x="120" y="255" text-anchor="middle" font-size="8" fill="#7a7a6a">SLIT B</text>

  <!-- Wall with slits -->
  <line x1="140" y1="42" x2="140" y2="75" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="140" y1="105" x2="140" y2="215" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="140" y1="245" x2="140" y2="290" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Path A continues: Slit A to screen (purple dashed) -->
  <line x1="130" y1="92" x2="255" y2="130" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Intermediate node on path A -->
  <circle cx="190" cy="108" r="6" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Path B continues: Slit B to screen (purple dashed) -->
  <line x1="130" y1="228" x2="255" y2="190" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.6"/>
  <!-- Intermediate node on path B -->
  <circle cx="190" cy="212" r="6" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>

  <!-- Overlap region (where paths converge) -->
  <circle cx="260" cy="160" r="14" fill="#f3ecfa" stroke="#7d3c98" stroke-width="2" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="260" y="156" text-anchor="middle" font-size="6" fill="#7d3c98" font-weight="600">A+B</text>
  <text x="260" y="165" text-anchor="middle" font-size="5.5" fill="#7d3c98">overlap</text>

  <!-- Arrow to screen -->
  <line x1="274" y1="160" x2="310" y2="160" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <polygon points="312,160 306,155 306,165" fill="#7d3c98" opacity="0.7"/>

  <!-- Screen bar -->
  <rect x="320" y="90" width="10" height="140" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>

  <!-- Interference pattern bars -->
  <rect x="338" y="95" width="4" height="8" rx="1" fill="#1e8449" opacity="0.85"/>
  <rect x="338" y="107" width="4" height="3" rx="1" fill="#1e8449" opacity="0.15"/>
  <rect x="338" y="114" width="4" height="8" rx="1" fill="#1e8449" opacity="0.8"/>
  <rect x="338" y="126" width="4" height="3" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="338" y="133" width="4" height="8" rx="1" fill="#1e8449" opacity="0.85"/>
  <rect x="338" y="145" width="4" height="3" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="338" y="152" width="4" height="8" rx="1" fill="#1e8449" opacity="0.75"/>
  <rect x="338" y="164" width="4" height="3" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="338" y="171" width="4" height="8" rx="1" fill="#1e8449" opacity="0.8"/>
  <rect x="338" y="183" width="4" height="3" rx="1" fill="#1e8449" opacity="0.15"/>
  <rect x="338" y="190" width="4" height="8" rx="1" fill="#1e8449" opacity="0.85"/>
  <rect x="338" y="202" width="4" height="3" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="338" y="209" width="4" height="8" rx="1" fill="#1e8449" opacity="0.75"/>
  <text x="352" y="158" font-size="7" fill="#1e8449" font-weight="600">interference</text>
  <text x="352" y="168" font-size="7" fill="#1e8449" font-weight="600">pattern</text>

  <!-- Left panel label -->
  <text x="220" y="310" text-anchor="middle" font-size="9" fill="#7a7a6a" font-style="italic">Both paths in-flight → overlap at screen → interference</text>

  <!-- ======== DIVIDER ======== -->
  <line x1="440" y1="40" x2="440" y2="300" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ======== RIGHT PANEL: CONSUMER AT SLIT ======== -->

  <!-- Panel title -->
  <text x="670" y="28" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="700">CONSUMER AT SLIT</text>

  <!-- Source node (green committed) -->
  <circle cx="490" cy="160" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="490" y="157" text-anchor="middle" font-size="7" fill="white" font-weight="700">SRC</text>
  <text x="490" y="166" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,0.7)">committed</text>

  <!-- Fork: Source to Slit A -->
  <line x1="502" y1="152" x2="548" y2="100" stroke="#1e8449" stroke-width="1.5"/>
  <!-- Fork: Source to Slit B -->
  <line x1="502" y1="168" x2="548" y2="220" stroke="#ccc" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Slit A node — now committed (green) because consumer is here -->
  <circle cx="560" cy="90" r="10" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="560" y="94" text-anchor="middle" font-size="7" fill="white" font-weight="600">A</text>
  <text x="560" y="75" text-anchor="middle" font-size="8" fill="#7a7a6a">SLIT A</text>

  <!-- Consumer/detector at Slit A (orange) -->
  <circle cx="595" cy="72" r="10" fill="#d35400" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="595" y="76" text-anchor="middle" font-size="8" fill="white" font-weight="700">C</text>
  <text x="618" y="68" font-size="7" fill="#d35400" font-weight="600">consumer</text>

  <!-- Wall with slits -->
  <line x1="580" y1="42" x2="580" y2="75" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="105" x2="580" y2="215" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="580" y1="245" x2="580" y2="290" stroke="#999" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- Slit B node — dimmed/killed -->
  <circle cx="560" cy="230" r="10" fill="none" stroke="#ccc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.35"/>
  <text x="560" y="234" text-anchor="middle" font-size="7" fill="#ccc" font-weight="600">B</text>
  <text x="560" y="255" text-anchor="middle" font-size="8" fill="#ccc">SLIT B</text>
  <!-- X mark on killed path -->
  <line x1="553" y1="223" x2="567" y2="237" stroke="#c0392b" stroke-width="2" opacity="0.5"/>
  <line x1="567" y1="223" x2="553" y2="237" stroke="#c0392b" stroke-width="2" opacity="0.5"/>

  <!-- Path A continues: committed (green solid) -->
  <line x1="570" y1="92" x2="700" y2="140" stroke="#1e8449" stroke-width="1.8"/>
  <!-- Intermediate committed node -->
  <circle cx="635" cy="112" r="6" fill="#1e8449" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Path B killed (dimmed gray dashed, no continuation) -->
  <line x1="570" y1="228" x2="630" y2="210" stroke="#ccc" stroke-width="1" stroke-dasharray="4,3" opacity="0.25"/>

  <!-- Arrow to screen -->
  <line x1="706" y1="142" x2="750" y2="160" stroke="#1e8449" stroke-width="1.8"/>
  <polygon points="752,160 746,155 746,165" fill="#1e8449"/>

  <!-- Screen bar -->
  <rect x="760" y="90" width="10" height="140" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>

  <!-- No pattern — scattered random dots -->
  <circle cx="780" cy="103" r="3" fill="#1e8449" opacity="0.7"/>
  <circle cx="784" cy="128" r="3" fill="#1e8449" opacity="0.6"/>
  <circle cx="778" cy="145" r="3" fill="#1e8449" opacity="0.75"/>
  <circle cx="786" cy="162" r="3" fill="#1e8449" opacity="0.65"/>
  <circle cx="779" cy="179" r="3" fill="#1e8449" opacity="0.7"/>
  <circle cx="785" cy="195" r="3" fill="#1e8449" opacity="0.6"/>
  <circle cx="781" cy="113" r="3" fill="#1e8449" opacity="0.55"/>
  <circle cx="783" cy="210" r="3" fill="#1e8449" opacity="0.7"/>
  <text x="798" y="158" font-size="7" fill="#c0392b" font-weight="600">no pattern</text>

  <!-- Right panel label -->
  <text x="670" y="310" text-anchor="middle" font-size="9" fill="#7a7a6a" font-style="italic">Consumer at slit → one path commits → no interference</text>

  <!-- ======== BOTTOM CAPTION ======== -->
  <line x1="30" y1="328" x2="870" y2="328" stroke="#d5d0c0" stroke-width="0.5"/>
  <text x="450" y="345" text-anchor="middle" font-size="10" fill="#1a1a1a" font-style="italic">Same graph. Different consumer. Different outcome.</text>
</svg>
