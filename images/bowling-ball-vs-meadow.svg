  <line x1="580" y1="97" x2="580" y2="79" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="615" y1="96" x2="614" y2="78" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="650" y1="97" x2="651" y2="79" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="680" y1="98" x2="680" y2="80" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="710" y1="100" x2="711" y2="82" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="740" y1="102" x2="739" y2="84" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="760" y1="105" x2="761" y2="87" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>

  <!-- Left edge tall grass -->
  <line x1="445" y1="130" x2="445" y2="112" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="448" y1="170" x2="447" y2="152" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="445" y1="210" x2="446" y2="192" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
