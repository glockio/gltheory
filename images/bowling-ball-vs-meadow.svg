  <!-- Right outer arrows -->
  <line x1="772" y1="195" x2="772" y2="182" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="772,180 769,185 775,185" fill="#1e8449" opacity="0.5"/>
  <line x1="772" y1="265" x2="772" y2="252" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="772,250 769,255 775,255" fill="#1e8449" opacity="0.5"/>
  <!-- Bottom outer arrows -->
