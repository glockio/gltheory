<!-- DESCRIPTION: Two panels side by side, separated by a vertical divider. Left: trampoline with bowling ball warping fabric (standard spacetime picture). Right: top-down meadow where grass grows slower near a rock (the meadow model). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 480">
  <!-- White background -->
  <rect width="820" height="480" fill="#ffffff"/>

  <!-- Vertical divider -->
  <line x1="410" y1="20" x2="410" y2="430" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ==================== LEFT PANEL: THE STANDARD PICTURE ==================== -->

  <!-- Title -->
  <text x="205" y="38" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#333333" text-anchor="middle">THE STANDARD PICTURE</text>
  <text x="205" y="56" font-family="DM Sans, sans-serif" font-size="16" fill="#c0392b" text-anchor="middle" opacity="0.7">&#x2717;</text>

  <!-- Trampoline frame — slight perspective (trapezoid) -->
  <polygon points="60,180 350,180 370,290 40,290" fill="none" stroke="#888888" stroke-width="2" stroke-linejoin="round"/>

  <!-- Grid lines on trampoline surface — horizontal lines that curve downward in center -->
  <!-- Horizontal grid lines -->
  <path d="M 60,195 Q 205,195 350,195" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 52,210 Q 205,213 348,210" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 48,225 Q 205,232 346,225" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 45,240 Q 205,255 344,240" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 43,255 Q 205,270 342,255" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 41,270 Q 205,278 340,270" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 40,285 Q 205,288 370,285" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>

  <!-- Vertical grid lines that curve down toward center -->
  <path d="M 100,183 Q 100,235 96,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 145,182 Q 143,238 138,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 190,181 Q 185,250 182,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 220,181 Q 218,250 225,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 260,181 Q 265,238 270,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>
  <path d="M 305,182 Q 310,235 315,288" fill="none" stroke="#bbbbbb" stroke-width="0.8"/>

  <!-- Funnel depression in the fabric -->
  <ellipse cx="205" cy="258" rx="45" ry="18" fill="none" stroke="#999999" stroke-width="1.2" stroke-dasharray="3,3"/>
  <path d="M 160,258 Q 175,290 205,300 Q 235,290 250,258" fill="none" stroke="#888888" stroke-width="1.5"/>

  <!-- Bowling ball -->
  <circle cx="205" cy="248" r="22" fill="#444444" stroke="#333333" stroke-width="1.5"/>
  <!-- Bowling ball finger holes -->
  <circle cx="198" cy="240" r="3" fill="#333333"/>
  <circle cx="210" cy="238" r="3" fill="#333333"/>
  <circle cx="204" cy="230" r="2.5" fill="#333333"/>
  <!-- Highlight on ball -->
  <circle cx="195" cy="237" r="5" fill="#666666" opacity="0.4"/>

  <!-- Marble rolling toward the ball -->
  <circle cx="310" cy="218" r="7" fill="#2471a3" stroke="#1a5276" stroke-width="1"/>
  <!-- Marble highlight -->
  <circle cx="307" cy="215" r="2" fill="#5dade2" opacity="0.6"/>

  <!-- Motion line for marble -->
  <path d="M 330,210 Q 322,213 315,216" fill="none" stroke="#2471a3" stroke-width="1" stroke-dasharray="3,2" opacity="0.6"/>
  <path d="M 340,206 Q 332,209 325,213" fill="none" stroke="#2471a3" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- Curved arrow showing marble path -->
  <path d="M 312,222 Q 280,240 240,252" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <!-- arrowhead -->
  <polygon points="240,252 248,248 246,256" fill="#2471a3" opacity="0.5"/>

  <!-- Downward arrow showing "pushes down" -->
  <line x1="205" y1="310" x2="205" y2="340" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
  <polygon points="205,343 200,335 210,335" fill="#c0392b" opacity="0.6"/>

  <!-- Left panel caption -->
  <text x="205" y="370" font-family="DM Sans, sans-serif" font-size="12" fill="#555555" text-anchor="middle">"Mass pushes spacetime down."</text>


  <!-- ==================== RIGHT PANEL: THE MEADOW ==================== -->

