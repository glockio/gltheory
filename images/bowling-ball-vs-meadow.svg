  <line x1="445" y1="360" x2="446" y2="342" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>

  <!-- Right edge tall grass -->
  <line x1="785" y1="130" x2="785" y2="112" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="782" y1="170" x2="783" y2="152" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="785" y1="210" x2="784" y2="192" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="782" y1="250" x2="783" y2="232" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="785" y1="290" x2="784" y2="272" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="782" y1="330" x2="783" y2="312" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="785" y1="360" x2="784" y2="342" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>

  <!-- Bottom edge tall grass -->
  <line x1="470" y1="372" x2="470" y2="354" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="500" y1="375" x2="501" y2="357" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="540" y1="377" x2="539" y2="359" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="580" y1="378" x2="581" y2="360" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="615" y1="379" x2="614" y2="361" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="650" y1="378" x2="651" y2="360" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
  <line x1="690" y1="377" x2="689" y2="359" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
