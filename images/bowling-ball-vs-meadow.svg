  <line x1="740" y1="295" x2="741" y2="306" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <!-- Left side medium -->
  <line x1="480" y1="220" x2="480" y2="209" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <line x1="480" y1="245" x2="480" y2="256" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <!-- Right side medium -->
  <line x1="750" y1="220" x2="750" y2="209" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <line x1="750" y1="245" x2="750" y2="256" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>

  <!-- Short/sparse grass — inner ring near rock -->
  <line x1="575" y1="200" x2="575" y2="196" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="655" y1="200" x2="655" y2="196" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="575" y1="260" x2="575" y2="264" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="655" y1="260" x2="655" y2="264" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="565" y1="220" x2="565" y2="216" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="665" y1="220" x2="665" y2="216" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="565" y1="240" x2="565" y2="244" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <line x1="665" y1="240" x2="665" y2="244" stroke="#82e0aa" stroke-width="0.9" opacity="0.4"/>
  <!-- tiny dots for barely-there grass near rock -->
  <circle cx="590" cy="215" r="1" fill="#a9dfbf" opacity="0.4"/>
  <circle cx="640" cy="215" r="1" fill="#a9dfbf" opacity="0.4"/>
  <circle cx="590" cy="245" r="1" fill="#a9dfbf" opacity="0.4"/>
  <circle cx="640" cy="245" r="1" fill="#a9dfbf" opacity="0.4"/>

  <!-- Rock in center -->
  <ellipse cx="615" cy="230" r="20" ry="16" fill="#aaaaaa" stroke="#888888" stroke-width="1.5"/>
  <!-- Rock texture lines -->
  <line x1="605" y1="226" x2="610" y2="228" stroke="#999999" stroke-width="0.8" opacity="0.5"/>
  <line x1="618" y1="222" x2="624" y2="225" stroke="#999999" stroke-width="0.8" opacity="0.5"/>
  <line x1="612" y1="234" x2="620" y2="236" stroke="#999999" stroke-width="0.8" opacity="0.5"/>
