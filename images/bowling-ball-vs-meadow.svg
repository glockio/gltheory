  <text x="567" y="188" font-family="DM Sans, sans-serif" font-size="7.5" fill="#7a7a6a" opacity="0.6">slow</text>
  <text x="648" y="188" font-family="DM Sans, sans-serif" font-size="7.5" fill="#7a7a6a" opacity="0.6">slow</text>

  <!-- Right panel caption -->
  <text x="615" y="370" font-family="DM Sans, sans-serif" font-size="12" fill="#555555" text-anchor="middle">"Grass grows around the rock.</text>
  <text x="615" y="385" font-family="DM Sans, sans-serif" font-size="12" fill="#555555" text-anchor="middle">It just grows slower underneath."</text>


  <!-- ==================== BOTTOM SHARED CAPTION ==================== -->

  <!-- Trampoline legs for visual grounding -->
