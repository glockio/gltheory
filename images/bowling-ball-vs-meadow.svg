  <text x="615" y="38" font-family="DM Sans, sans-serif" font-size="15" font-weight="700" fill="#333333" text-anchor="middle">THE MEADOW</text>
  <text x="615" y="56" font-family="DM Sans, sans-serif" font-size="16" fill="#1e8449" text-anchor="middle" opacity="0.7">&#x2713;</text>

