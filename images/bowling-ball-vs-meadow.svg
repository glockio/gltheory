  <!-- Growth arrows — tall (outer, big arrows) -->
  <!-- Top outer arrows -->
  <line x1="475" y1="118" x2="475" y2="105" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="475,103 472,108 478,108" fill="#1e8449" opacity="0.5"/>
  <line x1="755" y1="118" x2="755" y2="105" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="755,103 752,108 758,108" fill="#1e8449" opacity="0.5"/>
  <!-- Left outer arrows -->
  <line x1="458" y1="195" x2="458" y2="182" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="458,180 455,185 461,185" fill="#1e8449" opacity="0.5"/>
  <line x1="458" y1="265" x2="458" y2="252" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
