  <!-- Medium zone -->
  <circle cx="615" cy="230" r="130" fill="#eafaf1" stroke="none"/>

  <!-- Inner zone: sparse/short grass (lightest) -->
  <circle cx="615" cy="230" r="70" fill="#f9fef9" stroke="none"/>

  <!-- Bare zone nearest rock -->
  <circle cx="615" cy="230" r="35" fill="#fafafa" stroke="none"/>

  <!-- Tall grass blades — outer edges -->
  <!-- Top edge -->
  <line x1="470" y1="105" x2="470" y2="88" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="490" y1="102" x2="491" y2="84" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>
  <line x1="520" y1="100" x2="519" y2="82" stroke="#27ae60" stroke-width="1.5" opacity="0.65"/>
