  <line x1="760" y1="372" x2="759" y2="354" stroke="#1e8449" stroke-width="1.5" opacity="0.7"/>

  <!-- Medium grass blades — middle ring -->
  <!-- Top-left quadrant medium grass -->
  <line x1="510" y1="145" x2="510" y2="134" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <line x1="530" y1="135" x2="531" y2="125" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <line x1="480" y1="165" x2="480" y2="154" stroke="#52be80" stroke-width="1.2" opacity="0.55"/>
  <!-- Top-right quadrant -->
