  <polygon points="585,257 583.5,254.5 586.5,254.5" fill="#7a7a6a" opacity="0.45"/>
  <line x1="645" y1="253" x2="645" y2="256" stroke="#7a7a6a" stroke-width="0.8" opacity="0.45"/>
  <polygon points="645,257 643.5,254.5 646.5,254.5" fill="#7a7a6a" opacity="0.45"/>

  <!-- Labels: "growing fast" and "growing slow" -->
