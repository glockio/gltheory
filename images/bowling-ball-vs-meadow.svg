  <line x1="755" y1="348" x2="755" y2="335" stroke="#1e8449" stroke-width="1.2" opacity="0.5"/>
  <polygon points="755,333 752,338 758,338" fill="#1e8449" opacity="0.5"/>

  <!-- Growth arrows — tiny (inner, near rock) -->
  <line x1="585" y1="207" x2="585" y2="204" stroke="#7a7a6a" stroke-width="0.8" opacity="0.45"/>
  <polygon points="585,203 583.5,205.5 586.5,205.5" fill="#7a7a6a" opacity="0.45"/>
  <line x1="645" y1="207" x2="645" y2="204" stroke="#7a7a6a" stroke-width="0.8" opacity="0.45"/>
  <polygon points="645,203 643.5,205.5 646.5,205.5" fill="#7a7a6a" opacity="0.45"/>
