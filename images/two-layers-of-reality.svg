<!-- DESCRIPTION: Left: a TV screen showing Mario's world (stick-figure Mario, platforms, a question block) labeled "RENDER LAYER — What Mario experiences. His 'reality.'" Right: a Nintendo console with circuit board showing graph nodes and edges inside, labeled "ENGINE LAYER — Dots and lines. The actual computation." Arrow goes FROM the console TO the TV screen, labeled "produces." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- TV SCREEN -->
  <rect x="30" y="40" width="300" height="200" rx="8" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <rect x="35" y="45" width="290" height="170" rx="4" fill="#e8f6ff"/>
  <!-- TV stand -->
  <line x1="140" y1="240" x2="140" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="220" y1="240" x2="220" y2="260" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="110" y1="260" x2="250" y2="260" stroke="#1a1a1a" stroke-width="2.5"/>

  <!-- Mario world inside TV -->
  <!-- Ground platform -->
  <line x1="50" y1="195" x2="310" y2="195" stroke="#7a7a6a" stroke-width="2" stroke-dasharray="4,2"/>
  <!-- Platforms -->
  <rect x="80" y="150" width="50" height="8" rx="2" fill="#7a7a6a"/>
  <rect x="200" y="120" width="50" height="8" rx="2" fill="#7a7a6a"/>

  <!-- Question block -->
  <rect x="145" y="100" width="22" height="22" rx="3" fill="#d4a017" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="156" y="117" text-anchor="middle" fill="#1a1a1a" font-size="14" font-weight="bold">?</text>

  <!-- Stick-figure Mario -->
  <circle cx="100" cy="170" r="6" fill="#c0392b" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="100" y1="176" x2="100" y2="190" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="182" x2="92" y2="178" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="182" x2="108" y2="178" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="190" x2="94" y2="195" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="100" y1="190" x2="106" y2="195" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Mario hat brim -->
  <line x1="93" y1="167" x2="107" y2="167" stroke="#c0392b" stroke-width="2"/>

  <!-- Coins / dots -->
  <circle cx="260" cy="100" r="4" fill="#d4a017"/>
  <circle cx="275" cy="100" r="4" fill="#d4a017"/>
  <circle cx="290" cy="100" r="4" fill="#d4a017"/>

  <!-- RENDER LAYER label -->
  <text x="180" y="285" text-anchor="middle" fill="#2471a3" font-size="12" font-weight="bold">RENDER LAYER</text>
  <text x="180" y="300" text-anchor="middle" fill="#7a7a6a" font-size="9.5">What Mario experiences. His "reality."</text>

  <!-- CONSOLE -->
  <rect x="500" y="55" width="260" height="170" rx="10" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <!-- Inner circuit area -->
  <rect x="520" y="75" width="220" height="120" rx="4" fill="#f5f0e8" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Graph nodes inside console -->
  <circle cx="560" cy="110" r="8" fill="#2471a3"/>
  <circle cx="620" cy="95" r="8" fill="#2471a3"/>
  <circle cx="680" cy="110" r="8" fill="#2471a3"/>
  <circle cx="590" cy="155" r="8" fill="#2471a3"/>
  <circle cx="650" cy="160" r="8" fill="#2471a3"/>
  <circle cx="710" cy="150" r="8" fill="#2471a3"/>

  <!-- Graph edges -->
  <line x1="568" y1="110" x2="612" y2="97" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="628" y1="97" x2="672" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="560" y1="118" x2="585" y2="148" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="620" y1="103" x2="595" y2="148" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="620" y1="103" x2="648" y2="152" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="680" y1="118" x2="655" y2="153" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="680" y1="118" x2="705" y2="143" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Small circuit traces -->
  <line x1="525" y1="180" x2="545" y2="180" stroke="#7a7a6a" stroke-width="0.8"/>
  <line x1="525" y1="184" x2="540" y2="184" stroke="#7a7a6a" stroke-width="0.8"/>
  <circle cx="548" cy="180" r="2" fill="none" stroke="#7a7a6a" stroke-width="0.8"/>

  <!-- Console slots -->
  <rect x="580" y="228" width="40" height="6" rx="2" fill="#7a7a6a"/>
  <rect x="640" y="228" width="40" height="6" rx="2" fill="#7a7a6a"/>

  <!-- ENGINE LAYER label -->
  <text x="630" y="260" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">ENGINE LAYER</text>
  <text x="630" y="275" text-anchor="middle" fill="#7a7a6a" font-size="9.5">Dots and lines. The actual computation.</text>

  <!-- ARROW from console to TV -->
  <line x1="500" y1="140" x2="345" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="345,134 330,140 345,146" fill="#1a1a1a"/>

  <!-- "produces" label on arrow -->
  <text x="418" y="132" text-anchor="middle" fill="#1a1a1a" font-size="11" font-style="italic">produces</text>
</svg>
