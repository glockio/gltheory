<!-- DESCRIPTION: Two side-by-side panels showing the same node P evaluated by consumers arriving at different ticks. Left panel (late consumer, tick 8) has a large teal event cone with all 4 inputs arriving — full evaluation. Right panel (early consumer, tick 3) has a small orange event cone with only 1 input arriving — partial evaluation, different result. Demonstrates that consumer timing determines which reality a node commits to. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="DM Sans, sans-serif">
  <rect width="900" height="420" fill="white" fill-opacity="0"/>

  <defs>
    <marker id="arr-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#1e8449"/>
    </marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- DASHED VERTICAL DIVIDER                      -->
  <!-- ============================================ -->
  <line x1="450" y1="15" x2="450" y2="365" stroke="#999" stroke-width="1.2" stroke-dasharray="6,5"/>

  <!-- ============================================ -->
  <!-- LEFT PANEL: LATE CONSUMER (tick 8)           -->
  <!-- ============================================ -->

  <!-- Header -->
  <text x="225" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#a8dadc">LATE CONSUMER</text>
  <text x="225" y="48" text-anchor="middle" font-size="11" fill="#6a9a9a">tick 8</text>

  <!-- Large teal event cone — opening leftward from P -->
  <path d="M 280,195 L 55,80 L 55,310 Z" fill="#a8dadc" fill-opacity="0.10" stroke="#a8dadc" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Node P: committed green with checkmark -->
  <circle cx="280" cy="195" r="16" fill="white" stroke="#1e8449" stroke-width="2.8"/>
  <text x="280" y="201" text-anchor="middle" font-size="15" fill="#1e8449" font-weight="bold">&#10003;</text>
  <text x="280" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449">P</text>

  <!-- E1: green, inside cone, top-left area -->
  <circle cx="110" cy="120" r="7" fill="white" stroke="#1e8449" stroke-width="2"/>
  <line x1="117" y1="124" x2="264" y2="188" stroke="#1e8449" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="110" y="108" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">E1 &#10003;</text>

  <!-- E2: green, inside cone, left-center -->
  <circle cx="90" cy="195" r="7" fill="white" stroke="#1e8449" stroke-width="2"/>
  <line x1="97" y1="195" x2="264" y2="195" stroke="#1e8449" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="75" y="183" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">E2 &#10003;</text>

  <!-- E3: green, inside cone, lower-left -->
  <circle cx="115" cy="260" r="7" fill="white" stroke="#1e8449" stroke-width="2"/>
  <line x1="122" y1="256" x2="266" y2="205" stroke="#1e8449" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="115" y="280" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">E3 &#10003;</text>

  <!-- E4: green, inside cone, bottom-left -->
  <circle cx="145" cy="295" r="7" fill="white" stroke="#1e8449" stroke-width="2"/>
  <line x1="152" y1="290" x2="268" y2="208" stroke="#1e8449" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="145" y="314" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">E4 &#10003;</text>

  <!-- Consumer C: small orange node, bottom-right of left panel -->
  <circle cx="380" cy="285" r="10" fill="white" stroke="#d35400" stroke-width="2"/>
  <text x="380" y="289" text-anchor="middle" font-size="10" fill="#d35400" font-weight="bold">C</text>
  <!-- Dashed line from consumer to P -->
  <line x1="372" y1="277" x2="290" y2="208" stroke="#d35400" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Result text -->
  <text x="225" y="345" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="bold">4 inputs arrived</text>
  <text x="225" y="362" text-anchor="middle" font-size="11" fill="#1e8449">value = f(E1, E2, E3, E4)</text>

  <!-- ============================================ -->
  <!-- RIGHT PANEL: EARLY CONSUMER (tick 3)         -->
  <!-- ============================================ -->

  <!-- Header -->
  <text x="675" y="30" text-anchor="middle" font-size="15" font-weight="bold" fill="#d35400">EARLY CONSUMER</text>
  <text x="675" y="48" text-anchor="middle" font-size="11" fill="#a07030">tick 3</text>

  <!-- Small orange event cone — much smaller than left -->
  <path d="M 640,195 L 560,160 L 560,230 Z" fill="#d35400" fill-opacity="0.10" stroke="#d35400" stroke-width="1.2" stroke-dasharray="5,4"/>

  <!-- Node P: committed green with checkmark -->
  <circle cx="640" cy="195" r="16" fill="white" stroke="#1e8449" stroke-width="2.8"/>
  <text x="640" y="201" text-anchor="middle" font-size="15" fill="#1e8449" font-weight="bold">&#10003;</text>
  <text x="640" y="176" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e8449">P</text>

  <!-- E1: green, inside the small cone -->
  <circle cx="575" cy="185" r="7" fill="white" stroke="#1e8449" stroke-width="2"/>
  <line x1="582" y1="187" x2="624" y2="193" stroke="#1e8449" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <text x="570" y="173" text-anchor="middle" font-size="10" fill="#1e8449" font-weight="bold">E1 &#10003;</text>

  <!-- E2: red, OUTSIDE cone, 1 hop short -->
  <circle cx="525" cy="210" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>
  <line x1="532" y1="207" x2="624" y2="198" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="525" y="230" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">E2 &#10007;</text>

  <!-- E3: red, further away outside cone -->
  <circle cx="500" cy="140" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>
  <line x1="507" y1="144" x2="624" y2="190" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="128" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">E3 &#10007;</text>

  <!-- E4: red, far away -->
  <circle cx="480" cy="270" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>
  <line x1="487" y1="265" x2="628" y2="205" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="290" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="bold">E4 &#10007;</text>

  <!-- Consumer C: large orange node, close to P (arrived early) -->
  <circle cx="760" cy="210" r="14" fill="white" stroke="#d35400" stroke-width="2.5"/>
  <text x="760" y="215" text-anchor="middle" font-size="12" fill="#d35400" font-weight="bold">C</text>
  <!-- Dashed line from consumer to P -->
  <line x1="747" y1="203" x2="656" y2="198" stroke="#d35400" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="760" y="238" text-anchor="middle" font-size="9" fill="#a07030" font-style="italic">arrived early</text>

  <!-- Result text -->
  <text x="675" y="345" text-anchor="middle" font-size="12" fill="#d35400" font-weight="bold">1 input arrived</text>
  <text x="675" y="362" text-anchor="middle" font-size="11" fill="#d35400">value = f(E1) &#8212; DIFFERENT</text>

  <!-- ============================================ -->
  <!-- BOTTOM SPANNING TEXT                         -->
  <!-- ============================================ -->
  <line x1="120" y1="388" x2="780" y2="388" stroke="#1a1a1a" stroke-width="0.5" opacity="0.2"/>
  <text x="450" y="408" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Same node. Same graph. Different consumer timing. Different reality.</text>
</svg>
