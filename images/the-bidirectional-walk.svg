<!-- DESCRIPTION: One subgraph of depth m shown with two sets of arrows. Blue arrows going DOWN from root to leaves labeled "DOWN LEG — m hops at rate C." Orange arrows going UP from leaves to root labeled "UP LEG — m hops at rate C." Below: equation "E = m x C (down) x C (up) = mc^2." Caption note: "Same rate. Two independent directions. The graph is symmetric. No preferred direction. That's why c^2 appears." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" font-family="DM Sans, sans-serif">

  <defs>
    <marker id="arr-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#2471a3" stroke="none"/>
    </marker>
    <marker id="arr-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#d35400" stroke="none"/>
    </marker>
  </defs>

  <!-- ===== PANEL 1: CALL PHASE (DOWN) ===== -->
  <text x="175" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#2471a3" letter-spacing="1.5">1. CALL PHASE</text>
  <text x="175" y="48" text-anchor="middle" font-size="11" fill="#2471a3">root → leaves</text>

  <!-- Vertical chain of nodes -->
  <circle cx="175" cy="80" r="16" fill="#eef6fb" stroke="#2471a3" stroke-width="2.5"/>
  <text x="175" y="85" text-anchor="middle" font-size="10" font-weight="600" fill="#2471a3">root</text>

  <circle cx="175" cy="150" r="13" fill="#eef6fb" stroke="#2471a3" stroke-width="2"/>

  <circle cx="175" cy="220" r="13" fill="#eef6fb" stroke="#2471a3" stroke-width="2"/>

  <circle cx="175" cy="290" r="12" fill="#eef6fb" stroke="#2471a3" stroke-width="2"/>
  <text x="175" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#2471a3">leaf</text>

  <!-- Blue arrows going DOWN -->
  <line x1="175" y1="96" x2="175" y2="135" stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="175" y1="163" x2="175" y2="205" stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-blue)"/>
  <line x1="175" y1="233" x2="175" y2="276" stroke="#2471a3" stroke-width="2.5" marker-end="url(#arr-blue)"/>

  <!-- "m hops" brace on left -->
  <line x1="120" y1="80" x2="120" y2="290" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="116" y1="80" x2="124" y2="80" stroke="#7a7a6a" stroke-width="1"/>
  <line x1="116" y1="290" x2="124" y2="290" stroke="#7a7a6a" stroke-width="1"/>
  <text x="108" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a" font-style="italic">m</text>
  <text x="108" y="206" text-anchor="middle" font-size="9" fill="#7a7a6a">hops</text>

  <!-- Rate label on right -->
  <text x="220" y="170" font-size="11" font-weight="600" fill="#2471a3">at rate C</text>

  <!-- Dots between nodes to suggest more depth -->
  <circle cx="143" cy="148" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="207" cy="148" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="143" cy="218" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="207" cy="218" r="2" fill="#7a7a6a" opacity="0.4"/>

  <!-- ===== PANEL 2: RETURN PHASE (UP) ===== -->
  <text x="525" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#d35400" letter-spacing="1.5">2. RETURN PHASE</text>
  <text x="525" y="48" text-anchor="middle" font-size="11" fill="#d35400">leaves → root</text>

  <!-- Vertical chain of nodes -->
  <circle cx="525" cy="80" r="16" fill="#fff8f2" stroke="#d35400" stroke-width="2.5"/>
  <text x="525" y="85" text-anchor="middle" font-size="10" font-weight="600" fill="#d35400">root</text>

  <circle cx="525" cy="150" r="13" fill="#fff8f2" stroke="#d35400" stroke-width="2"/>

  <circle cx="525" cy="220" r="13" fill="#fff8f2" stroke="#d35400" stroke-width="2"/>

  <circle cx="525" cy="290" r="12" fill="#fff8f2" stroke="#d35400" stroke-width="2"/>
  <text x="525" y="295" text-anchor="middle" font-size="9" font-weight="600" fill="#d35400">leaf</text>

  <!-- Orange arrows going UP -->
  <line x1="525" y1="278" x2="525" y2="235" stroke="#d35400" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <line x1="525" y1="207" x2="525" y2="165" stroke="#d35400" stroke-width="2.5" marker-end="url(#arr-orange)"/>
  <line x1="525" y1="137" x2="525" y2="98" stroke="#d35400" stroke-width="2.5" marker-end="url(#arr-orange)"/>

  <!-- "m hops" brace on right -->
  <line x1="580" y1="80" x2="580" y2="290" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="576" y1="80" x2="584" y2="80" stroke="#7a7a6a" stroke-width="1"/>
  <line x1="576" y1="290" x2="584" y2="290" stroke="#7a7a6a" stroke-width="1"/>
  <text x="594" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a1a" font-style="italic">m</text>
  <text x="594" y="206" text-anchor="middle" font-size="9" fill="#7a7a6a">hops</text>

  <!-- Rate label on left -->
  <text x="462" y="170" font-size="11" font-weight="600" fill="#d35400">at rate C</text>

  <!-- Dots between nodes to suggest more depth -->
  <circle cx="493" cy="148" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="557" cy="148" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="493" cy="218" r="2" fill="#7a7a6a" opacity="0.4"/>
  <circle cx="557" cy="218" r="2" fill="#7a7a6a" opacity="0.4"/>

  <!-- ===== CENTER DIVIDER ===== -->
  <line x1="350" y1="55" x2="350" y2="310" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ===== PLUS SIGN between panels ===== -->
  <rect x="335" y="165" width="30" height="30" rx="15" fill="#f5f2eb" stroke="#d5d0c0" stroke-width="1"/>
  <text x="350" y="186" text-anchor="middle" font-size="18" font-weight="700" fill="#7a7a6a">+</text>

  <!-- ===== BOTTOM: EQUATION ===== -->
  <line x1="80" y1="330" x2="620" y2="330" stroke="#d5d0c0" stroke-width="1"/>

  <text x="350" y="370" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a2e">
    <tspan>E  =  m  </tspan>
    <tspan fill="#2471a3">&times;  C</tspan>
    <tspan fill="#7a7a6a" font-size="11" dy="4">down</tspan>
    <tspan dy="-4">  </tspan>
    <tspan fill="#d35400">&times;  C</tspan>
    <tspan fill="#7a7a6a" font-size="11" dy="4">up</tspan>
    <tspan dy="-4">  </tspan>
    <tspan fill="#1a1a2e">=  mc</tspan>
    <tspan font-size="14" dy="-8">2</tspan>
  </text>

  <text x="350" y="405" text-anchor="middle" font-size="12" font-weight="600" fill="#7a7a6a">Two unavoidable legs. Same rate. That's why c<tspan font-size="8" dy="-5">2</tspan><tspan dy="5"> appears.</tspan></text>

</svg>
