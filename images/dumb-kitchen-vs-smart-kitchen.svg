<!-- DESCRIPTION: Left panel (red border, "DUMB KITCHEN"): overwhelmed stick-figure chef surrounded by piles of dishes, trash can overflowing, "Evaluates everything. Most goes to waste." Right panel (green border, "SMART KITCHEN"): calm stick-figure chef with recipe book, only 2 dishes on counter, "Knows all recipes. Only evaluates what's ordered." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="DM Sans, sans-serif">
  <rect width="800" height="300" fill="white" fill-opacity="0"/>

  <!-- LEFT PANEL: DUMB KITCHEN -->
  <rect x="20" y="20" width="370" height="260" rx="8" fill="white" stroke="#c0392b" stroke-width="2.5"/>

  <!-- Title -->
  <text x="205" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="#c0392b">DUMB KITCHEN</text>

  <!-- Stick figure chef (overwhelmed) -->
  <!-- Head -->
  <circle cx="205" cy="100" r="14" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Chef hat -->
  <rect x="193" y="82" width="24" height="10" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="196" y="75" width="18" height="10" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Overwhelmed face -->
  <text x="205" y="105" text-anchor="middle" font-size="10" fill="#1a1a1a">X X</text>
  <!-- Body -->
  <line x1="205" y1="114" x2="205" y2="165" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Arms (flailing) -->
  <line x1="205" y1="130" x2="170" y2="115" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="205" y1="130" x2="240" y2="115" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="205" y1="165" x2="185" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="205" y1="165" x2="225" y2="200" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Piles of dishes (left side) -->
  <ellipse cx="85" cy="185" rx="22" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="85" cy="178" rx="20" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="85" cy="171" rx="18" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="85" cy="164" rx="16" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="85" cy="157" rx="14" ry="3" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>

  <!-- More dishes (right side) -->
  <ellipse cx="310" cy="185" rx="20" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="310" cy="178" rx="18" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="310" cy="171" rx="16" ry="4" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="315" cy="164" rx="14" ry="3" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>

  <!-- Trash can overflowing -->
  <rect x="120" y="170" width="25" height="30" rx="2" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <line x1="120" y1="170" x2="145" y2="170" stroke="#7a7a6a" stroke-width="2"/>
  <!-- Overflow squiggles -->
  <path d="M125,170 Q128,158 132,162 Q136,158 140,170" fill="none" stroke="#7a7a6a" stroke-width="1.2"/>
  <path d="M128,162 Q131,152 135,157" fill="none" stroke="#7a7a6a" stroke-width="1"/>

  <!-- Sweat drops -->
  <circle cx="182" cy="95" r="2.5" fill="#2471a3" opacity="0.6"/>
  <circle cx="228" cy="92" r="2" fill="#2471a3" opacity="0.6"/>

  <!-- Steam/chaos lines -->
  <path d="M90,148 Q95,140 90,132" fill="none" stroke="#7a7a6a" stroke-width="1" opacity="0.5"/>
  <path d="M305,155 Q310,147 305,139" fill="none" stroke="#7a7a6a" stroke-width="1" opacity="0.5"/>

  <!-- Label -->
  <text x="205" y="232" text-anchor="middle" font-size="11" fill="#1a1a1a">Evaluates everything.</text>
  <text x="205" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#c0392b">Most goes to waste.</text>

  <!-- RIGHT PANEL: SMART KITCHEN -->
  <rect x="410" y="20" width="370" height="260" rx="8" fill="white" stroke="#1e8449" stroke-width="2.5"/>

  <!-- Title -->
  <text x="595" y="50" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e8449">SMART KITCHEN</text>

  <!-- Stick figure chef (calm) -->
  <!-- Head -->
  <circle cx="560" cy="100" r="14" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Chef hat -->
  <rect x="548" y="82" width="24" height="10" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <rect x="551" y="75" width="18" height="10" rx="3" fill="white" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Happy face -->
  <circle cx="554" cy="97" r="1.5" fill="#1a1a1a"/>
  <circle cx="566" cy="97" r="1.5" fill="#1a1a1a"/>
  <path d="M553,104 Q560,110 567,104" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
  <!-- Body -->
  <line x1="560" y1="114" x2="560" y2="165" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Arms (relaxed, one holding book) -->
  <line x1="560" y1="130" x2="530" y2="150" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="560" y1="130" x2="595" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Legs -->
  <line x1="560" y1="165" x2="540" y2="200" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="560" y1="165" x2="580" y2="200" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Recipe book in left hand -->
  <rect x="510" y="145" width="22" height="28" rx="2" fill="white" stroke="#2471a3" stroke-width="1.5"/>
  <line x1="521" y1="145" x2="521" y2="173" stroke="#2471a3" stroke-width="1"/>
  <line x1="515" y1="153" x2="527" y2="153" stroke="#7a7a6a" stroke-width="0.7"/>
  <line x1="515" y1="158" x2="527" y2="158" stroke="#7a7a6a" stroke-width="0.7"/>
  <line x1="515" y1="163" x2="527" y2="163" stroke="#7a7a6a" stroke-width="0.7"/>

  <!-- Just 2 dishes on counter -->
  <line x1="640" y1="190" x2="740" y2="190" stroke="#7a7a6a" stroke-width="1.5"/>
  <ellipse cx="665" cy="185" rx="16" ry="4" fill="white" stroke="#1e8449" stroke-width="1.5"/>
  <ellipse cx="710" cy="185" rx="16" ry="4" fill="white" stroke="#1e8449" stroke-width="1.5"/>
  <!-- Little steam from dishes -->
  <path d="M665,178 Q668,172 665,166" fill="none" stroke="#7a7a6a" stroke-width="0.8" opacity="0.4"/>
  <path d="M710,178 Q713,172 710,166" fill="none" stroke="#7a7a6a" stroke-width="0.8" opacity="0.4"/>

  <!-- Label -->
  <text x="595" y="232" text-anchor="middle" font-size="11" fill="#1a1a1a">Knows all recipes.</text>
  <text x="595" y="250" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e8449">Only evaluates what's ordered.</text>
</svg>
