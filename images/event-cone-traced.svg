<!-- DESCRIPTION: Part 2 of 3-image event cone sequence. Consumer C approaches node P while the event cone is highlighted, showing which events (E1, E2) will reach P in time and which (E3, E4) are too late. Traced paths with tick markers show signal propagation through intermediate nodes. -->
<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr-orange" markerWidth="10" markerHeight="8" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#d35400"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e8449"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="900" height="420" fill="#ffffff"/>

  <!-- ===== LIGHT CONE: large dashed gray cone opening leftward from P ===== -->
  <path d="M 580,200 L 80,30 L 80,370 Z" fill="none" stroke="#bbbbbb" stroke-width="1.2" stroke-dasharray="8,5"/>
  <text x="95" y="385" fill="#999999" font-size="10" font-family="'DM Sans', sans-serif">LIGHT CONE</text>
  <text x="95" y="398" fill="#aaaaaa" font-size="9" font-family="'DM Sans', sans-serif">everything that could reach P</text>

  <!-- ===== EVENT CONE: teal shaded wedge — what ACTUALLY reaches P before C asks ===== -->
  <path d="M 580,200 L 280,100 L 280,300 Z" fill="#a8dadc" fill-opacity="0.12" stroke="#a8dadc" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="310" y="88" fill="#2471a3" font-size="13" font-family="'DM Sans', sans-serif" font-weight="700">EVENT CONE</text>
  <text x="310" y="104" fill="#5a9baf" font-size="10" font-family="'DM Sans', sans-serif">what actually reaches P before tick 4</text>

  <!-- ===== NODE P: purple dashed pending node ===== -->
  <circle cx="580" cy="200" r="16" fill="#f3e8ff" stroke="#7d3c98" stroke-width="2.5" stroke-dasharray="5,3"/>
  <text x="580" y="193" fill="#7d3c98" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">NODE</text>
  <text x="580" y="208" fill="#7d3c98" font-size="15" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">P</text>
  <text x="580" y="230" fill="#7d3c98" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif">pending</text>

  <!-- ===== CONSUMER C: orange node approaching from bottom-right ===== -->
  <circle cx="740" cy="320" r="18" fill="#fdebd0" stroke="#d35400" stroke-width="2.5"/>
  <text x="740" y="326" fill="#d35400" font-size="14" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">C</text>
  <text x="740" y="298" fill="#d35400" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">CONSUMER C</text>
  <text x="740" y="354" fill="#b5651d" font-size="10" text-anchor="middle" font-family="'DM Sans', sans-serif">arrives in 4 ticks</text>
  <!-- Dashed arrow from C toward P -->
  <line x1="726" y1="306" x2="596" y2="214" stroke="#d35400" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arr-orange)"/>

  <!-- ======================================================= -->
  <!-- EVENTS INSIDE THE CONE (will count)                      -->
  <!-- ======================================================= -->

  <!-- === E1: 1 tick away, direct path to P === -->
  <circle cx="490" cy="175" r="10" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
  <text x="490" y="179" fill="#1e8449" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">E1</text>
  <!-- Thick traced path E1 -> P -->
  <line x1="500" y1="178" x2="564" y2="195" stroke="#1e8449" stroke-width="3" stroke-linecap="round" marker-end="url(#arr-green)"/>
  <!-- Tick marker: 1 -->
  <circle cx="530" cy="186" r="8" fill="#ffffff" stroke="#1e8449" stroke-width="1"/>
  <text x="530" y="190" fill="#1e8449" font-size="8" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">1</text>
  <!-- Label -->
  <text x="460" y="158" fill="#1e8449" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">E1 &#10003; will count</text>

  <!-- === E2: 3 ticks away, traced path through 2 intermediate nodes === -->
  <circle cx="310" cy="215" r="10" fill="#d5f5e3" stroke="#1e8449" stroke-width="2"/>
  <text x="310" y="219" fill="#1e8449" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">E2</text>

  <!-- Intermediate node I1 -->
  <circle cx="385" cy="230" r="7" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5"/>
  <!-- Intermediate node I2 -->
  <circle cx="470" cy="220" r="7" fill="#eafaf1" stroke="#1e8449" stroke-width="1.5"/>

  <!-- Thick traced path: E2 -> I1 -->
  <line x1="320" y1="218" x2="378" y2="228" stroke="#1e8449" stroke-width="3" stroke-linecap="round" marker-end="url(#arr-green)"/>
  <!-- Tick marker: 1 -->
  <circle cx="350" cy="223" r="8" fill="#ffffff" stroke="#1e8449" stroke-width="1"/>
  <text x="350" y="227" fill="#1e8449" font-size="8" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">1</text>

  <!-- Thick traced path: I1 -> I2 -->
  <line x1="392" y1="229" x2="463" y2="222" stroke="#1e8449" stroke-width="3" stroke-linecap="round" marker-end="url(#arr-green)"/>
  <!-- Tick marker: 2 -->
  <circle cx="428" cy="226" r="8" fill="#ffffff" stroke="#1e8449" stroke-width="1"/>
  <text x="428" y="230" fill="#1e8449" font-size="8" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">2</text>

  <!-- Thick traced path: I2 -> P -->
  <line x1="477" y1="218" x2="564" y2="203" stroke="#1e8449" stroke-width="3" stroke-linecap="round" marker-end="url(#arr-green)"/>
  <!-- Tick marker: 3 -->
  <circle cx="520" cy="210" r="8" fill="#ffffff" stroke="#1e8449" stroke-width="1"/>
  <text x="520" y="214" fill="#1e8449" font-size="8" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">3</text>

  <!-- Label -->
  <text x="310" y="253" fill="#1e8449" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">E2 &#10003; will count</text>
  <text x="310" y="267" fill="#5a9b6e" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif">3 ticks through graph</text>

  <!-- ======================================================= -->
  <!-- EVENTS OUTSIDE THE CONE (too late)                       -->
  <!-- ======================================================= -->

  <!-- === E3: 6 ticks away, outside event cone but inside light cone === -->
  <circle cx="170" cy="140" r="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
  <text x="170" y="144" fill="#c0392b" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">E3</text>
  <!-- Dashed red path toward P -->
  <line x1="180" y1="144" x2="564" y2="196" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-red)"/>
  <!-- Label -->
  <text x="170" y="124" fill="#c0392b" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">E3 &#10007; too late</text>
  <text x="170" y="168" fill="#d98880" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif">6 ticks away</text>

  <!-- === E4: 8 ticks away, far outside === -->
  <circle cx="130" cy="290" r="10" fill="#fadbd8" stroke="#c0392b" stroke-width="2"/>
  <text x="130" y="294" fill="#c0392b" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700">E4</text>
  <!-- Dashed red path toward P -->
  <line x1="140" y1="288" x2="564" y2="204" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arr-red)"/>
  <!-- Label -->
  <text x="130" y="318" fill="#c0392b" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="600">E4 &#10007; too late</text>
  <text x="130" y="332" fill="#d98880" font-size="9" text-anchor="middle" font-family="'DM Sans', sans-serif">8 ticks away</text>

  <!-- ===== BOTTOM CAPTION ===== -->
  <text x="450" y="398" fill="#444444" font-size="12" text-anchor="middle" font-family="'DM Sans', sans-serif">The consumer is approaching. The event cone is everything that reaches P before C asks.</text>
  <text x="450" y="414" fill="#666666" font-size="11" text-anchor="middle" font-family="'DM Sans', sans-serif">Events inside count. Events outside don't.</text>
</svg>
