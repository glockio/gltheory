<!-- DESCRIPTION: A math equation (3 × 2 + 2 = 8) represented as a directed event graph. Bottom layer has three event nodes (3, 2, 2). The first 3 and 2 connect upward through a "×" edge to a middle node (6). Then 6 and the second 2 connect upward through a "+" edge to a top node (8) labeled "next now". Whiteboard aesthetic, dots and lines, arrows pointing upward. Time arrow on the side showing "past" at bottom and "now" at top. -->
<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" font-family="'DM Sans', sans-serif">

  <!-- Background -->
  <rect width="520" height="420" fill="#faf8f3" rx="8"/>

  <!-- Time arrow on right side -->
  <line x1="475" y1="350" x2="475" y2="80" stroke="#7a7a6a" stroke-width="1.5" stroke-dasharray="6,4"/>
  <polygon points="475,72 470,84 480,84" fill="#7a7a6a"/>
  <text x="475" y="365" text-anchor="middle" font-size="11" fill="#7a7a6a" font-weight="600" letter-spacing="1.5">PAST</text>
  <text x="475" y="68" text-anchor="middle" font-size="11" fill="#7a7a6a" font-weight="600" letter-spacing="1.5">NOW</text>

  <!-- "Now" surface line (dashed) -->
  <line x1="60" y1="95" x2="430" y2="95" stroke="#a8dadc" stroke-width="2" stroke-dasharray="8,5" opacity="0.7"/>
  <text x="65" y="88" font-size="10" fill="#2471a3" font-weight="600" letter-spacing="1" opacity="0.8">NEXT "NOW"</text>

  <!-- ========== NODES ========== -->

  <!-- Bottom layer: input events (3, 2, 2) -->
  <!-- Node: 3 -->
  <circle cx="140" cy="340" r="28" fill="white" stroke="#d35400" stroke-width="2.5"/>
  <text x="140" y="346" text-anchor="middle" font-size="22" font-weight="600" fill="#d35400">3</text>

  <!-- Node: 2 (left, feeds into ×) -->
  <circle cx="280" cy="340" r="28" fill="white" stroke="#d35400" stroke-width="2.5"/>
  <text x="280" y="346" text-anchor="middle" font-size="22" font-weight="600" fill="#d35400">2</text>

  <!-- Node: 2 (right, feeds into +) -->
  <circle cx="350" cy="250" r="28" fill="white" stroke="#d35400" stroke-width="2.5"/>
  <text x="350" y="256" text-anchor="middle" font-size="22" font-weight="600" fill="#d35400">2</text>

  <!-- Middle layer: intermediate result -->
  <!-- Node: 6 -->
  <circle cx="210" cy="220" r="28" fill="white" stroke="#2471a3" stroke-width="2.5"/>
  <text x="210" y="226" text-anchor="middle" font-size="22" font-weight="600" fill="#2471a3">6</text>

  <!-- Top layer: final result -->
  <!-- Node: 8 -->
  <circle cx="260" cy="115" r="32" fill="white" stroke="#1e8449" stroke-width="3"/>
  <text x="260" y="122" text-anchor="middle" font-size="24" font-weight="700" fill="#1e8449">8</text>

  <!-- ========== EDGES (arrows pointing upward, cause → effect) ========== -->

  <!-- Edge: 3 → 6 (multiply) -->
  <line x1="155" y1="315" x2="195" y2="245" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="193,249 199,241 188,243" fill="#1a1a1a"/>

  <!-- Edge: 2(left) → 6 (multiply) -->
  <line x1="265" y1="315" x2="225" y2="245" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="227,249 221,241 232,243" fill="#1a1a1a"/>

  <!-- Operation label: × -->
  <rect x="190" y="270" width="32" height="24" rx="4" fill="#d35400" opacity="0.12"/>
  <text x="206" y="288" text-anchor="middle" font-size="16" font-weight="700" fill="#d35400">×</text>

  <!-- Edge: 6 → 8 (add) -->
  <line x1="225" y1="195" x2="248" y2="145" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="246,149 252,140 242,143" fill="#1a1a1a"/>

  <!-- Edge: 2(right) → 8 (add) -->
  <line x1="335" y1="225" x2="278" y2="140" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="281,144 275,135 285,139" fill="#1a1a1a"/>

  <!-- Operation label: + -->
  <rect x="283" y="170" width="28" height="24" rx="4" fill="#d35400" opacity="0.12"/>
  <text x="297" y="188" text-anchor="middle" font-size="16" font-weight="700" fill="#d35400">+</text>

  <!-- ========== ANNOTATIONS ========== -->

  <!-- Label: "Events" pointing to bottom nodes -->
  <text x="75" y="380" font-size="11" fill="#7a7a6a" font-weight="600" letter-spacing="1">EVENTS</text>
  <line x1="75" y1="372" x2="115" y2="350" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Label: "Operations" pointing to × -->
  <text x="50" y="282" font-size="11" fill="#7a7a6a" font-weight="600" letter-spacing="1">OPERATIONS</text>
  <line x1="130" y1="282" x2="188" y2="282" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Label for result -->
  <text x="260" y="62" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="600" letter-spacing="1">NEXT EVENT</text>
  <line x1="260" y1="66" x2="260" y2="82" stroke="#1e8449" stroke-width="1" stroke-dasharray="3,3"/>

</svg>