  <circle cx="425" cy="312" r="6" fill="#d4a017"/>
  <circle cx="445" cy="308" r="6" fill="#d4a017"/>
  <circle cx="465" cy="315" r="6" fill="#d4a017"/>
  <circle cx="485" cy="310" r="6" fill="#d4a017"/>
  <circle cx="505" cy="306" r="6" fill="#d4a017"/>
  <circle cx="525" cy="313" r="6" fill="#d4a017"/>
  <circle cx="395" cy="295" r="5" fill="#d4a017"/>
  <circle cx="435" cy="298" r="5" fill="#d4a017"/>
  <circle cx="475" cy="300" r="5" fill="#d4a017"/>
  <circle cx="515" cy="297" r="5" fill="#d4a017"/>
