  <line x1="160" y1="385" x2="170" y2="325" stroke="#1e8449" stroke-width="1.2" opacity="0.3"/>
  <line x1="220" y1="378" x2="210" y2="318" stroke="#1e8449" stroke-width="1.2" opacity="0.3"/>
  <line x1="110" y1="320" x2="170" y2="325" stroke="#1e8449" stroke-width="1.5" opacity="0.4"/>

