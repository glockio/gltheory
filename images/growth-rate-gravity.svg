<!-- DESCRIPTION: Whiteboard style, white background, DM Sans font. Cross-section view. TOP: A wavy line representing spacetime fabric, dipping in the center. BOTTOM: Graph structure (nodes + edges) underneath. LEFT (no mass): Sparse nodes, tall vertical growth. 4 tick layers labeled "TICK 1–4." Green nodes. Growth is tall. CENTER (mass): Dense cluster of orange/gold interconnected nodes. Only 2 tick layers in the same time. Growth is stunted. Spacetime fabric dips above. RIGHT (no mass): Same as left — sparse, tall, 4 ticks of growth. The spacetime fabric curves down over the dense region because the graph grew LESS there. Label: "Mass doesn't push spacetime down. It just grows slower. Everything else grew faster." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550" font-family="'DM Sans', sans-serif">
  <defs>
    <marker id="arrowG" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="#7a7a6a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="550" fill="white"/>

  <!-- === SPACETIME FABRIC LINE (wavy, dipping in center) === -->
