  <line x1="405" y1="305" x2="425" y2="312" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="425" y1="312" x2="445" y2="308" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="445" y1="308" x2="465" y2="315" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="465" y1="315" x2="485" y2="310" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="485" y1="310" x2="505" y2="306" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="505" y1="306" x2="525" y2="313" stroke="#d4a017" stroke-width="1" opacity="0.4"/>
  <line x1="385" y1="310" x2="425" y2="312" stroke="#d4a017" stroke-width="1" opacity="0.25"/>
