  <circle cx="740" cy="378" r="7" fill="#1e8449"/>
  <circle cx="800" cy="385" r="7" fill="#1e8449"/>
  <line x1="680" y1="382" x2="740" y2="378" stroke="#1e8449" stroke-width="1.5" opacity="0.4"/>
  <line x1="740" y1="378" x2="800" y2="385" stroke="#1e8449" stroke-width="1.5" opacity="0.4"/>

