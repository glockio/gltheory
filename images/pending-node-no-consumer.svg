<!-- DESCRIPTION: A DAG/tree growing upward from past (bottom) to present (top). Bottom layer has 5 committed green nodes, middle layer 3, upper layer 2, and the frontier has 1 committed green node plus 1 special purple dashed PENDING node with incoming dashed blue arrows labeled with tick distances. A null-set symbol marks "no consumer" beside the pending node. Time arrow on the left points upward. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="DM Sans, sans-serif">
  <rect width="900" height="420" fill="white"/>

  <defs>
    <!-- Arrow marker for committed edges (green) -->
    <marker id="edge-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1e8449" stroke="none"/>
    </marker>
    <!-- Arrow marker for dashed blue approach lines -->
    <marker id="blue-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#2471a3" stroke="none"/>
    </marker>
    <!-- Arrow marker for purple dashed edge -->
    <marker id="purp-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#7d3c98" stroke="none"/>
    </marker>
    <!-- Arrow marker for time axis -->
    <marker id="time-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#999" stroke="none"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- TIME ARROW on the left                       -->
  <!-- ============================================ -->
  <line x1="52" y1="375" x2="52" y2="45" stroke="#999" stroke-width="1.5" marker-end="url(#time-arr)"/>
  <text x="48" y="210" text-anchor="middle" font-size="11" fill="#999" font-weight="bold" transform="rotate(-90, 48, 210)">TIME</text>

  <!-- ============================================ -->
  <!-- LAYER 1 — Bottom (y=350): 5 committed nodes -->
  <!-- ============================================ -->
  <circle cx="200" cy="350" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="310" cy="350" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="420" cy="350" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="530" cy="350" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="640" cy="350" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- EDGES: Layer 1 -> Layer 2                    -->
  <!-- ============================================ -->
  <!-- L1:200 -> L2:260 -->
  <line x1="207" y1="342" x2="253" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:310 -> L2:260 -->
  <line x1="305" y1="341" x2="265" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:310 -> L2:420 -->
  <line x1="318" y1="342" x2="413" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:420 -> L2:420 -->
  <line x1="420" y1="340" x2="420" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:530 -> L2:420 -->
  <line x1="523" y1="342" x2="427" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:530 -> L2:580 -->
  <line x1="537" y1="342" x2="573" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L1:640 -> L2:580 -->
  <line x1="633" y1="342" x2="587" y2="258" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>

  <!-- ============================================ -->
  <!-- LAYER 2 — Middle (y=248): 3 committed nodes -->
  <!-- ============================================ -->
  <circle cx="260" cy="248" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="420" cy="248" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="580" cy="248" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- EDGES: Layer 2 -> Layer 3                    -->
  <!-- ============================================ -->
  <!-- L2:260 -> L3:340 -->
  <line x1="268" y1="240" x2="333" y2="172" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L2:420 -> L3:340 -->
  <line x1="413" y1="240" x2="347" y2="172" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L2:420 -> L3:530 -->
  <line x1="428" y1="240" x2="523" y2="172" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L2:580 -> L3:530 -->
  <line x1="574" y1="240" x2="537" y2="172" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>

  <!-- ============================================ -->
  <!-- LAYER 3 — Upper (y=162): 2 committed nodes  -->
  <!-- ============================================ -->
  <circle cx="340" cy="162" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>
  <circle cx="530" cy="162" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>

  <!-- ============================================ -->
  <!-- EDGES: Layer 3 -> Frontier                   -->
  <!-- ============================================ -->
  <!-- L3:340 -> F:380 (committed) -->
  <line x1="346" y1="153" x2="375" y2="96" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L3:530 -> F:380 (committed) -->
  <line x1="522" y1="154" x2="388" y2="96" stroke="#1e8449" stroke-width="1.3" marker-end="url(#edge-arr)"/>
  <!-- L3:530 -> F:560 (dashed purple, to pending node) -->
  <line x1="536" y1="153" x2="554" y2="96" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#purp-arr)"/>

  <!-- ============================================ -->
  <!-- FRONTIER — Top (y=85): 1 committed + 1 pending -->
  <!-- ============================================ -->
  <!-- Committed frontier node -->
  <circle cx="380" cy="85" r="10" fill="white" stroke="#1e8449" stroke-width="2"/>

  <!-- PENDING node — larger, dashed purple -->
  <circle cx="560" cy="85" r="14" fill="none" stroke="#7d3c98" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="560" y="58" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d3c98" letter-spacing="1">PENDING</text>

  <!-- ============================================ -->
  <!-- INCOMING DASHED BLUE ARROWS to pending node  -->
  <!-- Three approach lines from different angles   -->
  <!-- ============================================ -->

  <!-- Arrow 1: from upper-left (3 ticks away) -->
  <line x1="440" y1="38" x2="548" y2="78" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#blue-arr)"/>
  <circle cx="440" cy="38" r="4" fill="#2471a3" opacity="0.5"/>
  <text x="470" y="50" font-size="9" fill="#2471a3" font-style="italic">3 ticks away</text>

  <!-- Arrow 2: from left (5 ticks away) -->
  <line x1="420" y1="105" x2="547" y2="90" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#blue-arr)"/>
  <circle cx="420" cy="105" r="4" fill="#2471a3" opacity="0.5"/>
  <text x="445" y="118" font-size="9" fill="#2471a3" font-style="italic">5 ticks away</text>

  <!-- Arrow 3: from lower-left (7 ticks away) -->
  <line x1="460" y1="140" x2="552" y2="97" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#blue-arr)"/>
  <circle cx="460" cy="140" r="4" fill="#2471a3" opacity="0.5"/>
  <text x="462" y="157" font-size="9" fill="#2471a3" font-style="italic">7 ticks away</text>

  <!-- ============================================ -->
  <!-- NO CONSUMER indicator                        -->
  <!-- ============================================ -->
  <!-- Empty-set / crossed-out circle -->
  <circle cx="660" cy="85" r="12" fill="none" stroke="#c0392b" stroke-width="1.8"/>
  <line x1="651" y1="94" x2="669" y2="76" stroke="#c0392b" stroke-width="1.8"/>
  <text x="690" y="89" font-size="10" fill="#c0392b" font-weight="bold">no consumer</text>

  <!-- ============================================ -->
  <!-- RIGHT-SIDE ANNOTATION                        -->
  <!-- ============================================ -->
  <text x="775" y="170" font-size="11" fill="#888" font-style="italic" text-anchor="middle">Born.</text>
  <text x="775" y="186" font-size="11" fill="#888" font-style="italic" text-anchor="middle">Inputs arriving.</text>
  <text x="775" y="202" font-size="11" fill="#888" font-style="italic" text-anchor="middle">Nobody asking yet.</text>

  <!-- ============================================ -->
  <!-- LAYER LABELS (subtle, left side)             -->
  <!-- ============================================ -->
  <text x="85" y="354" font-size="9" fill="#aaa">past</text>
  <text x="85" y="89" font-size="9" fill="#aaa">frontier</text>

</svg>
