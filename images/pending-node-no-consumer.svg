<!-- DESCRIPTION: pending-node-no-consumer -->
<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gp"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ab" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4488cc"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#08080f"/>

  <!-- Label -->
  <text x="360" y="30" fill="#aa66ff" font-size="14" text-anchor="middle" font-family="Georgia" font-weight="bold">PENDING &#8212; no value yet</text>

  <!-- Center: large purple pending node -->
  <circle cx="360" cy="160" r="28" fill="#1a0a30" stroke="#aa66ff" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#gp)"/>
  <text x="360" y="168" fill="#cc99ff" font-size="22" text-anchor="middle" font-family="Georgia">?</text>

  <!-- Event 1: top-left, 7 ticks away -->
  <circle cx="100" cy="60" r="8" fill="#0a1a30" stroke="#4488cc" stroke-width="1.5"/>
  <line x1="108" y1="64" x2="334" y2="148" stroke="#4488cc" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="100" y="45" fill="#4488cc" font-size="10" text-anchor="middle" font-family="Georgia">E1</text>
  <text x="190" y="85" fill="#4488cc" font-size="10" font-family="Georgia">7 ticks away</text>

  <!-- Event 2: left, 4 ticks away -->
  <circle cx="80" cy="175" r="8" fill="#0a1a30" stroke="#4488cc" stroke-width="1.5"/>
  <line x1="88" y1="175" x2="332" y2="163" stroke="#4488cc" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="80" y="160" fill="#4488cc" font-size="10" text-anchor="middle" font-family="Georgia">E2</text>
  <text x="170" y="195" fill="#4488cc" font-size="10" font-family="Georgia">4 ticks away</text>

  <!-- Event 3: bottom-left, 9 ticks away -->
  <circle cx="130" cy="280" r="8" fill="#0a1a30" stroke="#4488cc" stroke-width="1.5"/>
  <line x1="137" y1="275" x2="340" y2="182" stroke="#4488cc" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ab)"/>
  <text x="130" y="300" fill="#4488cc" font-size="10" text-anchor="middle" font-family="Georgia">E3</text>
  <text x="200" y="255" fill="#4488cc" font-size="10" font-family="Georgia">9 ticks away</text>

  <!-- Right side: no consumer symbol -->
  <circle cx="570" cy="160" r="22" fill="none" stroke="#444444" stroke-width="1.5"/>
  <line x1="555" y1="175" x2="585" y2="145" stroke="#444444" stroke-width="1.5"/>
  <text x="570" y="200" fill="#555555" font-size="10" text-anchor="middle" font-family="Georgia">no consumer</text>

  <!-- Speech bubble -->
  <rect x="430" y="60" width="260" height="50" rx="8" fill="#111118" stroke="#333340" stroke-width="1"/>
  <polygon points="430,80 415,90 430,95" fill="#111118" stroke="#333340" stroke-width="1"/>
  <text x="445" y="80" fill="#777777" font-size="9.5" font-family="Georgia">I exist. Inputs are coming.</text>
  <text x="445" y="96" fill="#777777" font-size="9.5" font-family="Georgia">But nobody has asked me anything yet.</text>
</svg>
