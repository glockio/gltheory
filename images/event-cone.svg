<!-- DESCRIPTION: Event cone setup — part 1 of 3. Shows pending node P with surrounding graph topology, light cone (theoretical max), event cone (what actually reaches P before consumer arrives in 4 ticks), and three events at different distances. -->
<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gp"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="go"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e8449"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d35400"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c0392b"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="7" refX="5" refY="2.5" orient="auto">
      <path d="M0,0 L0,5 L7,2.5 z" fill="#999"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="900" height="420" fill="#ffffff"/>

  <!-- ============================================ -->
  <!-- LIGHT CONE: large dashed gray region         -->
  <!-- Opens leftward from P at (550,200)           -->
  <!-- ============================================ -->
  <path d="M 550,200 L 50,20 L 50,380 Z"
        fill="#f0f0f0" fill-opacity="0.5"
        stroke="#999" stroke-width="1.2" stroke-dasharray="8,5"/>
  <text x="68" y="375" fill="#888" font-size="13" font-family="DM Sans, sans-serif" font-weight="700">LIGHT CONE</text>
  <text x="68" y="392" fill="#aaa" font-size="10.5" font-family="DM Sans, sans-serif">everything that COULD ever reach P</text>

  <!-- ============================================ -->
  <!-- EVENT CONE: smaller teal shaded region       -->
  <!-- Only events within 4 hops (consumer budget)  -->
  <!-- ============================================ -->
  <path d="M 550,200 L 270,105 L 270,295 Z"
        fill="#a8dadc" fill-opacity="0.18"
        stroke="#a8dadc" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="285" y="96" fill="#2471a3" font-size="13" font-family="DM Sans, sans-serif" font-weight="700">EVENT CONE</text>
  <text x="285" y="112" fill="#6aa" font-size="10" font-family="DM Sans, sans-serif">what actually reaches P before the consumer asks</text>

  <!-- ============================================ -->
  <!-- NODE P: large purple dashed pending node     -->
  <!-- ============================================ -->
  <circle cx="550" cy="200" r="16" fill="#f3ecfa" stroke="#7d3c98" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#gp)"/>
  <text x="550" y="205" fill="#7d3c98" font-size="15" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700">P</text>
  <text x="550" y="181" fill="#7d3c98" font-size="10" text-anchor="middle" font-family="DM Sans, sans-serif">pending</text>

  <!-- ============================================ -->
  <!-- INTERMEDIATE GRAPH NODES                     -->
  <!-- ~10 small gray/neutral nodes forming paths   -->
  <!-- ============================================ -->

  <!-- Nodes along E1 path (1 hop: E1 -> P) -->
  <!-- E1 connects directly to P, no intermediates -->

  <!-- Nodes along E2 path (3 hops: E2 -> n4 -> n5 -> P) -->
  <circle cx="340" cy="230" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <circle cx="410" cy="218" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>

  <!-- Nodes along E3 path (6 hops: E3 -> n1 -> n2 -> n3 -> n6 -> n7 -> P) -->
  <circle cx="155" cy="165" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <circle cx="210" cy="195" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <circle cx="268" cy="180" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <circle cx="340" cy="170" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>
  <circle cx="430" cy="185" r="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1.2"/>

  <!-- Extra topology nodes (not on main paths, just graph texture) -->
  <circle cx="180" cy="260" r="4.5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <circle cx="240" cy="140" r="4.5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <circle cx="320" cy="280" r="4.5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <circle cx="390" cy="145" r="4.5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
  <circle cx="460" cy="250" r="4.5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>

  <!-- ============================================ -->
  <!-- EDGES: background graph connections (gray)   -->
  <!-- ============================================ -->

  <!-- Cross-links for texture -->
  <line x1="155" y1="165" x2="240" y2="140" stroke="#ccc" stroke-width="0.8"/>
  <line x1="210" y1="195" x2="180" y2="260" stroke="#ccc" stroke-width="0.8"/>
  <line x1="240" y1="140" x2="268" y2="180" stroke="#ccc" stroke-width="0.8"/>
  <line x1="268" y1="180" x2="320" y2="280" stroke="#ccc" stroke-width="0.8"/>
  <line x1="340" y1="170" x2="390" y2="145" stroke="#ccc" stroke-width="0.8"/>
  <line x1="340" y1="230" x2="320" y2="280" stroke="#ccc" stroke-width="0.8"/>
  <line x1="410" y1="218" x2="460" y2="250" stroke="#ccc" stroke-width="0.8"/>
  <line x1="430" y1="185" x2="390" y2="145" stroke="#ccc" stroke-width="0.8"/>
  <line x1="180" y1="260" x2="320" y2="280" stroke="#ccc" stroke-width="0.8"/>
  <line x1="460" y1="250" x2="550" y2="200" stroke="#ccc" stroke-width="0.8"/>

  <!-- ============================================ -->
  <!-- E1: green, 1 hop, ARRIVED                    -->
  <!-- ============================================ -->
  <circle cx="470" cy="175" r="8" fill="#e8f8e8" stroke="#1e8449" stroke-width="2" filter="url(#gg)"/>
  <text x="470" y="179" fill="#1e8449" font-size="9" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700">E1</text>

  <!-- E1 -> P: solid green line -->
  <line x1="478" y1="178" x2="535" y2="195" stroke="#1e8449" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- E1 label -->
  <text x="462" y="160" fill="#1e8449" font-size="10.5" text-anchor="end" font-family="DM Sans, sans-serif" font-weight="600">1 tick away</text>
  <text x="462" y="148" fill="#1e8449" font-size="10.5" text-anchor="end" font-family="DM Sans, sans-serif" font-weight="700">ARRIVED &#x2713;</text>

  <!-- ============================================ -->
  <!-- E2: orange, 3 hops, approaching              -->
  <!-- ============================================ -->
  <circle cx="285" cy="245" r="8" fill="#fdf2e9" stroke="#d35400" stroke-width="2"/>
  <text x="285" y="249" fill="#d35400" font-size="9" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700">E2</text>

  <!-- E2 path: E2 -> n4 (340,230) -> n5 (410,218) -> P -->
  <line x1="293" y1="243" x2="335" y2="232" stroke="#d35400" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <line x1="345" y1="229" x2="405" y2="220" stroke="#d35400" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <line x1="415" y1="216" x2="535" y2="203" stroke="#d35400" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>

  <!-- E2 label -->
  <text x="285" y="270" fill="#d35400" font-size="10.5" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="600">3 ticks away</text>
  <text x="285" y="283" fill="#d35400" font-size="9.5" text-anchor="middle" font-family="DM Sans, sans-serif">approaching</text>

  <!-- ============================================ -->
  <!-- E3: red, 6 hops, still traveling             -->
  <!-- ============================================ -->
  <circle cx="110" cy="175" r="8" fill="#fde9e9" stroke="#c0392b" stroke-width="2"/>
  <text x="110" y="179" fill="#c0392b" font-size="9" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700">E3</text>

  <!-- E3 path: E3 -> n1 (155,165) -> n2 (210,195) -> n3 (268,180) -> n6 (340,170) -> n7 (430,185) -> P -->
  <line x1="118" y1="173" x2="150" y2="167" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="160" y1="166" x2="205" y2="194" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="215" y1="193" x2="263" y2="182" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="273" y1="179" x2="335" y2="172" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="345" y1="170" x2="425" y2="185" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>
  <line x1="435" y1="186" x2="535" y2="197" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr-red)"/>

  <!-- E3 label -->
  <text x="110" y="200" fill="#c0392b" font-size="10.5" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="600">6 ticks away</text>
  <text x="110" y="213" fill="#c0392b" font-size="9.5" text-anchor="middle" font-family="DM Sans, sans-serif">still traveling</text>

  <!-- ============================================ -->
  <!-- CONSUMER: orange node below P                -->
  <!-- ============================================ -->
  <circle cx="600" cy="310" r="14" fill="#fdf2e9" stroke="#d35400" stroke-width="2.2" filter="url(#go)"/>
  <text x="600" y="315" fill="#d35400" font-size="12" text-anchor="middle" font-family="DM Sans, sans-serif" font-weight="700">C</text>

  <!-- Dashed line from consumer toward P -->
  <line x1="593" y1="297" x2="558" y2="216" stroke="#d35400" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>

  <!-- Consumer labels -->
  <text x="636" y="300" fill="#d35400" font-size="11" font-family="DM Sans, sans-serif" font-weight="700">CONSUMER</text>
  <text x="636" y="315" fill="#d35400" font-size="10" font-family="DM Sans, sans-serif">arrives in 4 ticks</text>

  <!-- ============================================ -->
  <!-- ANNOTATIONS: inside/edge/outside markers     -->
  <!-- ============================================ -->

  <!-- Bracket annotation for event cone boundary -->
  <text x="725" y="165" fill="#2471a3" font-size="9.5" font-family="DM Sans, sans-serif" text-anchor="start">E1: inside cone &#x2713;</text>
  <text x="725" y="180" fill="#d35400" font-size="9.5" font-family="DM Sans, sans-serif" text-anchor="start">E2: at the edge &#x2248;</text>
  <text x="725" y="195" fill="#c0392b" font-size="9.5" font-family="DM Sans, sans-serif" text-anchor="start">E3: outside cone &#x2717;</text>

  <!-- ============================================ -->
  <!-- BOTTOM CAPTION                               -->
  <!-- ============================================ -->
  <text x="450" y="395" fill="#666" font-size="11.5" text-anchor="middle" font-family="DM Sans, sans-serif" font-style="italic">The light cone is the theoretical maximum. The event cone is what actually counts.</text>
  <text x="450" y="412" fill="#666" font-size="11.5" text-anchor="middle" font-family="DM Sans, sans-serif" font-style="italic">When you're asked determines what's real.</text>
</svg>
