<!-- DESCRIPTION: event-cone -->
<svg viewBox="0 0 720 440" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gp"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="go"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#44cc66"/>
    </marker>
    <marker id="ao2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d35400"/>
    </marker>
  </defs>
  <rect width="720" height="440" fill="#08080f"/>

  <!-- LIGHT CONE: large dashed triangle opening leftward from NODE P -->
  <path d="M 480,200 L 60,40 L 60,360 Z" fill="none" stroke="#333340" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="80" y="385" fill="#444455" font-size="11" font-family="Georgia">LIGHT CONE</text>
  <text x="80" y="400" fill="#333344" font-size="10" font-family="Georgia">everything that COULD reach P</text>

  <!-- EVENT CONE: smaller teal shaded region inside the light cone -->
  <path d="M 480,200 L 220,120 L 220,280 Z" fill="#a8dadc" fill-opacity="0.08" stroke="#a8dadc" stroke-width="1.2" stroke-dasharray="4,3"/>
  <text x="250" y="108" fill="#a8dadc" font-size="12" font-family="Georgia" font-weight="bold">EVENT CONE</text>
  <text x="250" y="124" fill="#668888" font-size="10" font-family="Georgia">what actually reaches P before the consumer asks</text>

  <!-- NODE P: large purple pending node -->
  <circle cx="480" cy="200" r="24" fill="#1a0a30" stroke="#aa66ff" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#gp)"/>
  <text x="480" y="195" fill="#cc99ff" font-size="11" text-anchor="middle" font-family="Georgia">NODE</text>
  <text x="480" y="210" fill="#cc99ff" font-size="14" text-anchor="middle" font-family="Georgia" font-weight="bold">P</text>

  <!-- E1: green, arrived, 1 tick away -->
  <circle cx="400" cy="175" r="10" fill="#1a3a1a" stroke="#44cc66" stroke-width="2" filter="url(#gg)"/>
  <line x1="410" y1="178" x2="456" y2="193" stroke="#44cc66" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="400" y="158" fill="#44cc66" font-size="10" text-anchor="middle" font-family="Georgia">E1</text>
  <text x="415" y="155" fill="#44cc66" font-size="9" font-family="Georgia">1 tick &#8212; ARRIVED &#10003;</text>

  <!-- E2: orange, close, 3 ticks away — inside event cone -->
  <circle cx="300" cy="220" r="10" fill="#1a1000" stroke="#d35400" stroke-width="2"/>
  <line x1="310" y1="218" x2="456" y2="203" stroke="#d35400" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#ao2)"/>
  <text x="300" y="205" fill="#d35400" font-size="10" text-anchor="middle" font-family="Georgia">E2</text>
  <text x="310" y="248" fill="#d35400" font-size="9" font-family="Georgia">3 ticks away</text>

  <!-- E3: red, far, 8 ticks — outside event cone but inside light cone -->
  <circle cx="120" cy="180" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2"/>
  <line x1="130" y1="182" x2="456" y2="198" stroke="#cc4444" stroke-width="0.8" stroke-dasharray="4,3"/>
  <text x="120" y="165" fill="#cc4444" font-size="10" text-anchor="middle" font-family="Georgia">E3</text>
  <text x="135" y="205" fill="#cc4444" font-size="9" font-family="Georgia">8 ticks away</text>
  <text x="135" y="220" fill="#884444" font-size="9" font-family="Georgia">&#10007; won't make it</text>

  <!-- CONSUMER: below node P -->
  <circle cx="540" cy="330" r="16" fill="#1a1000" stroke="#d35400" stroke-width="2" filter="url(#go)"/>
  <text x="540" y="335" fill="#d35400" font-size="12" text-anchor="middle" font-family="Georgia" font-weight="bold">C</text>
  <text x="540" y="310" fill="#d35400" font-size="10" text-anchor="middle" font-family="Georgia">CONSUMER</text>
  <text x="540" y="362" fill="#885500" font-size="10" text-anchor="middle" font-family="Georgia">arrives in 4 ticks</text>

  <!-- Dashed line from consumer toward P -->
  <line x1="530" y1="315" x2="490" y2="224" stroke="#d35400" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Bottom text -->
  <text x="360" y="420" fill="#666666" font-size="11" text-anchor="middle" font-family="Georgia">The light cone is the theoretical maximum. The event cone is what actually counts.</text>
</svg>
