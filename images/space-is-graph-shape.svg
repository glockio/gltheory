    <circle cx="340" cy="153" r="2" fill="#1a1a1a"/><circle cx="360" cy="155" r="2" fill="#1a1a1a"/><circle cx="380" cy="151" r="2" fill="#1a1a1a"/><circle cx="400" cy="156" r="2" fill="#1a1a1a"/><circle cx="420" cy="149" r="2" fill="#1a1a1a"/><circle cx="440" cy="154" r="2" fill="#1a1a1a"/><circle cx="460" cy="157" r="2" fill="#1a1a1a"/><circle cx="480" cy="152" r="2" fill="#1a1a1a"/><circle cx="500" cy="155" r="2" fill="#1a1a1a"/><circle cx="520" cy="151" r="2" fill="#1a1a1a"/><circle cx="540" cy="156" r="2" fill="#1a1a1a"/><circle cx="558" cy="153" r="2" fill="#1a1a1a"/>
