<!-- DESCRIPTION: One graph with two clear branches. Root at top. Left branch: Root → A → C (three nodes in a chain, arrows showing sequential dependency, labeled "SEQUENTIAL — C must wait for A. A must wait for Root."). Right branch: Root → B (single node, no dependency on A or C, labeled "PARALLEL — B can evaluate any time. No ordering constraint with A or C."). Below: "Causally connected = ordered. Causally disconnected = free. This is topological ordering." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="DM Sans, sans-serif">
  <!-- Background -->
  <rect width="800" height="340" fill="white" fill-opacity="0"/>

  <!-- Marker for arrows -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1a1a1a" stroke="none"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2471a3" stroke="none"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1e8449" stroke="none"/>
    </marker>
  </defs>

  <!-- ROOT node -->
  <circle cx="400" cy="45" r="18" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <text x="400" y="50" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a1a">Root</text>

  <!-- LEFT BRANCH: Root → A → C -->
  <!-- Arrow Root → A -->
  <line x1="385" y1="60" x2="230" y2="120" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Node A -->
  <circle cx="220" cy="135" r="18" fill="white" stroke="#2471a3" stroke-width="2.5"/>
  <text x="220" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#2471a3">A</text>

  <!-- Arrow A → C -->
  <line x1="220" y1="155" x2="220" y2="200" stroke="#2471a3" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- Node C -->
  <circle cx="220" cy="218" r="18" fill="white" stroke="#2471a3" stroke-width="2.5"/>
  <text x="220" y="223" text-anchor="middle" font-size="14" font-weight="bold" fill="#2471a3">C</text>

  <!-- Sequential label -->
  <text x="105" y="100" font-size="11" font-weight="bold" fill="#c0392b">SEQUENTIAL</text>
  <text x="60" y="118" font-size="10" fill="#7a7a6a">C must wait for A.</text>
  <text x="60" y="132" font-size="10" fill="#7a7a6a">A must wait for Root.</text>

  <!-- Bracket line left -->
  <line x1="145" y1="60" x2="145" y2="240" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- RIGHT BRANCH: Root → B -->
  <!-- Arrow Root → B -->
  <line x1="415" y1="60" x2="570" y2="120" stroke="#1e8449" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Node B -->
  <circle cx="580" cy="135" r="18" fill="white" stroke="#1e8449" stroke-width="2.5"/>
  <text x="580" y="140" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e8449">B</text>

  <!-- Parallel label -->
  <text x="620" y="100" font-size="11" font-weight="bold" fill="#1e8449">PARALLEL</text>
  <text x="620" y="118" font-size="10" fill="#7a7a6a">B can evaluate any time.</text>
  <text x="620" y="132" font-size="10" fill="#7a7a6a">No ordering constraint</text>
  <text x="620" y="146" font-size="10" fill="#7a7a6a">with A or C.</text>

  <!-- Bracket line right -->
  <line x1="655" y1="60" x2="655" y2="240" stroke="#1e8449" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- No-connection indicator between B and A/C -->
  <line x1="350" y1="150" x2="530" y2="150" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="3,5" opacity="0.4"/>
  <text x="440" y="165" text-anchor="middle" font-size="9" fill="#7a7a6a" font-style="italic">no dependency</text>

  <!-- Bottom caption -->
  <line x1="100" y1="280" x2="700" y2="280" stroke="#1a1a1a" stroke-width="0.5" opacity="0.2"/>
  <text x="400" y="305" text-anchor="middle" font-size="13" fill="#1a1a1a">Causally connected = ordered. Causally disconnected = free.</text>
  <text x="400" y="325" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">This is topological ordering.</text>
</svg>
