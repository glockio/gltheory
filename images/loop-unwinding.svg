<!-- DESCRIPTION: loop-unwinding -->
<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gr"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="go"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#cc4444"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d35400"/>
    </marker>
    <marker id="aw" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#a8dadc"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#08080f"/>

  <!-- LEFT: MASS — loop -->
  <text x="170" y="38" fill="#cc4444" font-size="14" text-anchor="middle" font-family="Georgia" font-weight="bold">MASS</text>
  <text x="170" y="56" fill="#884444" font-size="11" text-anchor="middle" font-family="Georgia">trapped computation</text>

  <!-- loop of 8 red nodes -->
  <circle cx="170" cy="100" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="220" cy="120" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="230" cy="170" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="200" cy="210" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="140" cy="210" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="110" cy="170" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>
  <circle cx="120" cy="120" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="2" filter="url(#gr)"/>

  <!-- clockwise arrows around the loop -->
  <line x1="180" y1="105" x2="210" y2="115" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="228" y1="130" x2="232" y2="158" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="225" y1="180" x2="210" y2="203" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="190" y1="215" x2="152" y2="215" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="132" y1="205" x2="115" y2="182" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="112" y1="160" x2="115" y2="132" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>
  <line x1="130" y1="115" x2="158" y2="105" stroke="#cc4444" stroke-width="1.2" marker-end="url(#ar)"/>

  <text x="170" y="260" fill="#664444" font-size="11" text-anchor="middle" font-family="Georgia">cycling inward</text>

  <!-- CENTER: Big arrow -->
  <line x1="290" y1="160" x2="420" y2="160" stroke="#a8dadc" stroke-width="3" marker-end="url(#aw)"/>
  <text x="355" y="140" fill="#ffffff" font-size="15" text-anchor="middle" font-family="Georgia" font-weight="bold">ANNIHILATION</text>
  <text x="355" y="190" fill="#666666" font-size="11" text-anchor="middle" font-family="Georgia">loop unwinds</text>

  <!-- RIGHT: ENERGY — starburst -->
  <text x="560" y="38" fill="#d35400" font-size="14" text-anchor="middle" font-family="Georgia" font-weight="bold">ENERGY</text>
  <text x="560" y="56" fill="#885500" font-size="11" text-anchor="middle" font-family="Georgia">computation released</text>

  <!-- center dot -->
  <circle cx="560" cy="160" r="7" fill="#1a1000" stroke="#d35400" stroke-width="2" filter="url(#go)"/>

  <!-- 8 radiating arrows -->
  <line x1="567" y1="153" x2="620" y2="95" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="570" y1="160" x2="640" y2="160" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="567" y1="167" x2="620" y2="225" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="560" y1="170" x2="560" y2="240" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="553" y1="167" x2="500" y2="225" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="550" y1="160" x2="480" y2="160" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="553" y1="153" x2="500" y2="95" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <line x1="560" y1="150" x2="560" y2="80" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>

  <!-- small dots at arrow ends -->
  <circle cx="625" cy="90" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="645" cy="160" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="625" cy="230" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="560" cy="245" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="495" cy="230" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="475" cy="160" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="495" cy="90" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>
  <circle cx="560" cy="75" r="5" fill="#1a1000" stroke="#d35400" stroke-width="1.5" filter="url(#go)"/>

  <text x="560" y="275" fill="#885500" font-size="11" text-anchor="middle" font-family="Georgia">propagating outward at C</text>

  <!-- Bottom label -->
  <text x="360" y="305" fill="#cccccc" font-size="12" text-anchor="middle" font-family="Georgia">E = mc&#178; is this. The loop unwinds.</text>
</svg>
