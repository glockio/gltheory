<!-- DESCRIPTION: Two-panel figure showing mass-to-radiation unraveling. Left panel (red border, "MASS"): a dense knot of 7 interconnected nodes with cycling internal arrows forming a self-perpetuating topology. Right panel (orange border, "RADIATION"): the same number of edges now radiating outward as straight arrows from a central point, dots at each tip. Large arrow between panels labeled "ANNIHILATION / the knot unravels". Bottom caption: "Same edges. Different arrangement. An atomic bomb isn't a conversion. It's an unraveling." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="DM Sans, sans-serif">
  <rect width="900" height="350" fill="white"/>

  <defs>
    <marker id="ar-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#c0392b" stroke="none"/>
    </marker>
    <marker id="ar-orange" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#d35400" stroke="none"/>
    </marker>
    <marker id="ar-dark" markerWidth="9" markerHeight="6" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6" fill="#2c3e50" stroke="none"/>
    </marker>
  </defs>

  <!-- ============================================ -->
  <!-- LEFT PANEL: MASS (red border)                -->
  <!-- ============================================ -->
  <rect x="30" y="30" width="330" height="260" rx="8" fill="white" stroke="#c0392b" stroke-width="2"/>

  <!-- Label above -->
  <text x="195" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#c0392b">MASS</text>

  <!-- Dense knot: 7 nodes in a tight cluster -->
  <!-- Node positions (clustered around center ~195, 155) -->
  <circle cx="195" cy="110" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N1 top -->
  <circle cx="235" cy="130" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N2 top-right -->
  <circle cx="245" cy="170" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N3 right -->
  <circle cx="215" cy="200" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N4 bottom-right -->
  <circle cx="175" cy="200" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N5 bottom-left -->
  <circle cx="145" cy="170" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N6 left -->
  <circle cx="155" cy="130" r="7" fill="white" stroke="#c0392b" stroke-width="2"/>  <!-- N7 top-left -->

  <!-- Internal cycling arrows (dense web of connections) -->
  <!-- Outer ring: clockwise -->
  <line x1="203" y1="114" x2="227" y2="126" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="241" y1="137" x2="247" y2="162" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="240" y1="176" x2="222" y2="194" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="208" y1="204" x2="183" y2="204" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="169" y1="196" x2="150" y2="178" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="147" y1="163" x2="152" y2="138" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>
  <line x1="162" y1="126" x2="187" y2="114" stroke="#c0392b" stroke-width="1.3" marker-end="url(#ar-red)"/>

  <!-- Cross connections (making it dense/knotted) -->
  <line x1="200" y1="117" x2="240" y2="164" stroke="#c0392b" stroke-width="1" opacity="0.5" marker-end="url(#ar-red)"/>
  <line x1="230" y1="136" x2="182" y2="194" stroke="#c0392b" stroke-width="1" opacity="0.5" marker-end="url(#ar-red)"/>
  <line x1="238" y1="174" x2="162" y2="134" stroke="#c0392b" stroke-width="1" opacity="0.5" marker-end="url(#ar-red)"/>
  <line x1="210" y1="194" x2="152" y2="136" stroke="#c0392b" stroke-width="1" opacity="0.5" marker-end="url(#ar-red)"/>
  <line x1="150" y1="165" x2="188" y2="114" stroke="#c0392b" stroke-width="1" opacity="0.5" marker-end="url(#ar-red)"/>

  <!-- Label below structure -->
  <text x="195" y="240" text-anchor="middle" font-size="10" fill="#888" font-style="italic">internal edges maintaining the shape</text>

  <!-- ============================================ -->
  <!-- CENTER: Large arrow with labels              -->
  <!-- ============================================ -->
  <line x1="395" y1="160" x2="520" y2="160" stroke="#2c3e50" stroke-width="3" marker-end="url(#ar-dark)"/>

  <!-- Label above arrow -->
  <text x="460" y="138" text-anchor="middle" font-size="14" font-weight="bold" fill="#2c3e50">ANNIHILATION</text>

  <!-- Label below arrow -->
  <text x="460" y="185" text-anchor="middle" font-size="10.5" fill="#888" font-style="italic">the knot unravels</text>

  <!-- ============================================ -->
  <!-- RIGHT PANEL: RADIATION (orange border)       -->
  <!-- ============================================ -->
  <rect x="545" y="30" width="330" height="260" rx="8" fill="white" stroke="#d35400" stroke-width="2"/>

  <!-- Label above -->
  <text x="710" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#d35400">RADIATION</text>

  <!-- Central point -->
  <circle cx="710" cy="155" r="6" fill="#d35400" stroke="#d35400" stroke-width="1.5" opacity="0.4"/>

  <!-- 12 radiating arrows (starburst) — same edge count as the knot -->
  <!-- Up -->
  <line x1="710" y1="148" x2="710" y2="80" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Up-right -->
  <line x1="715" y1="149" x2="758" y2="90" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Right -->
  <line x1="717" y1="155" x2="800" y2="155" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Down-right -->
  <line x1="715" y1="161" x2="758" y2="220" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Down -->
  <line x1="710" y1="162" x2="710" y2="230" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Down-left -->
  <line x1="705" y1="161" x2="662" y2="220" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Left -->
  <line x1="703" y1="155" x2="620" y2="155" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Up-left -->
  <line x1="705" y1="149" x2="662" y2="90" stroke="#d35400" stroke-width="1.5" marker-end="url(#ar-orange)"/>
  <!-- Additional diagonals for density -->
  <line x1="714" y1="150" x2="780" y2="100" stroke="#d35400" stroke-width="1.2" opacity="0.7" marker-end="url(#ar-orange)"/>
  <line x1="706" y1="150" x2="640" y2="100" stroke="#d35400" stroke-width="1.2" opacity="0.7" marker-end="url(#ar-orange)"/>
  <line x1="714" y1="160" x2="780" y2="210" stroke="#d35400" stroke-width="1.2" opacity="0.7" marker-end="url(#ar-orange)"/>
  <line x1="706" y1="160" x2="640" y2="210" stroke="#d35400" stroke-width="1.2" opacity="0.7" marker-end="url(#ar-orange)"/>

  <!-- Small dots at arrow tips -->
  <circle cx="710" cy="76" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="762" cy="86" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="805" cy="155" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="762" cy="224" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="710" cy="234" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="658" cy="224" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="616" cy="155" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="658" cy="86" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="784" cy="96" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="636" cy="96" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="784" cy="214" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="636" cy="214" r="4" fill="white" stroke="#d35400" stroke-width="1.5"/>

  <!-- Label below structure -->
  <text x="710" y="258" text-anchor="middle" font-size="10" fill="#888" font-style="italic">internal edges freed, propagating outward at C</text>

  <!-- ============================================ -->
  <!-- BOTTOM CAPTION                               -->
  <!-- ============================================ -->
  <text x="450" y="325" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#2c3e50">Same edges. Different arrangement. An atomic bomb isn't a conversion. It's an unraveling.</text>
</svg>
