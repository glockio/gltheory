<!-- DESCRIPTION: Left: a small directed graph (A to B to C) in blue labeled "GRAPH." Center: its mirror (C to B to A) in red labeled "MIRROR (INVERSE)." Between them a plus sign. Then equals sign. Then a sparkle/burst labeled "Nothing. They cancel." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- GRAPH: A → B → C -->
  <text x="110" y="30" text-anchor="middle" fill="#2471a3" font-size="13" font-weight="bold">GRAPH</text>

  <!-- Node A -->
  <circle cx="45" cy="90" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="45" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">A</text>
  <!-- Arrow A→B -->
  <line x1="61" y1="90" x2="89" y2="90" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="89,85 99,90 89,95" fill="#1a1a1a"/>

  <!-- Node B -->
  <circle cx="115" cy="90" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="115" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">B</text>
  <!-- Arrow B→C -->
  <line x1="131" y1="90" x2="159" y2="90" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="159,85 169,90 159,95" fill="#1a1a1a"/>

  <!-- Node C -->
  <circle cx="185" cy="90" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="185" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">C</text>

  <!-- PLUS SIGN -->
  <text x="240" y="98" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="bold">+</text>

  <!-- MIRROR (INVERSE): C → B → A -->
  <text x="380" y="30" text-anchor="middle" fill="#c0392b" font-size="13" font-weight="bold">MIRROR (INVERSE)</text>

  <!-- Node C -->
  <circle cx="305" cy="90" r="16" fill="#c0392b" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="305" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">C</text>
  <!-- Arrow C→B -->
  <line x1="321" y1="90" x2="349" y2="90" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="349,85 359,90 349,95" fill="#1a1a1a"/>

  <!-- Node B -->
  <circle cx="375" cy="90" r="16" fill="#c0392b" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="375" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">B</text>
  <!-- Arrow B→A -->
  <line x1="391" y1="90" x2="419" y2="90" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="419,85 429,90 419,95" fill="#1a1a1a"/>

  <!-- Node A -->
  <circle cx="445" cy="90" r="16" fill="#c0392b" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="445" y="95" text-anchor="middle" fill="white" font-size="13" font-weight="bold">A</text>

  <!-- EQUALS SIGN -->
  <text x="508" y="98" text-anchor="middle" fill="#1a1a1a" font-size="28" font-weight="bold">=</text>

  <!-- SPARKLE / BURST -->
  <!-- Central point -->
  <circle cx="640" cy="90" r="4" fill="#d4a017"/>

  <!-- Burst rays -->
  <line x1="640" y1="62" x2="640" y2="118" stroke="#d4a017" stroke-width="2"/>
  <line x1="612" y1="90" x2="668" y2="90" stroke="#d4a017" stroke-width="2"/>
  <line x1="620" y1="70" x2="660" y2="110" stroke="#d4a017" stroke-width="1.5"/>
  <line x1="660" y1="70" x2="620" y2="110" stroke="#d4a017" stroke-width="1.5"/>

  <!-- Smaller accent rays -->
  <line x1="640" y1="56" x2="640" y2="52" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="640" y1="124" x2="640" y2="128" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="606" y1="90" x2="602" y2="90" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="674" y1="90" x2="678" y2="90" stroke="#d4a017" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Small sparkle dots -->
  <circle cx="615" cy="65" r="2" fill="#d4a017"/>
  <circle cx="665" cy="65" r="2" fill="#d4a017"/>
  <circle cx="615" cy="115" r="2" fill="#d4a017"/>
  <circle cx="665" cy="115" r="2" fill="#d4a017"/>

  <!-- "Nothing" label -->
  <text x="640" y="155" text-anchor="middle" fill="#7a7a6a" font-size="12" font-weight="bold">Nothing.</text>
  <text x="640" y="172" text-anchor="middle" fill="#7a7a6a" font-size="11">They cancel.</text>
</svg>
