<!-- DESCRIPTION: A single graph viewed from above. The main visible graph is drawn in green — nodes and edges forming a connected web. Labeled: "Visible matter — connected, consumers exist, events commit into our reality." Nearby but NOT connected by any edges: a second cluster of gray/blue nodes and edges, forming its own self-contained topology with internal loops and density. Labeled: "Dark matter — self-perpetuating topology. Has mass (density). No edges into our graph. No consumer in our region." Around the dark matter cluster: subtle concentric dashed rings radiating outward, reaching the visible graph — representing routing pressure / gravitational effect. Labeled: "Routing pressure — gravity. The curvature is real even though we can't see the source." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- White background -->
  <rect width="800" height="450" fill="white"/>

  <!-- ============================================ -->
  <!-- CONCENTRIC DASHED RINGS (routing pressure)   -->
  <!-- Centered on dark matter cluster at ~560,220  -->
  <!-- Drawn first so they sit behind everything    -->
  <!-- ============================================ -->
  <circle cx="560" cy="220" r="60" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="4,4" opacity="0.2"/>
  <circle cx="560" cy="220" r="95" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="5,5" opacity="0.18"/>
  <circle cx="560" cy="220" r="130" fill="none" stroke="#7a7a6a" stroke-width="0.7" stroke-dasharray="6,6" opacity="0.15"/>
  <circle cx="560" cy="220" r="170" fill="none" stroke="#7a7a6a" stroke-width="0.7" stroke-dasharray="7,7" opacity="0.12"/>
  <circle cx="560" cy="220" r="215" fill="none" stroke="#7a7a6a" stroke-width="0.6" stroke-dasharray="8,8" opacity="0.10"/>
  <circle cx="560" cy="220" r="265" fill="none" stroke="#7a7a6a" stroke-width="0.6" stroke-dasharray="9,9" opacity="0.08"/>

  <!-- ============================================ -->
  <!-- VISIBLE MATTER GRAPH (green, left side)      -->
  <!-- Connected web of nodes and edges             -->
  <!-- ============================================ -->

  <!-- Edges first (behind nodes) -->
  <line x1="80" y1="120" x2="140" y2="85" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="80" y1="120" x2="120" y2="180" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="85" x2="210" y2="100" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="85" x2="170" y2="155" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="100" x2="170" y2="155" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="100" x2="280" y2="130" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="100" x2="260" y2="70" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="155" x2="120" y2="180" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="155" x2="230" y2="195" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="180" x2="100" y2="250" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="120" y1="180" x2="180" y2="240" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="195" x2="280" y2="130" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="195" x2="180" y2="240" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="195" x2="300" y2="230" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="130" x2="340" y2="160" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="280" y1="130" x2="260" y2="70" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="250" x2="180" y2="240" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="100" y1="250" x2="140" y2="310" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="180" y1="240" x2="250" y2="280" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="180" y1="240" x2="140" y2="310" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="300" y1="230" x2="340" y2="160" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="300" y1="230" x2="250" y2="280" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="300" y1="230" x2="340" y2="290" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="280" x2="340" y2="290" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="280" x2="200" y2="340" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="310" x2="200" y2="340" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="160" x2="370" y2="210" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>
  <line x1="340" y1="290" x2="370" y2="210" stroke="#1e8449" stroke-width="1.5" opacity="0.6"/>

  <!-- Nodes -->
  <circle cx="80" cy="120" r="5" fill="#1e8449"/>
  <circle cx="140" cy="85" r="5" fill="#1e8449"/>
  <circle cx="210" cy="100" r="5" fill="#1e8449"/>
  <circle cx="260" cy="70" r="4" fill="#1e8449"/>
  <circle cx="170" cy="155" r="5" fill="#1e8449"/>
  <circle cx="120" cy="180" r="5" fill="#1e8449"/>
  <circle cx="230" cy="195" r="5" fill="#1e8449"/>
  <circle cx="280" cy="130" r="5" fill="#1e8449"/>
  <circle cx="100" cy="250" r="5" fill="#1e8449"/>
  <circle cx="180" cy="240" r="5" fill="#1e8449"/>
  <circle cx="300" cy="230" r="5" fill="#1e8449"/>
  <circle cx="340" cy="160" r="5" fill="#1e8449"/>
  <circle cx="250" cy="280" r="5" fill="#1e8449"/>
  <circle cx="340" cy="290" r="4" fill="#1e8449"/>
  <circle cx="140" cy="310" r="4" fill="#1e8449"/>
  <circle cx="200" cy="340" r="4" fill="#1e8449"/>
  <circle cx="370" cy="210" r="4" fill="#1e8449"/>

  <!-- ============================================ -->
  <!-- DARK MATTER CLUSTER (blue/gray, right side)  -->
  <!-- Self-contained, NOT connected to green graph -->
  <!-- Internal loops and density                   -->
  <!-- ============================================ -->

  <!-- Internal edges (dense, looping topology) -->
  <line x1="520" y1="180" x2="550" y2="165" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="550" y1="165" x2="590" y2="170" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="590" y1="170" x2="600" y2="200" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="600" y1="200" x2="580" y2="230" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="580" y1="230" x2="545" y2="250" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="545" y1="250" x2="515" y2="235" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="515" y1="235" x2="520" y2="200" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <line x1="520" y1="200" x2="520" y2="180" stroke="#2471a3" stroke-width="1.5" opacity="0.45"/>
  <!-- Internal cross-connections (loops) -->
  <line x1="520" y1="180" x2="590" y2="170" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="550" y1="165" x2="600" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="550" y1="165" x2="520" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="590" y1="170" x2="580" y2="230" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="600" y1="200" x2="545" y2="250" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="580" y1="230" x2="520" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="515" y1="235" x2="550" y2="165" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="520" y1="200" x2="580" y2="230" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <line x1="520" y1="200" x2="600" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.3"/>
  <!-- Second ring of internal edges -->
  <line x1="555" y1="195" x2="520" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="590" y2="170" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="600" y2="200" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="580" y2="230" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="550" y2="165" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="545" y2="250" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>
  <line x1="555" y1="195" x2="515" y2="235" stroke="#2471a3" stroke-width="1.2" opacity="0.35"/>

  <!-- Dark matter nodes -->
  <circle cx="520" cy="180" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="550" cy="165" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="590" cy="170" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="600" cy="200" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="580" cy="230" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="545" cy="250" r="4.5" fill="#2471a3" opacity="0.7"/>
  <circle cx="515" cy="235" r="4.5" fill="#2471a3" opacity="0.7"/>
  <circle cx="520" cy="200" r="5" fill="#2471a3" opacity="0.7"/>
  <circle cx="555" cy="195" r="6" fill="#2471a3" opacity="0.8"/>

  <!-- ============================================ -->
  <!-- GAP — no edges between green and blue        -->
  <!-- The empty space between ~370 and ~515 is     -->
  <!-- intentional: these graphs are NOT connected  -->
  <!-- ============================================ -->

  <!-- ============================================ -->
  <!-- LABELS                                       -->
  <!-- ============================================ -->

  <!-- Visible matter label (top-left) -->
  <text x="60" y="42" font-size="13" fill="#1e8449" font-weight="700">Visible matter</text>
  <text x="60" y="58" font-size="10" fill="#7a7a6a" font-style="italic">Connected. Consumers exist.</text>
  <text x="60" y="72" font-size="10" fill="#7a7a6a" font-style="italic">Events commit into our reality.</text>

  <!-- Dark matter label (top-right) -->
  <text x="490" y="130" font-size="13" fill="#2471a3" font-weight="700">Dark matter</text>
  <text x="490" y="146" font-size="10" fill="#7a7a6a" font-style="italic">Self-perpetuating topology. Has mass (density).</text>
  <text x="490" y="160" font-size="10" fill="#7a7a6a" font-style="italic">No edges into our graph. No consumer in our region.</text>

  <!-- "No connection" indicator — small X marks in the gap -->
  <g opacity="0.25">
    <line x1="430" y1="185" x2="440" y2="195" stroke="#7a7a6a" stroke-width="1.2"/>
    <line x1="440" y1="185" x2="430" y2="195" stroke="#7a7a6a" stroke-width="1.2"/>
    <line x1="445" y1="215" x2="455" y2="225" stroke="#7a7a6a" stroke-width="1.2"/>
    <line x1="455" y1="215" x2="445" y2="225" stroke="#7a7a6a" stroke-width="1.2"/>
  </g>
  <text x="435" y="175" text-anchor="middle" font-size="8" fill="#7a7a6a" opacity="0.5">no edges</text>

  <!-- Routing pressure label (bottom) -->
  <text x="560" y="310" text-anchor="middle" font-size="12" fill="#7a7a6a" font-weight="600">Routing pressure -- gravity</text>
  <text x="560" y="326" text-anchor="middle" font-size="10" fill="#7a7a6a" font-style="italic">The curvature is real even though</text>
  <text x="560" y="340" text-anchor="middle" font-size="10" fill="#7a7a6a" font-style="italic">we can't see the source.</text>

  <!-- Small arrow from dashed rings to label -->
  <line x1="560" y1="295" x2="560" y2="300" stroke="#7a7a6a" stroke-width="0.8" opacity="0.4"/>
  <polyline points="555,296 560,302 565,296" fill="none" stroke="#7a7a6a" stroke-width="0.8" opacity="0.4"/>

  <!-- Annotation: dashed ring reaching the green graph -->
  <line x1="370" y1="370" x2="340" y2="290" stroke="#7a7a6a" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.3"/>
  <text x="350" y="385" text-anchor="middle" font-size="9" fill="#7a7a6a" opacity="0.6" font-style="italic">pressure reaches visible graph</text>

  <!-- Subtle annotation arrow from rings toward green graph -->
  <path d="M 430,260 Q 400,270 370,215" fill="none" stroke="#7a7a6a" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.25" marker-end="url(#arrowMuted)"/>

  <!-- Arrowhead definition -->
  <defs>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7a7a6a" opacity="0.4"/>
    </marker>
  </defs>
</svg>
