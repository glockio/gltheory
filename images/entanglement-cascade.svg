<!-- DESCRIPTION: Sequence figure. (1) Consumer connects to A. (2) Green cascade arrow: detector → A → shared node SH. (3) SH commits, shows result "R" in green badge. (4) Consumer connects to B. (5) Orange cascade arrow: detector → B → SH (already committed). B reads R. Central label: "SH commits ONCE. Both read the same result. No signal between A and B." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- Background -->
  <rect width="900" height="380" fill="#faf8f3" rx="4"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrG" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1e8449"/>
    </marker>
    <marker id="arrO" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d35400"/>
    </marker>
  </defs>

  <!-- Divider -->
  <line x1="450" y1="30" x2="450" y2="330" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- === LEFT: MEASURE A === -->
  <text x="225" y="25" text-anchor="middle" font-size="12" fill="#1e8449" font-weight="700" letter-spacing="1.5">STEP 1: MEASURE A</text>

  <!-- Detector for A -->
  <circle cx="100" cy="70" r="20" fill="#1e8449" stroke="#145a32" stroke-width="2"/>
  <text x="100" y="74" text-anchor="middle" font-size="8" fill="white" font-weight="700">DETECTOR</text>

  <!-- Particle A -->
  <circle cx="100" cy="150" r="24" fill="#edf8f1" stroke="#1e8449" stroke-width="2.5"/>
  <text x="100" y="156" text-anchor="middle" font-size="15" fill="#1e8449" font-weight="700">A</text>

  <!-- Cascade arrow: detector → A -->
  <line x1="100" y1="90" x2="100" y2="124" stroke="#1e8449" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- Step number -->
  <circle cx="60" cy="110" r="12" fill="#1e8449"/>
  <text x="60" y="114" text-anchor="middle" font-size="10" fill="white" font-weight="700">1</text>

  <!-- Shared node SH — committing -->
  <circle cx="225" cy="250" r="24" fill="#edf8f1" stroke="#1e8449" stroke-width="3"/>
  <text x="225" y="245" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="700">SH</text>
  <text x="225" y="261" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="700">= R</text>

  <!-- Cascade arrow: A → SH -->
  <line x1="116" y1="168" x2="207" y2="234" stroke="#1e8449" stroke-width="2.5" marker-end="url(#arrG)"/>

  <!-- Step number -->
  <circle cx="142" cy="195" r="12" fill="#1e8449"/>
  <text x="142" y="199" text-anchor="middle" font-size="10" fill="white" font-weight="700">2</text>

  <!-- Green cascade label -->
  <text x="155" y="220" font-size="10" fill="#1e8449" font-weight="600" transform="rotate(-35, 155, 220)">cascade</text>

  <!-- Committed badge -->
  <rect x="262" y="238" width="80" height="24" rx="12" fill="#1e8449"/>
  <text x="302" y="254" text-anchor="middle" font-size="10" fill="white" font-weight="700">COMMITS R</text>

  <!-- Step number -->
  <circle cx="262" cy="218" r="12" fill="#1e8449"/>
  <text x="262" y="222" text-anchor="middle" font-size="10" fill="white" font-weight="700">3</text>

  <!-- Particle B (in left panel, distant, faded) -->
  <circle cx="350" cy="150" r="24" fill="#eef6fb" stroke="#2471a3" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="350" y="156" text-anchor="middle" font-size="15" fill="#2471a3" font-weight="600">B</text>
  <line x1="338" y1="170" x2="241" y2="234" stroke="#d35400" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- === RIGHT: MEASURE B === -->
  <text x="675" y="25" text-anchor="middle" font-size="12" fill="#d35400" font-weight="700" letter-spacing="1.5">STEP 2: MEASURE B</text>

  <!-- Particle A (distant, committed) -->
  <circle cx="550" cy="150" r="24" fill="#edf8f1" stroke="#1e8449" stroke-width="1.5"/>
  <text x="550" y="156" text-anchor="middle" font-size="15" fill="#1e8449" font-weight="600">A</text>

  <!-- Detector for B -->
  <circle cx="800" cy="70" r="20" fill="#d35400" stroke="#a84300" stroke-width="2"/>
  <text x="800" y="74" text-anchor="middle" font-size="8" fill="white" font-weight="700">DETECTOR</text>

  <!-- Particle B -->
  <circle cx="800" cy="150" r="24" fill="#fff8f2" stroke="#d35400" stroke-width="2.5"/>
  <text x="800" y="156" text-anchor="middle" font-size="15" fill="#d35400" font-weight="700">B</text>

  <!-- Cascade arrow: detector → B -->
  <line x1="800" y1="90" x2="800" y2="124" stroke="#d35400" stroke-width="2.5" marker-end="url(#arrO)"/>

  <!-- Step number -->
  <circle cx="840" cy="110" r="12" fill="#d35400"/>
  <text x="840" y="114" text-anchor="middle" font-size="10" fill="white" font-weight="700">4</text>

  <!-- Shared node SH — already committed -->
  <circle cx="675" cy="250" r="24" fill="#edf8f1" stroke="#1e8449" stroke-width="3"/>
  <text x="675" y="245" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="700">SH</text>
  <text x="675" y="261" text-anchor="middle" font-size="13" fill="#1e8449" font-weight="700">= R</text>

  <!-- Cascade arrow: B → SH -->
  <line x1="784" y1="168" x2="693" y2="234" stroke="#d35400" stroke-width="2.5" marker-end="url(#arrO)"/>

  <!-- Step number -->
  <circle cx="755" cy="195" r="12" fill="#d35400"/>
  <text x="755" y="199" text-anchor="middle" font-size="10" fill="white" font-weight="700">5</text>

  <!-- Orange cascade label -->
  <text x="745" y="220" font-size="10" fill="#d35400" font-weight="600" transform="rotate(35, 745, 220)">cascade</text>

  <!-- Already committed badge -->
  <rect x="555" y="238" width="105" height="24" rx="12" fill="#d35400"/>
  <text x="607" y="254" text-anchor="middle" font-size="10" fill="white" font-weight="700">ALREADY = R</text>

  <!-- A's edge to SH -->
  <line x1="562" y1="170" x2="659" y2="234" stroke="#1e8449" stroke-width="1.5"/>

  <!-- "reads R" annotation on B -->
  <text x="800" y="192" text-anchor="middle" font-size="11" fill="#d35400" font-weight="600">B reads R</text>

  <!-- No-signal annotation -->
  <line x1="200" y1="320" x2="700" y2="320" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="450" y="315" text-anchor="middle" font-size="10" fill="#c0392b" font-weight="700">✕ NO SIGNAL BETWEEN A AND B</text>

  <!-- Bottom label -->
  <text x="450" y="355" text-anchor="middle" font-size="14" fill="#1a1a1a" font-weight="700">SH commits ONCE. Both read the same result. No signal needed.</text>
</svg>
