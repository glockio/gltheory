<!-- DESCRIPTION: Three separate small graphs side by side, all using multiply edges. Left graph: root at depth 1 connected to one child at depth 2 (a leaf), returns 2. Center graph: root at depth 1, child at depth 2, grandchild at depth 3 (leaf), returns 3. Right graph: root at depth 1 with two children at depths 2 and 3, root multiplies 2 times 3 equals 6, returns 6. All three graphs use only topology, no stored values. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ===== LEFT GRAPH: depth 2 → returns 2 ===== -->
  <rect x="20" y="10" width="245" height="260" rx="6" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Depth labels -->
  <text x="35" y="72" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="35" y="152" fill="#7a7a6a" font-size="8">depth 2</text>

  <!-- Root -->
  <circle cx="145" cy="68" r="18" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="145" y="73" text-anchor="middle" fill="white" font-size="11" font-weight="bold">root</text>

  <!-- Edge -->
  <line x1="145" y1="86" x2="145" y2="128" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="155" y="112" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Leaf (child) -->
  <circle cx="145" cy="148" r="18" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="145" y="152" text-anchor="middle" fill="#1a1a2e" font-size="10">leaf</text>

  <!-- Evaluation annotation -->
  <text x="145" y="195" text-anchor="middle" fill="#7a7a6a" font-size="9">child = leaf at depth 2 = 2</text>
  <text x="145" y="210" text-anchor="middle" fill="#7a7a6a" font-size="9">root = 2</text>

  <!-- Result -->
  <rect x="90" y="225" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#1e8449" stroke-width="1.5"/>
  <text x="145" y="244" text-anchor="middle" fill="#1e8449" font-size="13" font-weight="bold">Returns 2</text>


  <!-- ===== CENTER GRAPH: depth 3 → returns 3 ===== -->
  <rect x="290" y="10" width="245" height="260" rx="6" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Depth labels -->
  <text x="305" y="62" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="305" y="122" fill="#7a7a6a" font-size="8">depth 2</text>
  <text x="305" y="187" fill="#7a7a6a" font-size="8">depth 3</text>

  <!-- Root -->
  <circle cx="415" cy="58" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="415" y="63" text-anchor="middle" fill="white" font-size="10" font-weight="bold">root</text>

  <!-- Edge root→child -->
  <line x1="415" y1="74" x2="415" y2="102" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="425" y="92" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Child -->
  <circle cx="415" cy="118" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="415" y="122" text-anchor="middle" fill="white" font-size="9">child</text>

  <!-- Edge child→grandchild -->
  <line x1="415" y1="134" x2="415" y2="165" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="425" y="154" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Grandchild (leaf) -->
  <circle cx="415" cy="183" r="16" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="415" y="187" text-anchor="middle" fill="#1a1a2e" font-size="9">leaf</text>

  <!-- Evaluation -->
  <text x="415" y="218" text-anchor="middle" fill="#7a7a6a" font-size="9">grandchild=3, child=3, root=3</text>

  <!-- Result -->
  <rect x="360" y="225" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#1e8449" stroke-width="1.5"/>
  <text x="415" y="244" text-anchor="middle" fill="#1e8449" font-size="13" font-weight="bold">Returns 3</text>


  <!-- ===== RIGHT GRAPH: branching → returns 6 ===== -->
  <rect x="560" y="10" width="320" height="260" rx="6" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Depth labels -->
  <text x="575" y="62" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="575" y="132" fill="#7a7a6a" font-size="8">depth 2</text>
  <text x="575" y="197" fill="#7a7a6a" font-size="8">depth 3</text>

  <!-- Root -->
  <circle cx="720" cy="58" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="720" y="63" text-anchor="middle" fill="white" font-size="10" font-weight="bold">root</text>

  <!-- Edge root→left child -->
  <line x1="707" y1="72" x2="670" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="680" y="90" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge root→right child -->
  <line x1="733" y1="72" x2="770" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="760" y="90" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Left child (depth 2, leaf) -->
  <circle cx="660" cy="128" r="16" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="660" y="132" text-anchor="middle" fill="#1a1a2e" font-size="9">leaf</text>
  <text x="660" y="155" text-anchor="middle" fill="#7a7a6a" font-size="9">=2</text>

  <!-- Right child (depth 2) -->
  <circle cx="780" cy="128" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="780" y="132" text-anchor="middle" fill="white" font-size="9">child</text>

  <!-- Edge right child→grandchild -->
  <line x1="780" y1="144" x2="780" y2="176" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="790" y="164" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Grandchild (depth 3, leaf) -->
  <circle cx="780" cy="193" r="16" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="780" y="197" text-anchor="middle" fill="#1a1a2e" font-size="9">leaf</text>
  <text x="780" y="218" text-anchor="middle" fill="#7a7a6a" font-size="9">=3</text>

  <!-- Evaluation -->
  <text x="720" y="218" text-anchor="middle" fill="#7a7a6a" font-size="9">root = 2 × 3 = 6</text>

  <!-- Result -->
  <rect x="665" y="225" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#1e8449" stroke-width="1.5"/>
  <text x="720" y="244" text-anchor="middle" fill="#1e8449" font-size="13" font-weight="bold">Returns 6</text>


  <!-- Bottom note -->
  <text x="450" y="300" text-anchor="middle" fill="#7a7a6a" font-size="11" font-style="italic">No stored values. The result comes purely from topology: depth and branching.</text>
</svg>
