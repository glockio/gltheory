<!-- DESCRIPTION: Delayed choice experiment as graph. Center: purple glowing photon node already in-flight between slits and screen. Two dashed paths extend leftward (came through both slits). Two possible futures branch rightward: upper leads to interference (no consumer), lower leads to no pattern (consumer present). Timeline bar across bottom shows the irrelevance of WHEN the choice is made. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400">
  <defs>
    <filter id="glow-purple">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-p" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7d3c98"/>
    </marker>
    <marker id="arr-g" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e8449"/>
    </marker>
    <marker id="arr-o" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d35400"/>
    </marker>
  </defs>
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ======== SOURCE ======== -->
  <circle cx="80" cy="155" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="80" y="152" text-anchor="middle" font-size="7" fill="white" font-weight="700">SRC</text>
  <text x="80" y="161" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,0.7)">committed</text>

  <!-- ======== SLITS REGION ======== -->
  <!-- Wall -->
  <line x1="185" y1="45" x2="185" y2="100" stroke="#999" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="185" y1="130" x2="185" y2="180" stroke="#999" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="185" y1="210" x2="185" y2="280" stroke="#999" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Path through slit A (purple dashed) -->
  <line x1="92" y1="148" x2="170" y2="112" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.6"/>
  <circle cx="155" cy="112" r="6" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="155" y="100" text-anchor="middle" font-size="7" fill="#7a7a6a">A</text>

  <!-- Path through slit B (purple dashed) -->
  <line x1="92" y1="162" x2="170" y2="198" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.6"/>
  <circle cx="155" cy="198" r="6" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="155" y="218" text-anchor="middle" font-size="7" fill="#7a7a6a">B</text>

  <!-- Paths continue past slits, converging toward photon -->
  <line x1="195" y1="112" x2="330" y2="145" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="195" y1="198" x2="330" y2="165" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- ======== PHOTON (in-flight, center) ======== -->
  <circle cx="360" cy="155" r="16" fill="#f3ecfa" stroke="#7d3c98" stroke-width="2.5" stroke-dasharray="6,4" filter="url(#glow-purple)"/>
  <text x="360" y="151" text-anchor="middle" font-size="9" fill="#7d3c98" font-weight="700">P</text>
  <text x="360" y="162" text-anchor="middle" font-size="6" fill="#7d3c98">in-flight</text>

  <!-- Label above photon -->
  <text x="360" y="120" text-anchor="middle" font-size="11" fill="#7d3c98" font-weight="700">PHOTON</text>
  <text x="360" y="108" text-anchor="middle" font-size="9" fill="#7d3c98" font-style="italic">still pending</text>

  <!-- ======== TWO POSSIBLE FUTURES ======== -->

  <!-- Dashed fork from photon -->
  <line x1="376" y1="148" x2="520" y2="80" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="376" y1="162" x2="520" y2="230" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" opacity="0.5"/>

  <!-- ---- UPPER BRANCH: No consumer → interference ---- -->
  <!-- Branch label -->
  <rect x="460" y="50" width="120" height="18" rx="4" fill="#f3ecfa" stroke="#7d3c98" stroke-width="1"/>
  <text x="520" y="63" text-anchor="middle" font-size="8" fill="#7d3c98" font-weight="600">no consumer added</text>

  <!-- Screen (upper) -->
  <rect x="600" y="48" width="8" height="70" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>
  <line x1="535" y1="80" x2="595" y2="80" stroke="#7d3c98" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-p)"/>

  <!-- Interference pattern bars -->
  <rect x="616" y="52" width="4" height="6" rx="1" fill="#1e8449" opacity="0.85"/>
  <rect x="616" y="62" width="4" height="2.5" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="616" y="68" width="4" height="6" rx="1" fill="#1e8449" opacity="0.8"/>
  <rect x="616" y="78" width="4" height="2.5" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="616" y="84" width="4" height="6" rx="1" fill="#1e8449" opacity="0.85"/>
  <rect x="616" y="94" width="4" height="2.5" rx="1" fill="#1e8449" opacity="0.12"/>
  <rect x="616" y="100" width="4" height="6" rx="1" fill="#1e8449" opacity="0.75"/>
  <rect x="616" y="110" width="4" height="2.5" rx="1" fill="#1e8449" opacity="0.12"/>
  <text x="630" y="82" font-size="8" fill="#1e8449" font-weight="600">interference</text>

  <!-- ---- LOWER BRANCH: Consumer → no interference ---- -->
  <!-- Consumer detector (orange) -->
  <circle cx="540" cy="225" r="10" fill="#d35400" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="540" y="229" text-anchor="middle" font-size="8" fill="white" font-weight="700">C</text>
  <text x="560" y="217" font-size="7" fill="#d35400" font-weight="600">consumer</text>

  <!-- Branch label -->
  <rect x="460" y="240" width="120" height="18" rx="4" fill="#fdf2e9" stroke="#d35400" stroke-width="1"/>
  <text x="520" y="253" text-anchor="middle" font-size="8" fill="#d35400" font-weight="600">consumer added</text>

  <!-- Path from consumer to screen -->
  <line x1="550" y1="225" x2="595" y2="225" stroke="#1e8449" stroke-width="1.8" marker-end="url(#arr-g)"/>

  <!-- Screen (lower) -->
  <rect x="600" y="190" width="8" height="70" rx="2" fill="#e8e8e8" stroke="#999" stroke-width="1"/>

  <!-- Scattered dots (no pattern) -->
  <circle cx="617" cy="200" r="2.5" fill="#1e8449" opacity="0.7"/>
  <circle cx="620" cy="215" r="2.5" fill="#1e8449" opacity="0.6"/>
  <circle cx="615" cy="228" r="2.5" fill="#1e8449" opacity="0.75"/>
  <circle cx="621" cy="240" r="2.5" fill="#1e8449" opacity="0.65"/>
  <circle cx="617" cy="208" r="2.5" fill="#1e8449" opacity="0.55"/>
  <circle cx="619" cy="250" r="2.5" fill="#1e8449" opacity="0.7"/>
  <text x="630" y="228" font-size="8" fill="#c0392b" font-weight="600">no pattern</text>

  <!-- ======== TIMELINE BAR ======== -->
  <line x1="60" y1="330" x2="840" y2="330" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- t=0: Photon enters -->
  <line x1="120" y1="325" x2="120" y2="335" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="120" cy="330" r="5" fill="#1e8449"/>
  <text x="120" y="352" text-anchor="middle" font-size="8" fill="#1a1a1a" font-weight="600">t₀</text>
  <text x="120" y="364" text-anchor="middle" font-size="7.5" fill="#7a7a6a">Photon enters</text>

  <!-- t=1: Photon between slits -->
  <line x1="340" y1="325" x2="340" y2="335" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="340" cy="330" r="5" fill="#7d3c98"/>
  <text x="340" y="352" text-anchor="middle" font-size="8" fill="#1a1a1a" font-weight="600">t₁</text>
  <text x="340" y="364" text-anchor="middle" font-size="7.5" fill="#7a7a6a">Photon between slits</text>

  <!-- Annotation arrow from t1 up to photon -->
  <line x1="340" y1="318" x2="355" y2="185" stroke="#7d3c98" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="395" y="300" font-size="9" fill="#7d3c98" font-weight="700">STILL PENDING</text>

  <!-- t=2: Apparatus choice made -->
  <line x1="560" y1="325" x2="560" y2="335" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="560" cy="330" r="5" fill="#d35400"/>
  <text x="560" y="352" text-anchor="middle" font-size="8" fill="#1a1a1a" font-weight="600">t₂</text>
  <text x="560" y="364" text-anchor="middle" font-size="7.5" fill="#7a7a6a">Apparatus choice made</text>
  <text x="560" y="378" text-anchor="middle" font-size="8" fill="#d35400" font-style="italic">Doesn't matter when.</text>
  <text x="560" y="390" text-anchor="middle" font-size="8" fill="#d35400" font-style="italic">Event was never committed.</text>

  <!-- t=3: Screen forces commitment -->
  <line x1="760" y1="325" x2="760" y2="335" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="760" cy="330" r="5" fill="#1e8449"/>
  <text x="760" y="352" text-anchor="middle" font-size="8" fill="#1a1a1a" font-weight="600">t₃</text>
  <text x="760" y="364" text-anchor="middle" font-size="7.5" fill="#7a7a6a">Screen forces commitment</text>
</svg>
