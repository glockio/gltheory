<!-- DESCRIPTION: Two frames side by side. Left frame (green border, "WHAT YOU READ — Committed result. Revision 4. Locked in."): a node showing value=12, revision=4, with a solid green checkmark. Right frame (red dashed border, "BEING EVALUATED RIGHT NOW — In progress. You can't see this."): same node with question marks and dashed lines showing active computation. Between them: "you are always one step behind." Below: "By the time you observe a result, the next evaluation has already started." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- LEFT FRAME: Committed result -->
  <rect x="30" y="40" width="300" height="170" rx="8" fill="white" stroke="#1e8449" stroke-width="2.5"/>

  <!-- Left frame title -->
  <text x="180" y="30" text-anchor="middle" fill="#1e8449" font-size="11" font-weight="bold">WHAT YOU READ</text>

  <!-- Subtitle -->
  <text x="180" y="62" text-anchor="middle" fill="#7a7a6a" font-size="9.5">Committed result. Revision 4. Locked in.</text>

  <!-- Node with value -->
  <circle cx="180" cy="125" r="30" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="180" y="122" text-anchor="middle" fill="#1e8449" font-size="20" font-weight="bold">12</text>
  <text x="180" y="140" text-anchor="middle" fill="#1e8449" font-size="9">rev 4</text>

  <!-- Big green checkmark -->
  <text x="220" y="105" fill="#1e8449" font-size="24" font-weight="bold">&#10003;</text>

  <!-- "solid / stable" indicators -->
  <line x1="110" y1="170" x2="250" y2="170" stroke="#1e8449" stroke-width="1.5"/>
  <text x="180" y="190" text-anchor="middle" fill="#1e8449" font-size="10">stable. immutable. done.</text>

  <!-- RIGHT FRAME: In progress -->
  <rect x="460" y="40" width="300" height="170" rx="8" fill="white" stroke="#c0392b" stroke-width="2" stroke-dasharray="8,4"/>

  <!-- Right frame title -->
  <text x="610" y="30" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">BEING EVALUATED RIGHT NOW</text>

  <!-- Subtitle -->
  <text x="610" y="62" text-anchor="middle" fill="#7a7a6a" font-size="9.5">In progress. You can't see this.</text>

  <!-- Node with question marks, dashed outline -->
  <circle cx="610" cy="125" r="30" fill="#fff5f5" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="610" y="130" text-anchor="middle" fill="#c0392b" font-size="22">?</text>

  <!-- Dashed computation lines radiating out -->
  <line x1="580" y1="100" x2="555" y2="85" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="640" y1="100" x2="665" y2="85" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="580" y1="150" x2="555" y2="165" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3"/>
  <line x1="640" y1="150" x2="665" y2="165" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,3"/>

  <!-- Small "computing" dots -->
  <circle cx="550" cy="82" r="3" fill="#c0392b" opacity="0.5"/>
  <circle cx="670" cy="82" r="3" fill="#c0392b" opacity="0.5"/>
  <circle cx="550" cy="168" r="3" fill="#c0392b" opacity="0.5"/>
  <circle cx="670" cy="168" r="3" fill="#c0392b" opacity="0.5"/>

  <text x="610" y="190" text-anchor="middle" fill="#c0392b" font-size="10">in flight. uncommitted.</text>

  <!-- BETWEEN: Arrow and label -->
  <text x="395" y="115" text-anchor="middle" fill="#1a1a1a" font-size="14">←</text>
  <text x="395" y="135" text-anchor="middle" fill="#1a1a2e" font-size="9.5" font-style="italic">you are always</text>
  <text x="395" y="149" text-anchor="middle" fill="#1a1a2e" font-size="9.5" font-style="italic">one step behind</text>

  <!-- BOTTOM TEXT -->
  <text x="400" y="250" text-anchor="middle" fill="#7a7a6a" font-size="11">By the time you observe a result, the next evaluation has already started.</text>
</svg>
