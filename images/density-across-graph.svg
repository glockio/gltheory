<!-- DESCRIPTION: A horizontal row of 15 graph nodes across the top, with a denser/more interconnected subgraph in the center labeled 'MASS'. Below each node, a vertical bar whose height represents causal density — how many steps it takes to evaluate that region. Bars form a mountain shape, tallest at center over the mass, tapering to minimal density at edges. Labels: 'sparse' at edges, 'DENSE' at peak. Accessible note: 'Dense regions take more steps to resolve. Like navigating a crowded room vs. an empty hallway. (In computers, this is called a call stack.)' Caption: 'Causal density across the graph. Dense where mass is. Sparse everywhere else.' -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="DM Sans, sans-serif">
  <rect width="900" height="420" fill="white"/>

  <defs>
    <marker id="dag-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a" stroke="none"/>
    </marker>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d35400" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#d4a017" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- NODE ROW across the top -->
  <!-- 15 nodes, positions: x from 70 to 830, spaced ~54px apart -->
  <!-- Node positions: 70, 124, 178, 232, 286, 340, 394, 450, 506, 560, 614, 668, 722, 776, 830 -->

  <!-- Edges connecting the nodes as a graph -->
  <!-- Outer edges (simple chain on left) -->
  <line x1="80" y1="40" x2="124" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="134" y1="40" x2="178" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="188" y1="40" x2="232" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="242" y1="40" x2="286" y2="40" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="296" y1="40" x2="340" y2="40" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Dense center (mass subgraph) — more edges, cross connections -->
  <line x1="350" y1="40" x2="394" y2="40" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="404" y1="40" x2="450" y2="40" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="460" y1="40" x2="506" y2="40" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="516" y1="40" x2="560" y2="40" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Cross edges in the mass region — extra density -->
  <path d="M340,35 Q397,15 450,35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M394,35 Q450,10 506,35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M450,35 Q500,15 560,35" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
  <path d="M340,45 Q450,68 560,45" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.5"/>
  <!-- Additional cross-connections for density -->
  <path d="M340,35 Q450,5 560,35" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.4"/>
  <path d="M394,45 Q450,62 506,45" fill="none" stroke="#1a1a1a" stroke-width="1.2" opacity="0.5"/>
  <path d="M340,45 Q394,60 450,45" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.35"/>
  <path d="M450,45 Q506,60 560,45" fill="none" stroke="#1a1a1a" stroke-width="1" opacity="0.35"/>

  <!-- Outer edges (simple chain on right) -->
  <line x1="570" y1="40" x2="614" y2="40" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="624" y1="40" x2="668" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="678" y1="40" x2="722" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="732" y1="40" x2="776" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>
  <line x1="786" y1="40" x2="830" y2="40" stroke="#7a7a6a" stroke-width="1.2"/>

  <!-- NODES (dots) -->
  <circle cx="70" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <circle cx="124" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <circle cx="178" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.8"/>
  <circle cx="232" cy="40" r="7" fill="white" stroke="#1a1a1a" stroke-width="1.8"/>
  <circle cx="286" cy="40" r="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="340" cy="40" r="8" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="394" cy="40" r="8" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="450" cy="40" r="9" fill="#1a1a2e" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="506" cy="40" r="8" fill="white" stroke="#1a1a1a" stroke-width="2.5"/>
  <circle cx="560" cy="40" r="8" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="614" cy="40" r="7" fill="white" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="668" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.8"/>
  <circle cx="722" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <circle cx="776" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>
  <circle cx="830" cy="40" r="7" fill="white" stroke="#7a7a6a" stroke-width="1.5"/>

  <!-- MASS label above center -->
  <text x="450" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">MASS</text>

  <!-- VERTICAL BARS below each node -->
  <!-- Bar heights: 1, 1, 2, 3, 5, 6, 7, 8, 7, 6, 5, 3, 2, 1, 1 -->
  <!-- Scale: height unit = 24px, baseline at y=290 -->

  <!-- Bar 1: height 1 (24px) -->
  <rect x="58" y="266" width="24" height="24" rx="2" fill="url(#bar-grad)" opacity="0.35"/>
  <!-- Bar 2: height 1 -->
  <rect x="112" y="266" width="24" height="24" rx="2" fill="url(#bar-grad)" opacity="0.35"/>
  <!-- Bar 3: height 2 (48px) -->
  <rect x="166" y="242" width="24" height="48" rx="2" fill="url(#bar-grad)" opacity="0.4"/>
  <!-- Bar 4: height 3 (72px) -->
  <rect x="220" y="218" width="24" height="72" rx="2" fill="url(#bar-grad)" opacity="0.5"/>
  <!-- Bar 5: height 5 (120px) -->
  <rect x="274" y="170" width="24" height="120" rx="2" fill="url(#bar-grad)" opacity="0.55"/>
  <!-- Bar 6: height 6 (144px) -->
  <rect x="328" y="146" width="24" height="144" rx="2" fill="url(#bar-grad)" opacity="0.6"/>
  <!-- Bar 7: height 7 (168px) -->
  <rect x="382" y="122" width="24" height="168" rx="2" fill="url(#bar-grad)" opacity="0.7"/>
  <!-- Bar 8: height 8 (192px) — PEAK -->
  <rect x="438" y="98" width="24" height="192" rx="2" fill="url(#bar-grad)" opacity="0.85"/>
  <!-- Bar 9: height 7 -->
  <rect x="494" y="122" width="24" height="168" rx="2" fill="url(#bar-grad)" opacity="0.7"/>
  <!-- Bar 10: height 6 -->
  <rect x="548" y="146" width="24" height="144" rx="2" fill="url(#bar-grad)" opacity="0.6"/>
  <!-- Bar 11: height 5 -->
  <rect x="602" y="170" width="24" height="120" rx="2" fill="url(#bar-grad)" opacity="0.55"/>
  <!-- Bar 12: height 3 -->
  <rect x="656" y="218" width="24" height="72" rx="2" fill="url(#bar-grad)" opacity="0.5"/>
  <!-- Bar 13: height 2 -->
  <rect x="710" y="242" width="24" height="48" rx="2" fill="url(#bar-grad)" opacity="0.4"/>
  <!-- Bar 14: height 1 -->
  <rect x="764" y="266" width="24" height="24" rx="2" fill="url(#bar-grad)" opacity="0.35"/>
  <!-- Bar 15: height 1 -->
  <rect x="818" y="266" width="24" height="24" rx="2" fill="url(#bar-grad)" opacity="0.35"/>

  <!-- Baseline -->
  <line x1="45" y1="290" x2="855" y2="290" stroke="#1a1a1a" stroke-width="1" opacity="0.3"/>

  <!-- "sparse" label at left edge -->
  <line x1="50" y1="278" x2="58" y2="278" stroke="#7a7a6a" stroke-width="1"/>
  <text x="47" y="282" text-anchor="end" font-size="9" fill="#7a7a6a">sparse</text>

  <!-- "sparse" label at right edge -->
  <line x1="842" y1="278" x2="855" y2="278" stroke="#7a7a6a" stroke-width="1"/>
  <text x="858" y="282" font-size="9" fill="#7a7a6a">sparse</text>

  <!-- "DENSE" label at peak -->
  <line x1="450" y1="92" x2="450" y2="82" stroke="#d35400" stroke-width="1.5"/>
  <text x="450" y="76" text-anchor="middle" font-size="10" font-weight="bold" fill="#d35400">DENSE</text>

  <!-- Accessible note between bars and caption -->
  <text x="450" y="316" text-anchor="middle" font-size="10.5" font-style="italic" fill="#555">Dense regions take more steps to resolve.</text>
  <text x="450" y="332" text-anchor="middle" font-size="10.5" font-style="italic" fill="#555">Like navigating a crowded room vs. an empty hallway.</text>
  <text x="450" y="350" text-anchor="middle" font-size="9.5" font-style="italic" fill="#7a7a6a">(In computers, this is called a call stack.)</text>

  <!-- Bottom caption -->
  <line x1="120" y1="370" x2="780" y2="370" stroke="#1a1a1a" stroke-width="0.5" opacity="0.2"/>
  <text x="450" y="393" text-anchor="middle" font-size="13" fill="#1a1a1a">Causal density across the graph. Dense where mass is.</text>
  <text x="450" y="411" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">Sparse everywhere else.</text>
</svg>
