<!-- DESCRIPTION: Three-panel quantum eraser figure. Same 12 dots on screen in all panels. PANEL 1: All dots gray, no pattern. PANEL 2: Eraser subset — 6 dots highlighted green in interference bands. PANEL 3: Which-path subset — other 6 dots highlighted orange, scattered. Shows crystal as shared causal ancestor forking into signal and idler paths. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ======== PANEL 1: ALL DOTS — NO PATTERN ======== -->
  <rect x="10" y="45" width="280" height="405" rx="6" fill="none" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="150" y="35" text-anchor="middle" font-size="12" fill="#1a1a1a" font-weight="700">ALL DOTS — NO PATTERN</text>

  <!-- Crystal node (gold, shared ancestor) -->
  <circle cx="70" cy="100" r="12" fill="#d4a017" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="70" y="97" text-anchor="middle" font-size="6" fill="white" font-weight="700">CRYSTAL</text>
  <text x="70" y="106" text-anchor="middle" font-size="5" fill="rgba(255,255,255,0.8)">origin</text>

  <!-- Signal fork (left, down to screen) -->
  <line x1="70" y1="112" x2="50" y2="160" stroke="#ccc" stroke-width="1.2"/>
  <text x="35" y="155" font-size="7" fill="#999">signal</text>

  <!-- Signal through slits (both paths) -->
  <circle cx="45" cy="175" r="5" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2"/>
  <circle cx="65" cy="175" r="5" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2"/>
  <text x="38" y="192" font-size="6" fill="#ccc">A</text>
  <text x="72" y="192" font-size="6" fill="#ccc">B</text>
  <line x1="45" y1="180" x2="55" y2="210" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="65" y1="180" x2="55" y2="210" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Signal arrow to screen -->
  <line x1="55" y1="215" x2="55" y2="250" stroke="#ccc" stroke-width="1"/>

  <!-- Screen (vertical bar) -->
  <rect x="40" y="258" width="30" height="170" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>

  <!-- 12 dots — ALL GRAY (no visible pattern) -->
  <!-- Eraser-subset dots (will be green in panel 2): positions that form interference bands -->
  <circle cx="55" cy="275" r="4" fill="#aaa" opacity="0.5"/>  <!-- E1: band 1 -->
  <circle cx="55" cy="285" r="4" fill="#aaa" opacity="0.5"/>  <!-- E2: band 1 -->
  <circle cx="55" cy="315" r="4" fill="#aaa" opacity="0.5"/>  <!-- E3: band 2 -->
  <circle cx="55" cy="325" r="4" fill="#aaa" opacity="0.5"/>  <!-- E4: band 2 -->
  <circle cx="55" cy="355" r="4" fill="#aaa" opacity="0.5"/>  <!-- E5: band 3 -->
  <circle cx="55" cy="365" r="4" fill="#aaa" opacity="0.5"/>  <!-- E6: band 3 -->
  <!-- Which-path-subset dots (will be orange in panel 3): scattered randomly -->
  <circle cx="55" cy="297" r="4" fill="#aaa" opacity="0.5"/>  <!-- W1 -->
  <circle cx="55" cy="308" r="4" fill="#aaa" opacity="0.5"/>  <!-- W2 -->
  <circle cx="55" cy="337" r="4" fill="#aaa" opacity="0.5"/>  <!-- W3 -->
  <circle cx="55" cy="348" r="4" fill="#aaa" opacity="0.5"/>  <!-- W4 -->
  <circle cx="55" cy="378" r="4" fill="#aaa" opacity="0.5"/>  <!-- W5 -->
  <circle cx="55" cy="400" r="4" fill="#aaa" opacity="0.5"/>  <!-- W6 -->

  <!-- Idler fork (right, to beam splitter) -->
  <line x1="82" y1="100" x2="150" y2="100" stroke="#ccc" stroke-width="1.2"/>
  <text x="118" y="93" font-size="7" fill="#999">idler</text>

  <!-- Beam splitter (diamond) -->
  <polygon points="160,90 170,100 160,110 150,100" fill="none" stroke="#ccc" stroke-width="1.5"/>
  <text x="160" y="83" text-anchor="middle" font-size="6" fill="#999">BS</text>

  <!-- BS to eraser (upper) -->
  <line x1="170" y1="95" x2="220" y2="70" stroke="#ccc" stroke-width="1"/>
  <circle cx="230" cy="65" r="8" fill="none" stroke="#ccc" stroke-width="1.2"/>
  <text x="230" y="68" text-anchor="middle" font-size="5.5" fill="#999">ERASER</text>

  <!-- BS to which-path (lower) -->
  <line x1="170" y1="105" x2="220" y2="135" stroke="#ccc" stroke-width="1"/>
  <circle cx="230" cy="140" r="8" fill="none" stroke="#ccc" stroke-width="1.2"/>
  <text x="230" y="136" text-anchor="middle" font-size="5" fill="#999">WHICH</text>
  <text x="230" y="144" text-anchor="middle" font-size="5" fill="#999">PATH</text>

  <!-- Panel 1 label -->
  <text x="150" y="448" text-anchor="middle" font-size="8" fill="#7a7a6a" font-style="italic">The screen alone never</text>
  <text x="150" y="460" text-anchor="middle" font-size="8" fill="#7a7a6a" font-style="italic">shows interference</text>

  <!-- ======== DIVIDER 1 ======== -->
  <line x1="300" y1="45" x2="300" y2="450" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ======== PANEL 2: ERASER SUBSET — INTERFERENCE ======== -->
  <rect x="310" y="45" width="280" height="405" rx="6" fill="none" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="35" text-anchor="middle" font-size="12" fill="#2471a3" font-weight="700">ERASER SUBSET — INTERFERENCE</text>

  <!-- Crystal node -->
  <circle cx="370" cy="100" r="12" fill="#d4a017" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="370" y="97" text-anchor="middle" font-size="6" fill="white" font-weight="700">CRYSTAL</text>
  <text x="370" y="106" text-anchor="middle" font-size="5" fill="rgba(255,255,255,0.8)">origin</text>

  <!-- Signal fork (purple, highlighted) -->
  <line x1="370" y1="112" x2="350" y2="160" stroke="#7d3c98" stroke-width="1.5"/>
  <text x="335" y="155" font-size="7" fill="#7d3c98" font-weight="600">signal</text>

  <!-- Signal through slits (both paths, purple — in-flight) -->
  <circle cx="345" cy="175" r="5" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="365" cy="175" r="5" fill="none" stroke="#7d3c98" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="338" y="192" font-size="6" fill="#7d3c98">A</text>
  <text x="372" y="192" font-size="6" fill="#7d3c98">B</text>
  <line x1="345" y1="180" x2="355" y2="210" stroke="#7d3c98" stroke-width="1.2" stroke-dasharray="3,2"/>
  <line x1="365" y1="180" x2="355" y2="210" stroke="#7d3c98" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Signal arrow to screen -->
  <line x1="355" y1="215" x2="355" y2="250" stroke="#7d3c98" stroke-width="1.2"/>

  <!-- Screen -->
  <rect x="340" y="258" width="30" height="170" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>

  <!-- 12 dots — eraser subset highlighted GREEN in bands, others dimmed -->
  <!-- Eraser subset: interference bands (green highlighted) -->
  <circle cx="355" cy="275" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E1 -->
  <circle cx="355" cy="285" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E2 -->
  <circle cx="355" cy="315" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E3 -->
  <circle cx="355" cy="325" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E4 -->
  <circle cx="355" cy="355" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E5 -->
  <circle cx="355" cy="365" r="4" fill="#1e8449" opacity="0.9"/>  <!-- E6 -->
  <!-- Which-path subset: dimmed gray -->
  <circle cx="355" cy="297" r="4" fill="#ccc" opacity="0.25"/>  <!-- W1 -->
  <circle cx="355" cy="308" r="4" fill="#ccc" opacity="0.25"/>  <!-- W2 -->
  <circle cx="355" cy="337" r="4" fill="#ccc" opacity="0.25"/>  <!-- W3 -->
  <circle cx="355" cy="348" r="4" fill="#ccc" opacity="0.25"/>  <!-- W4 -->
  <circle cx="355" cy="378" r="4" fill="#ccc" opacity="0.25"/>  <!-- W5 -->
  <circle cx="355" cy="400" r="4" fill="#ccc" opacity="0.25"/>  <!-- W6 -->

  <!-- Band brackets to show interference -->
  <line x1="332" y1="271" x2="332" y2="290" stroke="#1e8449" stroke-width="1.5"/>
  <line x1="332" y1="311" x2="332" y2="330" stroke="#1e8449" stroke-width="1.5"/>
  <line x1="332" y1="351" x2="332" y2="370" stroke="#1e8449" stroke-width="1.5"/>
  <text x="322" y="282" text-anchor="end" font-size="6" fill="#1e8449">band</text>
  <text x="322" y="322" text-anchor="end" font-size="6" fill="#1e8449">band</text>
  <text x="322" y="362" text-anchor="end" font-size="6" fill="#1e8449">band</text>

  <!-- Idler fork (blue, highlighted) -->
  <line x1="382" y1="100" x2="450" y2="100" stroke="#2471a3" stroke-width="1.5"/>
  <text x="418" y="93" font-size="7" fill="#2471a3" font-weight="600">idler</text>

  <!-- Beam splitter (blue filled) -->
  <polygon points="460,90 470,100 460,110 450,100" fill="#2471a3" stroke="#1a1a1a" stroke-width="1"/>
  <text x="460" y="83" text-anchor="middle" font-size="6" fill="#2471a3" font-weight="600">BS</text>

  <!-- BS to eraser (upper, highlighted blue) -->
  <line x1="470" y1="95" x2="520" y2="70" stroke="#2471a3" stroke-width="1.5"/>
  <circle cx="530" cy="65" r="8" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="530" y="68" text-anchor="middle" font-size="5.5" fill="white" font-weight="600">ERASER</text>

  <!-- BS to which-path (lower, dimmed) -->
  <line x1="470" y1="105" x2="520" y2="135" stroke="#ccc" stroke-width="1" opacity="0.3"/>
  <circle cx="530" cy="140" r="8" fill="none" stroke="#ccc" stroke-width="1.2" opacity="0.3"/>
  <text x="530" y="136" text-anchor="middle" font-size="5" fill="#ccc" opacity="0.3">WHICH</text>
  <text x="530" y="144" text-anchor="middle" font-size="5" fill="#ccc" opacity="0.3">PATH</text>

  <!-- Panel 2 label -->
  <text x="450" y="448" text-anchor="middle" font-size="8" fill="#2471a3" font-style="italic">Filter by twins that went</text>
  <text x="450" y="460" text-anchor="middle" font-size="8" fill="#2471a3" font-style="italic">through the eraser</text>

  <!-- ======== DIVIDER 2 ======== -->
  <line x1="600" y1="45" x2="600" y2="450" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- ======== PANEL 3: WHICH-PATH SUBSET — NO PATTERN ======== -->
  <rect x="610" y="45" width="280" height="405" rx="6" fill="none" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="750" y="35" text-anchor="middle" font-size="12" fill="#d35400" font-weight="700">WHICH-PATH — NO PATTERN</text>

  <!-- Crystal node -->
  <circle cx="670" cy="100" r="12" fill="#d4a017" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="670" y="97" text-anchor="middle" font-size="6" fill="white" font-weight="700">CRYSTAL</text>
  <text x="670" y="106" text-anchor="middle" font-size="5" fill="rgba(255,255,255,0.8)">origin</text>

  <!-- Signal fork — one path committed (green), one dimmed -->
  <line x1="670" y1="112" x2="650" y2="160" stroke="#1e8449" stroke-width="1.5"/>
  <text x="635" y="155" font-size="7" fill="#1e8449" font-weight="600">signal</text>

  <!-- Signal through slits: only one path committed -->
  <circle cx="645" cy="175" r="5" fill="#1e8449" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="665" cy="175" r="5" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.3"/>
  <text x="638" y="192" font-size="6" fill="#1e8449" font-weight="600">A</text>
  <text x="672" y="192" font-size="6" fill="#ccc" opacity="0.3">B</text>
  <line x1="645" y1="180" x2="655" y2="210" stroke="#1e8449" stroke-width="1.5"/>
  <line x1="665" y1="180" x2="655" y2="210" stroke="#ccc" stroke-width="0.8" opacity="0.2"/>

  <!-- Signal arrow to screen -->
  <line x1="655" y1="215" x2="655" y2="250" stroke="#1e8449" stroke-width="1.2"/>

  <!-- Screen -->
  <rect x="640" y="258" width="30" height="170" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="1"/>

  <!-- 12 dots — which-path subset highlighted ORANGE scattered, others dimmed -->
  <!-- Eraser subset: dimmed gray -->
  <circle cx="655" cy="275" r="4" fill="#ccc" opacity="0.25"/>  <!-- E1 -->
  <circle cx="655" cy="285" r="4" fill="#ccc" opacity="0.25"/>  <!-- E2 -->
  <circle cx="655" cy="315" r="4" fill="#ccc" opacity="0.25"/>  <!-- E3 -->
  <circle cx="655" cy="325" r="4" fill="#ccc" opacity="0.25"/>  <!-- E4 -->
  <circle cx="655" cy="355" r="4" fill="#ccc" opacity="0.25"/>  <!-- E5 -->
  <circle cx="655" cy="365" r="4" fill="#ccc" opacity="0.25"/>  <!-- E6 -->
  <!-- Which-path subset: orange highlighted, scattered -->
  <circle cx="655" cy="297" r="4" fill="#d35400" opacity="0.9"/>  <!-- W1 -->
  <circle cx="655" cy="308" r="4" fill="#d35400" opacity="0.9"/>  <!-- W2 -->
  <circle cx="655" cy="337" r="4" fill="#d35400" opacity="0.9"/>  <!-- W3 -->
  <circle cx="655" cy="348" r="4" fill="#d35400" opacity="0.9"/>  <!-- W4 -->
  <circle cx="655" cy="378" r="4" fill="#d35400" opacity="0.9"/>  <!-- W5 -->
  <circle cx="655" cy="400" r="4" fill="#d35400" opacity="0.9"/>  <!-- W6 -->

  <!-- Idler fork (orange, highlighted) -->
  <line x1="682" y1="100" x2="750" y2="100" stroke="#d35400" stroke-width="1.5"/>
  <text x="718" y="93" font-size="7" fill="#d35400" font-weight="600">idler</text>

  <!-- Beam splitter -->
  <polygon points="760,90 770,100 760,110 750,100" fill="none" stroke="#d35400" stroke-width="1.5"/>
  <text x="760" y="83" text-anchor="middle" font-size="6" fill="#d35400" font-weight="600">BS</text>

  <!-- BS to eraser (upper, dimmed) -->
  <line x1="770" y1="95" x2="820" y2="70" stroke="#ccc" stroke-width="1" opacity="0.3"/>
  <circle cx="830" cy="65" r="8" fill="none" stroke="#ccc" stroke-width="1.2" opacity="0.3"/>
  <text x="830" y="68" text-anchor="middle" font-size="5.5" fill="#ccc" opacity="0.3">ERASER</text>

  <!-- BS to which-path (lower, highlighted orange) -->
  <line x1="770" y1="105" x2="820" y2="135" stroke="#d35400" stroke-width="1.5"/>
  <circle cx="830" cy="140" r="8" fill="#d35400" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="830" y="136" text-anchor="middle" font-size="5" fill="white" font-weight="600">WHICH</text>
  <text x="830" y="144" text-anchor="middle" font-size="5" fill="white" font-weight="600">PATH</text>

  <!-- Panel 3 label -->
  <text x="750" y="448" text-anchor="middle" font-size="8" fill="#d35400" font-style="italic">Filter by twins that preserved</text>
  <text x="750" y="460" text-anchor="middle" font-size="8" fill="#d35400" font-style="italic">which-path info</text>

  <!-- ======== BOTTOM CAPTION ======== -->
  <line x1="30" y1="475" x2="870" y2="475" stroke="#d5d0c0" stroke-width="0.5"/>
  <text x="450" y="493" text-anchor="middle" font-size="10.5" fill="#1a1a1a" font-style="italic">Same dots. Same screen. Same graph. The twin's measurement is the sorting key.</text>
</svg>
