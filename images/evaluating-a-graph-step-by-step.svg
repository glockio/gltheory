<!-- DESCRIPTION: Three panels showing one graph in three states. The graph has a root node connected to two children (A and B), each connected to one leaf (C and D respectively). All edges labeled with multiply. Panel 1 STATE 0 BEFORE: all nodes show question marks, unresolved. Panel 2 STATE 1 LEAVES FIRST: C and D show their values (return 1). A and B still show question marks. Panel 3 STATE 2 COMPLETE: all nodes show committed values with green checkmarks. Arrow below shows direction: bottom to up, leaves first, root last. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ===== PANEL 1: STATE 0 — BEFORE ===== -->
  <text x="145" y="22" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">STATE 0 — BEFORE</text>

  <!-- Panel border -->
  <rect x="20" y="32" width="255" height="240" rx="6" fill="none" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Root -->
  <circle cx="145" cy="70" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="145" y="76" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="145" y="56" text-anchor="middle" fill="#7a7a6a" font-size="9">Root</text>

  <!-- Edge Root→A -->
  <line x1="130" y1="86" x2="95" y2="130" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="106" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge Root→B -->
  <line x1="160" y1="86" x2="195" y2="130" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="184" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Node A -->
  <circle cx="85" cy="148" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="85" y="153" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="70" y="140" text-anchor="middle" fill="#7a7a6a" font-size="9">A</text>

  <!-- Node B -->
  <circle cx="205" cy="148" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="205" y="153" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="220" y="140" text-anchor="middle" fill="#7a7a6a" font-size="9">B</text>

  <!-- Edge A→C -->
  <line x1="85" y1="166" x2="85" y2="206" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="75" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge B→D -->
  <line x1="205" y1="166" x2="205" y2="206" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="215" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Leaf C -->
  <circle cx="85" cy="224" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="85" y="229" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="70" y="218" text-anchor="middle" fill="#7a7a6a" font-size="9">C</text>

  <!-- Leaf D -->
  <circle cx="205" cy="224" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="205" y="229" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="220" y="218" text-anchor="middle" fill="#7a7a6a" font-size="9">D</text>


  <!-- ===== PANEL 2: STATE 1 — LEAVES FIRST ===== -->
  <text x="460" y="22" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">STATE 1 — LEAVES FIRST</text>

  <rect x="325" y="32" width="255" height="240" rx="6" fill="none" stroke="#7a7a6a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Root -->
  <circle cx="450" cy="70" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="450" y="76" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="450" y="56" text-anchor="middle" fill="#7a7a6a" font-size="9">Root</text>

  <!-- Edge Root→A -->
  <line x1="435" y1="86" x2="400" y2="130" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="411" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge Root→B -->
  <line x1="465" y1="86" x2="500" y2="130" stroke="#7a7a6a" stroke-width="1.5"/>
  <text x="489" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Node A (still ?) -->
  <circle cx="390" cy="148" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="390" y="153" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="375" y="140" text-anchor="middle" fill="#7a7a6a" font-size="9">A</text>

  <!-- Node B (still ?) -->
  <circle cx="510" cy="148" r="18" fill="white" stroke="#7a7a6a" stroke-width="2"/>
  <text x="510" y="153" text-anchor="middle" fill="#7a7a6a" font-size="16">?</text>
  <text x="525" y="140" text-anchor="middle" fill="#7a7a6a" font-size="9">B</text>

  <!-- Edge A→C -->
  <line x1="390" y1="166" x2="390" y2="206" stroke="#1e8449" stroke-width="1.5"/>
  <text x="380" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge B→D -->
  <line x1="510" y1="166" x2="510" y2="206" stroke="#1e8449" stroke-width="1.5"/>
  <text x="520" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Leaf C (resolved = 1) -->
  <circle cx="390" cy="224" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="390" y="229" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="375" y="218" text-anchor="middle" fill="#1e8449" font-size="9">C</text>

  <!-- Leaf D (resolved = 1) -->
  <circle cx="510" cy="224" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="510" y="229" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="525" y="218" text-anchor="middle" fill="#1e8449" font-size="9">D</text>

  <!-- "leaf = 1" annotation -->
  <text x="450" y="258" text-anchor="middle" fill="#1e8449" font-size="9" font-style="italic">leaves have no children, return 1</text>


  <!-- ===== PANEL 3: STATE 2 — COMPLETE ===== -->
  <text x="760" y="22" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">STATE 2 — COMPLETE</text>

  <rect x="630" y="32" width="255" height="240" rx="6" fill="none" stroke="#1e8449" stroke-width="1.5"/>

  <!-- Root (resolved) -->
  <circle cx="755" cy="70" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="755" y="76" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="755" y="56" text-anchor="middle" fill="#1e8449" font-size="9">Root</text>
  <!-- Checkmark -->
  <text x="778" y="65" fill="#1e8449" font-size="14">&#10003;</text>

  <!-- Edge Root→A -->
  <line x1="740" y1="86" x2="705" y2="130" stroke="#1e8449" stroke-width="1.5"/>
  <text x="716" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge Root→B -->
  <line x1="770" y1="86" x2="805" y2="130" stroke="#1e8449" stroke-width="1.5"/>
  <text x="794" y="105" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Node A (resolved) -->
  <circle cx="695" cy="148" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="695" y="153" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="680" y="140" text-anchor="middle" fill="#1e8449" font-size="9">A</text>
  <text x="718" y="143" fill="#1e8449" font-size="12">&#10003;</text>

  <!-- Node B (resolved) -->
  <circle cx="815" cy="148" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="815" y="153" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="830" y="140" text-anchor="middle" fill="#1e8449" font-size="9">B</text>
  <text x="838" y="143" fill="#1e8449" font-size="12">&#10003;</text>

  <!-- Edge A→C -->
  <line x1="695" y1="166" x2="695" y2="206" stroke="#1e8449" stroke-width="1.5"/>
  <text x="685" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge B→D -->
  <line x1="815" y1="166" x2="815" y2="206" stroke="#1e8449" stroke-width="1.5"/>
  <text x="825" y="190" text-anchor="middle" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Leaf C -->
  <circle cx="695" cy="224" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="695" y="229" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="680" y="218" text-anchor="middle" fill="#1e8449" font-size="9">C</text>
  <text x="718" y="219" fill="#1e8449" font-size="12">&#10003;</text>

  <!-- Leaf D -->
  <circle cx="815" cy="224" r="18" fill="#e8f5e9" stroke="#1e8449" stroke-width="2.5"/>
  <text x="815" y="229" text-anchor="middle" fill="#1e8449" font-size="14" font-weight="bold">1</text>
  <text x="830" y="218" text-anchor="middle" fill="#1e8449" font-size="9">D</text>
  <text x="838" y="219" fill="#1e8449" font-size="12">&#10003;</text>

  <!-- Bottom arrow: direction indicator -->
  <line x1="200" y1="310" x2="700" y2="310" stroke="#1a1a1a" stroke-width="1.5"/>
  <polygon points="700,305 712,310 700,315" fill="#1a1a1a"/>
  <text x="450" y="330" text-anchor="middle" fill="#7a7a6a" font-size="11">bottom → up. Leaves first. Root last.</text>
</svg>
