<!-- DESCRIPTION: Three columns showing graphs at different depths. Left column "DEPTH 2": a simple parent-child pair. Child returns 1, parent gets 1. Label: "Depth 2 → 1. Base case." Center column "DEPTH 3": parent with two children (one at depth 2, one leaf). Result: 2. Label: "Depth 3 → 2. Prime. New irreducible structure." Right column "DEPTH 5": a tree that can't be decomposed into smaller sub-trees. Result: 3. Label: "Depth 5 → 3. Prime. Another irreducible structure." Between columns 2 and 3, a small "DEPTH 4" annotation showing 2 × 1 = 2 with label: "Depth 4 → 2. Composite. Just sub-structures re-combined." Bottom label: "Primes aren't stored. They emerge from irreducible topology. The structure IS the value." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <style>
    text { font-family: "DM Sans", sans-serif; }
  </style>

  <!-- ===== LEFT: DEPTH 2 → 1 (base case) ===== -->
  <rect x="15" y="10" width="200" height="300" rx="6" fill="none" stroke="#7a7a6a" stroke-width="0.8" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="115" y="35" text-anchor="middle" fill="#2471a3" font-size="13" font-weight="bold">DEPTH 2</text>

  <!-- Depth labels -->
  <text x="30" y="90" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="30" y="170" fill="#7a7a6a" font-size="8">depth 2</text>

  <!-- Root -->
  <circle cx="115" cy="86" r="18" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="115" y="91" text-anchor="middle" fill="white" font-size="11" font-weight="bold">root</text>

  <!-- Edge -->
  <line x1="115" y1="104" x2="115" y2="148" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="125" y="130" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Leaf -->
  <circle cx="115" cy="166" r="18" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="115" y="171" text-anchor="middle" fill="#1a1a2e" font-size="10">leaf</text>

  <!-- Evaluation -->
  <text x="115" y="210" text-anchor="middle" fill="#7a7a6a" font-size="9">leaf returns 1</text>
  <text x="115" y="225" text-anchor="middle" fill="#7a7a6a" font-size="9">root = 1</text>

  <!-- Result -->
  <rect x="60" y="245" width="110" height="28" rx="5" fill="#eef6fb" stroke="#2471a3" stroke-width="1.5"/>
  <text x="115" y="264" text-anchor="middle" fill="#2471a3" font-size="12" font-weight="bold">Returns 1</text>

  <!-- Label -->
  <text x="115" y="295" text-anchor="middle" fill="#7a7a6a" font-size="9" font-style="italic">Base case</text>


  <!-- ===== CENTER: DEPTH 3 → 2 (PRIME) ===== -->
  <rect x="235" y="10" width="220" height="300" rx="6" fill="none" stroke="#1e8449" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="345" y="35" text-anchor="middle" fill="#1e8449" font-size="13" font-weight="bold">DEPTH 3</text>

  <!-- Depth labels -->
  <text x="250" y="80" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="250" y="140" fill="#7a7a6a" font-size="8">depth 2</text>
  <text x="250" y="200" fill="#7a7a6a" font-size="8">depth 3</text>

  <!-- Root -->
  <circle cx="345" cy="76" r="16" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="345" y="81" text-anchor="middle" fill="white" font-size="10" font-weight="bold">root</text>

  <!-- Edge root→left -->
  <line x1="332" y1="90" x2="305" y2="122" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="310" y="102" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Edge root→right -->
  <line x1="358" y1="90" x2="385" y2="122" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="378" y="102" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Left child (depth 2) -->
  <circle cx="305" cy="136" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="305" y="140" text-anchor="middle" fill="white" font-size="9">d2</text>

  <!-- Right child (leaf at depth 2) -->
  <circle cx="385" cy="136" r="14" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="385" y="140" text-anchor="middle" fill="#1a1a2e" font-size="9">leaf</text>

  <!-- Edge left child→leaf -->
  <line x1="305" y1="150" x2="305" y2="182" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="315" y="170" fill="#d35400" font-size="11" font-weight="bold">×</text>

  <!-- Grandchild leaf -->
  <circle cx="305" cy="196" r="14" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="305" y="200" text-anchor="middle" fill="#1a1a2e" font-size="9">leaf</text>

  <!-- Evaluation -->
  <text x="345" y="235" text-anchor="middle" fill="#7a7a6a" font-size="9">new structure → 2</text>

  <!-- Result -->
  <rect x="290" y="245" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#1e8449" stroke-width="1.5"/>
  <text x="345" y="264" text-anchor="middle" fill="#1e8449" font-size="12" font-weight="bold">Returns 2</text>

  <!-- Label -->
  <text x="345" y="295" text-anchor="middle" fill="#1e8449" font-size="9" font-weight="bold">PRIME — irreducible</text>


  <!-- ===== DEPTH 4 (small annotation between center and right) ===== -->
  <rect x="475" y="90" width="140" height="130" rx="6" fill="#fdf0ef" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="545" y="112" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">DEPTH 4</text>
  <text x="545" y="135" text-anchor="middle" fill="#7a7a6a" font-size="9">Combines depth-2</text>
  <text x="545" y="150" text-anchor="middle" fill="#7a7a6a" font-size="9">sub-structures:</text>
  <text x="545" y="172" text-anchor="middle" fill="#c0392b" font-size="11" font-weight="bold">2 × 1 = 2</text>
  <text x="545" y="195" text-anchor="middle" fill="#c0392b" font-size="9" font-style="italic">COMPOSITE — not new</text>
  <text x="545" y="210" text-anchor="middle" fill="#c0392b" font-size="9" font-style="italic">just re-combined</text>


  <!-- ===== RIGHT: DEPTH 5 → 3 (PRIME) ===== -->
  <rect x="635" y="10" width="250" height="300" rx="6" fill="none" stroke="#1e8449" stroke-width="1.2" stroke-dasharray="4,3"/>

  <!-- Title -->
  <text x="760" y="35" text-anchor="middle" fill="#1e8449" font-size="13" font-weight="bold">DEPTH 5</text>

  <!-- Depth labels -->
  <text x="650" y="68" fill="#7a7a6a" font-size="8">depth 1</text>
  <text x="650" y="108" fill="#7a7a6a" font-size="8">depth 2</text>
  <text x="650" y="148" fill="#7a7a6a" font-size="8">depth 3</text>
  <text x="650" y="188" fill="#7a7a6a" font-size="8">depth 4</text>
  <text x="650" y="228" fill="#7a7a6a" font-size="8">depth 5</text>

  <!-- Root -->
  <circle cx="760" cy="64" r="14" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="760" y="68" text-anchor="middle" fill="white" font-size="9" font-weight="bold">root</text>

  <!-- Edge root→left -->
  <line x1="749" y1="76" x2="720" y2="92" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="726" y="82" fill="#d35400" font-size="9" font-weight="bold">×</text>

  <!-- Edge root→right -->
  <line x1="771" y1="76" x2="810" y2="92" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="798" y="82" fill="#d35400" font-size="9" font-weight="bold">×</text>

  <!-- Left subtree (deeper) -->
  <circle cx="720" cy="104" r="12" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="720" y="108" text-anchor="middle" fill="white" font-size="8">d2</text>

  <line x1="712" y1="114" x2="700" y2="132" stroke="#1a1a1a" stroke-width="1.3"/>
  <line x1="728" y1="114" x2="740" y2="132" stroke="#1a1a1a" stroke-width="1.3"/>

  <circle cx="700" cy="144" r="12" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="700" y="148" text-anchor="middle" fill="white" font-size="8">d3</text>

  <circle cx="740" cy="144" r="12" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="740" y="148" text-anchor="middle" fill="#1a1a2e" font-size="7">leaf</text>

  <line x1="700" y1="156" x2="700" y2="172" stroke="#1a1a1a" stroke-width="1.3"/>

  <circle cx="700" cy="184" r="12" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="700" y="188" text-anchor="middle" fill="white" font-size="8">d4</text>

  <line x1="700" y1="196" x2="700" y2="212" stroke="#1a1a1a" stroke-width="1.3"/>

  <circle cx="700" cy="224" r="12" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="700" y="228" text-anchor="middle" fill="#1a1a2e" font-size="7">leaf</text>

  <!-- Right subtree (shallower branch) -->
  <circle cx="810" cy="104" r="12" fill="#2471a3" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="810" y="108" text-anchor="middle" fill="white" font-size="8">d2</text>

  <line x1="810" y1="116" x2="810" y2="132" stroke="#1a1a1a" stroke-width="1.3"/>

  <circle cx="810" cy="144" r="12" fill="#a8dadc" stroke="#1a1a1a" stroke-width="1.3"/>
  <text x="810" y="148" text-anchor="middle" fill="#1a1a2e" font-size="7">leaf</text>

  <!-- Annotation -->
  <text x="760" y="258" text-anchor="middle" fill="#7a7a6a" font-size="9">can't factor into</text>
  <text x="760" y="271" text-anchor="middle" fill="#7a7a6a" font-size="9">smaller subgraphs → 3</text>

  <!-- Result -->
  <rect x="705" y="278" width="110" height="28" rx="5" fill="#e8f5e9" stroke="#1e8449" stroke-width="1.5"/>
  <text x="760" y="297" text-anchor="middle" fill="#1e8449" font-size="12" font-weight="bold">Returns 3</text>

  <!-- Label -->
  <text x="760" y="300" text-anchor="middle" fill="#1e8449" font-size="9" font-weight="bold"></text>


  <!-- ===== BOTTOM ARROWS: showing the sequence ===== -->
  <line x1="170" y1="345" x2="280" y2="345" stroke="#7a7a6a" stroke-width="1" marker-end="url(#arrow-gray)"/>
  <line x1="410" y1="345" x2="470" y2="170" stroke="#c0392b" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-red)"/>
  <line x1="580" y1="170" x2="640" y2="345" stroke="#1e8449" stroke-width="1" marker-end="url(#arrow-green)"/>

  <defs>
    <marker id="arrow-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#7a7a6a" stroke="none"/>
    </marker>
    <marker id="arrow-red" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#c0392b" stroke="none"/>
    </marker>
    <marker id="arrow-green" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1e8449" stroke="none"/>
    </marker>
  </defs>

  <!-- Bottom summary -->
  <text x="450" y="385" text-anchor="middle" fill="#1a1a1a" font-size="12" font-weight="bold">Primes aren't stored. They emerge from irreducible topology.</text>
  <text x="450" y="405" text-anchor="middle" fill="#7a7a6a" font-size="11" font-style="italic">The structure IS the value.</text>
</svg>
