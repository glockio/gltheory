<!-- DESCRIPTION: call-stack-pressure -->
<svg viewBox="0 0 720 360" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gg">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="blue-glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="360" fill="#08080f"/>

  <!-- Vertical dividers between panels -->
  <line x1="240" y1="0" x2="240" y2="360" stroke="#1e1e38" stroke-dasharray="6,4" stroke-width="1"/>
  <line x1="480" y1="0" x2="480" y2="360" stroke="#1e1e38" stroke-dasharray="6,4" stroke-width="1"/>

  <!-- ========== LEFT PANEL: SPREADSHEET ========== -->
  <g id="spreadsheet">
    <!-- Title -->
    <text x="120" y="25" font-family="Georgia" font-size="13" fill="#4488cc" text-anchor="middle" font-weight="bold">SPREADSHEET</text>

    <!-- Cell A1 with blue glow -->
    <rect x="40" y="55" width="160" height="40" rx="5" fill="#08080f" stroke="#4488cc" stroke-width="2" filter="url(#blue-glow)"/>
    <text x="50" y="72" font-family="Georgia" font-size="11" fill="#4488cc" font-weight="bold">A1</text>
    <text x="100" y="72" font-family="Georgia" font-size="11" fill="#4488cc" font-style="italic">=5</text>

    <!-- Arrow A1 to B1 -->
    <path d="M 120 95 L 120 115" stroke="#44cc66" stroke-width="1.5" fill="none" marker-end="url(#arrowgreen)"/>

    <!-- Cell B1 green -->
    <rect x="40" y="115" width="160" height="40" rx="5" fill="#1a3a1a" stroke="#44cc66" stroke-width="2"/>
    <text x="50" y="132" font-family="Georgia" font-size="11" fill="#44cc66" font-weight="bold">B1</text>
    <text x="100" y="132" font-family="Georgia" font-size="10" fill="#44cc66">=A1×2</text>

    <!-- Arrow B1 to C1 -->
    <path d="M 120 155 L 120 175" stroke="#44cc66" stroke-width="1.5" fill="none" marker-end="url(#arrowgreen)"/>

    <!-- Cell C1 green -->
    <rect x="40" y="175" width="160" height="40" rx="5" fill="#1a3a1a" stroke="#44cc66" stroke-width="2"/>
    <text x="50" y="192" font-family="Georgia" font-size="11" fill="#44cc66" font-weight="bold">C1</text>
    <text x="100" y="192" font-family="Georgia" font-size="10" fill="#44cc66">=A1+1</text>

    <!-- Arrow C1 to D1 -->
    <path d="M 120 215 L 120 235" stroke="#d4a017" stroke-width="1.5" fill="none" marker-end="url(#arroworange)"/>

    <!-- Cell D1 pending (gold) -->
    <rect x="40" y="235" width="160" height="40" rx="5" fill="#1a1a0f" stroke="#d4a017" stroke-width="2"/>
    <text x="50" y="252" font-family="Georgia" font-size="11" fill="#d4a017" font-weight="bold">D1</text>
    <text x="100" y="252" font-family="Georgia" font-size="10" fill="#d4a017">=B1+C1</text>

    <!-- Label -->
    <text x="120" y="315" font-family="Georgia" font-size="10" fill="#888888" text-anchor="middle">D1 waits for inputs</text>
  </g>

  <!-- ========== CENTER PANEL: INTERNET ROUTING ========== -->
  <g id="routing">
    <!-- Title -->
    <text x="360" y="25" font-family="Georgia" font-size="13" fill="#4488cc" text-anchor="middle" font-weight="bold">INTERNET ROUTING</text>

    <!-- Router nodes and connections -->
    <!-- SRC node (top left) -->
    <circle cx="280" cy="80" r="8" fill="#4488cc" stroke="#4488cc" stroke-width="1.5"/>
    <text x="280" y="65" font-family="Georgia" font-size="9" fill="#4488cc" text-anchor="middle" font-weight="bold">SRC</text>

    <!-- Regular path nodes -->
    <circle cx="320" cy="100" r="7" fill="#44cc66" stroke="#44cc66" stroke-width="1.5"/>
    <text x="315" y="118" font-family="Georgia" font-size="8" fill="#44cc66">1</text>

    <circle cx="340" cy="140" r="7" fill="#44cc66" stroke="#44cc66" stroke-width="1.5"/>
    <text x="335" y="158" font-family="Georgia" font-size="8" fill="#44cc66">2</text>

    <!-- Expensive cluster (orange) -->
    <circle cx="360" cy="110" r="8" fill="#d4a017" stroke="#d4a017" stroke-width="1.5"/>
    <text x="360" y="125" font-family="Georgia" font-size="8" fill="#d4a017">4</text>
    <circle cx="380" cy="130" r="8" fill="#d4a017" stroke="#d4a017" stroke-width="1.5"/>
    <text x="380" y="145" font-family="Georgia" font-size="8" fill="#d4a017">6</text>
    <circle cx="370" cy="160" r="8" fill="#d4a017" stroke="#d4a017" stroke-width="1.5"/>
    <text x="370" y="180" font-family="Georgia" font-size="8" fill="#d4a017">5</text>

    <!-- More regular nodes -->
    <circle cx="420" cy="150" r="7" fill="#44cc66" stroke="#44cc66" stroke-width="1.5"/>
    <text x="415" y="168" font-family="Georgia" font-size="8" fill="#44cc66">1</text>

    <circle cx="440" cy="120" r="7" fill="#44cc66" stroke="#44cc66" stroke-width="1.5"/>
    <text x="435" y="138" font-family="Georgia" font-size="8" fill="#44cc66">3</text>

    <!-- DST node (right) -->
    <circle cx="460" cy="95" r="8" fill="#4488cc" stroke="#4488cc" stroke-width="1.5"/>
    <text x="460" y="80" font-family="Georgia" font-size="9" fill="#4488cc" text-anchor="middle" font-weight="bold">DST</text>

    <!-- Path curves around expensive cluster (teal highlight) -->
    <path d="M 288 88 Q 310 85 335 135 Q 410 170 450 100" stroke="#a8dadc" stroke-width="2.5" fill="none"/>

    <!-- Regular connections (thin, muted) -->
    <line x1="280" y1="80" x2="320" y2="100" stroke="#333366" stroke-width="0.8"/>
    <line x1="320" y1="100" x2="340" y2="140" stroke="#333366" stroke-width="0.8"/>
    <line x1="340" y1="140" x2="360" y2="110" stroke="#333366" stroke-width="0.8"/>
    <line x1="360" y1="110" x2="380" y2="130" stroke="#333366" stroke-width="0.8"/>
    <line x1="380" y1="130" x2="370" y2="160" stroke="#333366" stroke-width="0.8"/>
    <line x1="370" y1="160" x2="420" y2="150" stroke="#333366" stroke-width="0.8"/>
    <line x1="420" y1="150" x2="440" y2="120" stroke="#333366" stroke-width="0.8"/>
    <line x1="440" y1="120" x2="460" y2="95" stroke="#333366" stroke-width="0.8"/>

    <!-- Label -->
    <text x="360" y="315" font-family="Georgia" font-size="10" fill="#888888" text-anchor="middle">Routes around expensive paths</text>
  </g>

  <!-- ========== RIGHT PANEL: THE UNIVERSE ========== -->
  <g id="universe">
    <!-- Title -->
    <text x="600" y="25" font-family="Georgia" font-size="13" fill="#4488cc" text-anchor="middle" font-weight="bold">THE UNIVERSE</text>

    <!-- Background mass cluster -->
    <circle cx="580" cy="130" r="50" fill="#d4a017" opacity="0.15"/>
    <circle cx="590" cy="140" r="40" fill="#d4a017" opacity="0.2"/>
    <circle cx="570" cy="145" r="35" fill="#d4a017" opacity="0.2"/>

    <!-- Mass label -->
    <text x="580" y="145" font-family="Georgia" font-size="11" fill="#d4a017" text-anchor="middle" font-weight="bold">MASS</text>

    <!-- Source and destination with similar layout to routing -->
    <!-- Source point (top left) -->
    <circle cx="520" cy="80" r="8" fill="#4488cc" stroke="#4488cc" stroke-width="1.5"/>
    <text x="520" y="65" font-family="Georgia" font-size="9" fill="#4488cc" text-anchor="middle" font-weight="bold">SRC</text>

    <!-- Path curves around mass cluster (teal highlight) -->
    <path d="M 528 88 Q 545 100 555 110 Q 555 190 630 170 Q 650 160 655 110" stroke="#a8dadc" stroke-width="2.5" fill="none"/>

    <!-- Destination point -->
    <circle cx="660" cy="95" r="8" fill="#4488cc" stroke="#4488cc" stroke-width="1.5"/>
    <text x="660" y="80" font-family="Georgia" font-size="9" fill="#4488cc" text-anchor="middle" font-weight="bold">DST</text>

    <!-- Some vector field arrows to suggest gravity -->
    <path d="M 540 120 L 560 135" stroke="#d4a017" stroke-width="0.8" fill="none" opacity="0.5" marker-end="url(#arroworange-small)"/>
    <path d="M 540 160 L 560 150" stroke="#d4a017" stroke-width="0.8" fill="none" opacity="0.5" marker-end="url(#arroworange-small)"/>
    <path d="M 620 120 L 600 135" stroke="#d4a017" stroke-width="0.8" fill="none" opacity="0.5" marker-end="url(#arroworange-small)"/>
    <path d="M 620 170 L 600 155" stroke="#d4a017" stroke-width="0.8" fill="none" opacity="0.5" marker-end="url(#arroworange-small)"/>

    <!-- Label -->
    <text x="600" y="315" font-family="Georgia" font-size="10" fill="#888888" text-anchor="middle">Gravity IS this</text>
  </g>

  <!-- ========== BOTTOM TEXT ========== -->
  <text x="360" y="345" font-family="Georgia" font-size="11" fill="#666666" text-anchor="middle">Same principle. Same math. The rules aren't coded in — they come from the shape.</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#44cc66"/>
    </marker>
    <marker id="arroworange" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#d4a017"/>
    </marker>
    <marker id="arroworange-small" markerWidth="8" markerHeight="8" refX="3" refY="2" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,4 L6,2 z" fill="#d4a017" opacity="0.5"/>
    </marker>
  </defs>
</svg>
