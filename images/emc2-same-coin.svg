<!-- DESCRIPTION: A large coin shown from a slight angle with two visible faces. Left face (blue) labeled "MASS" with "m" and "(measured in kg)". Right face (orange) labeled "ENERGY" with "E" and "(measured in joules)". The coin edge contains a tiny self-perpetuating topology (knot of 5-6 connected nodes). Below the coin: "Same thing. Different name. The c² is just the exchange rate between human units." Two equation boxes below: left (blue border) "In the graph: E = m" with "(same number)", right (orange border) "In human units: E = m × c²" with "(conversion factor)". Bottom italic line: "1 inch = 2.54 cm. The 2.54 isn't a process. Neither is c²." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="DM Sans, sans-serif">
  <rect width="900" height="420" fill="white"/>

  <!-- ============================================ -->
  <!-- THE COIN — centered, ~200px tall -->
  <!-- ============================================ -->

  <!-- Coin body (edge) — gold ellipse for the side/rim -->
  <ellipse cx="450" cy="140" rx="200" ry="100" fill="none" stroke="#d4a017" stroke-width="3"/>

  <!-- Coin thickness — side band to give 3D feel -->
  <path d="M250,140 Q250,158 300,170 Q380,185 450,185 Q520,185 600,170 Q650,158 650,140"
        fill="none" stroke="#d4a017" stroke-width="2.5" opacity="0.5"/>

  <!-- Inner gold fill with gradient feel -->
  <ellipse cx="450" cy="140" rx="195" ry="96" fill="#fdf6e3" opacity="0.6"/>

  <!-- Dividing line down the center of the coin -->
  <line x1="450" y1="44" x2="450" y2="236" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ============================================ -->
  <!-- LEFT FACE — MASS (blue) -->
  <!-- ============================================ -->

  <text x="340" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#2471a3" letter-spacing="2">MASS</text>
  <text x="340" y="145" text-anchor="middle" font-size="48" font-weight="bold" fill="#2471a3" font-style="italic">m</text>
  <text x="340" y="175" text-anchor="middle" font-size="11" fill="#999">(measured in kg)</text>

  <!-- ============================================ -->
  <!-- RIGHT FACE — ENERGY (orange) -->
  <!-- ============================================ -->

  <text x="560" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#d35400" letter-spacing="2">ENERGY</text>
  <text x="560" y="145" text-anchor="middle" font-size="48" font-weight="bold" fill="#d35400" font-style="italic">E</text>
  <text x="560" y="175" text-anchor="middle" font-size="11" fill="#999">(measured in joules)</text>

  <!-- ============================================ -->
  <!-- COIN EDGE — tiny self-perpetuating topology -->
  <!-- ============================================ -->

  <!-- Small knot of connected nodes along the bottom rim of the coin -->
  <!-- Node positions clustered around (450, 205) -->
  <circle cx="425" cy="195" r="4" fill="#d4a017" opacity="0.7"/>
  <circle cx="440" cy="208" r="4" fill="#d4a017" opacity="0.7"/>
  <circle cx="460" cy="208" r="4" fill="#d4a017" opacity="0.7"/>
  <circle cx="475" cy="195" r="4" fill="#d4a017" opacity="0.7"/>
  <circle cx="450" cy="190" r="4" fill="#d4a017" opacity="0.7"/>
  <circle cx="435" cy="200" r="3.5" fill="#d4a017" opacity="0.5"/>

  <!-- Edges between topology nodes (many connections = knot) -->
  <line x1="425" y1="195" x2="440" y2="208" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="425" y1="195" x2="450" y2="190" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="425" y1="195" x2="460" y2="208" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="440" y1="208" x2="460" y2="208" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="440" y1="208" x2="475" y2="195" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="440" y1="208" x2="450" y2="190" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="460" y1="208" x2="475" y2="195" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="460" y1="208" x2="450" y2="190" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="475" y1="195" x2="450" y2="190" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="435" y1="200" x2="450" y2="190" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="435" y1="200" x2="425" y2="195" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="435" y1="200" x2="440" y2="208" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>
  <line x1="435" y1="200" x2="460" y2="208" stroke="#d4a017" stroke-width="1.2" opacity="0.5"/>

  <!-- ============================================ -->
  <!-- TAGLINE below the coin -->
  <!-- ============================================ -->

  <text x="450" y="258" text-anchor="middle" font-size="15" fill="#1a1a1a">Same thing. Different name.</text>
  <text x="450" y="278" text-anchor="middle" font-size="13" fill="#777">The c&#178; is just the exchange rate between human units.</text>

  <!-- ============================================ -->
  <!-- TWO EQUATION BOXES -->
  <!-- ============================================ -->

  <!-- LEFT BOX — blue border: "In the graph" -->
  <rect x="120" y="300" width="295" height="70" rx="6" fill="white" stroke="#2471a3" stroke-width="2"/>
  <text x="267" y="327" text-anchor="middle" font-size="14" fill="#1a1a1a">
    <tspan fill="#777">In the graph: </tspan>
    <tspan font-weight="bold" fill="#2471a3" font-style="italic">E = m</tspan>
  </text>
  <text x="267" y="350" text-anchor="middle" font-size="11" fill="#999">(same number)</text>

  <!-- RIGHT BOX — orange border: "In human units" -->
  <rect x="485" y="300" width="295" height="70" rx="6" fill="white" stroke="#d35400" stroke-width="2"/>
  <text x="632" y="327" text-anchor="middle" font-size="14" fill="#1a1a1a">
    <tspan fill="#777">In human units: </tspan>
    <tspan font-weight="bold" fill="#d35400" font-style="italic">E = m &#215; c&#178;</tspan>
  </text>
  <text x="632" y="350" text-anchor="middle" font-size="11" fill="#999">(conversion factor)</text>

  <!-- ============================================ -->
  <!-- BOTTOM LINE — the punchline -->
  <!-- ============================================ -->

  <text x="450" y="405" text-anchor="middle" font-size="12" fill="#999" font-style="italic">1 inch = 2.54 cm. The 2.54 isn't a process. Neither is c&#178;.</text>

</svg>
