<!-- DESCRIPTION: A stable pattern (triangle + center node cluster) propagating through a growing causal graph. Three snapshots left-to-right: "TICK 1", "TICK 2", "TICK 3". In each snapshot, the pattern is in a different position but maintains the same internal structure. Old positions shown as faded gray. New positions shown in blue. The surrounding graph grows (more nodes at each tick). Label: "A particle: a stable topology that propagates through the growing graph. Same pattern. Different position. The pattern IS the particle." -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" font-family="DM Sans, sans-serif">
  <rect width="900" height="350" fill="none"/>

  <defs>
    <marker id="wip-arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#1a1a1a" stroke="none"/>
    </marker>
  </defs>

  <!-- Panel dividers -->
  <line x1="300" y1="25" x2="300" y2="265" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="25" x2="600" y2="265" stroke="#d5d0c0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ====== TICK 1 ====== -->
  <text x="150" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#2471a3" letter-spacing="1.5">TICK 1</text>

  <!-- Background graph nodes (gray, sparse) -->
  <circle cx="60" cy="100" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="90" cy="160" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="50" cy="200" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="230" cy="80" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="250" cy="180" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="220" cy="220" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- Background edges -->
  <line x1="60" y1="105" x2="90" y2="155" stroke="#ccc" stroke-width="0.8"/>
  <line x1="90" y1="165" x2="50" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="230" y1="85" x2="250" y2="175" stroke="#ccc" stroke-width="0.8"/>
  <line x1="250" y1="185" x2="220" y2="215" stroke="#ccc" stroke-width="0.8"/>

  <!-- THE PATTERN at position 1 (blue) - triangle + center -->
  <!-- Triangle vertices -->
  <circle cx="130" cy="100" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="170" cy="100" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="150" cy="165" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <!-- Center node -->
  <circle cx="150" cy="125" r="8" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <!-- Pattern edges -->
  <line x1="130" y1="108" x2="143" y2="120" stroke="#2471a3" stroke-width="2"/>
  <line x1="170" y1="108" x2="157" y2="120" stroke="#2471a3" stroke-width="2"/>
  <line x1="143" y1="131" x2="150" y2="157" stroke="#2471a3" stroke-width="2"/>
  <line x1="157" y1="131" x2="150" y2="157" stroke="#2471a3" stroke-width="2"/>
  <line x1="138" y1="100" x2="162" y2="100" stroke="#2471a3" stroke-width="2"/>
  <!-- Connections to background -->
  <line x1="122" y1="100" x2="65" y2="100" stroke="#bbb" stroke-width="0.8"/>
  <line x1="178" y1="100" x2="225" y2="82" stroke="#bbb" stroke-width="0.8"/>
  <line x1="150" y1="173" x2="90" y2="160" stroke="#bbb" stroke-width="0.8"/>

  <!-- ====== TICK 2 ====== -->
  <text x="450" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#2471a3" letter-spacing="1.5">TICK 2</text>

  <!-- More background nodes (graph grew) -->
  <circle cx="340" cy="90" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="360" cy="160" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="340" cy="220" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="530" cy="80" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="555" cy="140" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="545" cy="200" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="530" cy="240" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="370" cy="240" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- Background edges -->
  <line x1="340" y1="95" x2="360" y2="155" stroke="#ccc" stroke-width="0.8"/>
  <line x1="360" y1="165" x2="340" y2="215" stroke="#ccc" stroke-width="0.8"/>
  <line x1="530" y1="85" x2="555" y2="135" stroke="#ccc" stroke-width="0.8"/>
  <line x1="555" y1="145" x2="545" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="545" y1="205" x2="530" y2="235" stroke="#ccc" stroke-width="0.8"/>
  <line x1="340" y1="225" x2="370" y2="237" stroke="#ccc" stroke-width="0.8"/>

  <!-- Old position (faded gray) -->
  <circle cx="415" cy="100" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="445" cy="100" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="430" cy="155" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="430" cy="120" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="415" y1="107" x2="424" y2="114" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="445" y1="107" x2="436" y2="114" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="424" y1="127" x2="430" y2="148" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="436" y1="127" x2="430" y2="148" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- THE PATTERN at position 2 (blue, shifted right & down) -->
  <circle cx="455" cy="140" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="495" cy="140" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="475" cy="205" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="475" cy="165" r="8" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <line x1="455" y1="148" x2="468" y2="160" stroke="#2471a3" stroke-width="2"/>
  <line x1="495" y1="148" x2="482" y2="160" stroke="#2471a3" stroke-width="2"/>
  <line x1="468" y1="171" x2="475" y2="197" stroke="#2471a3" stroke-width="2"/>
  <line x1="482" y1="171" x2="475" y2="197" stroke="#2471a3" stroke-width="2"/>
  <line x1="463" y1="140" x2="487" y2="140" stroke="#2471a3" stroke-width="2"/>
  <!-- Connections to background -->
  <line x1="447" y1="140" x2="365" y2="160" stroke="#bbb" stroke-width="0.8"/>
  <line x1="503" y1="140" x2="550" y2="140" stroke="#bbb" stroke-width="0.8"/>
  <line x1="475" y1="213" x2="370" y2="237" stroke="#bbb" stroke-width="0.8"/>

  <!-- Motion arrow -->
  <path d="M 440,110 Q 455,120 460,132" fill="none" stroke="#2471a3" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.6"/>

  <!-- ====== TICK 3 ====== -->
  <text x="750" y="24" text-anchor="middle" font-size="12" font-weight="700" fill="#2471a3" letter-spacing="1.5">TICK 3</text>

  <!-- Even more background nodes -->
  <circle cx="640" cy="80" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="660" cy="140" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="640" cy="210" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="660" cy="245" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="840" cy="80" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="860" cy="140" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="855" cy="200" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="840" cy="250" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="700" cy="60" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <circle cx="810" cy="60" r="5" fill="none" stroke="#bbb" stroke-width="1"/>
  <!-- Background edges -->
  <line x1="640" y1="85" x2="660" y2="135" stroke="#ccc" stroke-width="0.8"/>
  <line x1="660" y1="145" x2="640" y2="205" stroke="#ccc" stroke-width="0.8"/>
  <line x1="640" y1="215" x2="660" y2="240" stroke="#ccc" stroke-width="0.8"/>
  <line x1="840" y1="85" x2="860" y2="135" stroke="#ccc" stroke-width="0.8"/>
  <line x1="860" y1="145" x2="855" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="855" y1="205" x2="840" y2="245" stroke="#ccc" stroke-width="0.8"/>
  <line x1="700" y1="65" x2="810" y2="62" stroke="#ccc" stroke-width="0.8"/>

  <!-- Old position 1 (very faded) -->
  <circle cx="715" cy="100" r="6" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>
  <circle cx="745" cy="100" r="6" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>
  <circle cx="730" cy="155" r="6" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>
  <circle cx="730" cy="120" r="6" fill="none" stroke="#ddd" stroke-width="1" stroke-dasharray="3,2" opacity="0.35"/>

  <!-- Old position 2 (faded) -->
  <circle cx="745" cy="135" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="785" cy="135" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="765" cy="195" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <circle cx="765" cy="160" r="7" fill="none" stroke="#ccc" stroke-width="1.2" stroke-dasharray="3,2" opacity="0.5"/>
  <line x1="745" y1="142" x2="758" y2="154" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>
  <line x1="785" y1="142" x2="772" y2="154" stroke="#ccc" stroke-width="1" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- THE PATTERN at position 3 (blue, shifted further) -->
  <circle cx="775" cy="170" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="815" cy="170" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="795" cy="235" r="8" fill="#d6eaf8" stroke="#2471a3" stroke-width="2"/>
  <circle cx="795" cy="195" r="8" fill="#2471a3" stroke="#1a5276" stroke-width="2"/>
  <line x1="775" y1="178" x2="788" y2="190" stroke="#2471a3" stroke-width="2"/>
  <line x1="815" y1="178" x2="802" y2="190" stroke="#2471a3" stroke-width="2"/>
  <line x1="788" y1="201" x2="795" y2="227" stroke="#2471a3" stroke-width="2"/>
  <line x1="802" y1="201" x2="795" y2="227" stroke="#2471a3" stroke-width="2"/>
  <line x1="783" y1="170" x2="807" y2="170" stroke="#2471a3" stroke-width="2"/>
  <!-- Connections to background -->
  <line x1="767" y1="170" x2="665" y2="142" stroke="#bbb" stroke-width="0.8"/>
  <line x1="823" y1="170" x2="855" y2="195" stroke="#bbb" stroke-width="0.8"/>
  <line x1="795" y1="243" x2="840" y2="248" stroke="#bbb" stroke-width="0.8"/>

  <!-- ====== BOTTOM LABEL ====== -->
  <line x1="80" y1="280" x2="820" y2="280" stroke="#1a1a1a" stroke-width="0.5" opacity="0.2"/>
  <text x="450" y="305" text-anchor="middle" font-size="13" fill="#1a1a1a">A particle: a stable topology that propagates through the growing graph.</text>
  <text x="450" y="325" text-anchor="middle" font-size="13" fill="#1a1a1a">Same pattern. Different position.</text>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="bold" fill="#1a1a2e">The pattern IS the particle.</text>
</svg>
