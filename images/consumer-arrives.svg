<!-- DESCRIPTION: consumer-arrives -->
<svg viewBox="0 0 720 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="gg"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="go"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ag" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#44cc66"/>
    </marker>
    <marker id="ao" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#d35400"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#08080f"/>

  <!-- Center: node turning GREEN (committed) -->
  <circle cx="340" cy="160" r="26" fill="#1a3a1a" stroke="#44cc66" stroke-width="2.5" filter="url(#gg)"/>
  <text x="340" y="166" fill="#44cc66" font-size="18" text-anchor="middle" font-family="Georgia">&#10003;</text>

  <!-- E1: arrived (solid green) -->
  <circle cx="140" cy="80" r="10" fill="#1a3a1a" stroke="#44cc66" stroke-width="1.8" filter="url(#gg)"/>
  <line x1="150" y1="85" x2="316" y2="150" stroke="#44cc66" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="140" y="65" fill="#44cc66" font-size="10" text-anchor="middle" font-family="Georgia">E1</text>
  <text x="200" y="100" fill="#44cc66" font-size="10" font-family="Georgia">&#10003; arrived</text>

  <!-- E2: arrived (solid green) -->
  <circle cx="120" cy="200" r="10" fill="#1a3a1a" stroke="#44cc66" stroke-width="1.8" filter="url(#gg)"/>
  <line x1="130" y1="198" x2="316" y2="168" stroke="#44cc66" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="120" y="185" fill="#44cc66" font-size="10" text-anchor="middle" font-family="Georgia">E2</text>
  <text x="180" y="215" fill="#44cc66" font-size="10" font-family="Georgia">&#10003; arrived</text>

  <!-- E3: still traveling (dashed red, far away) -->
  <circle cx="50" cy="150" r="10" fill="#2a0a0a" stroke="#cc4444" stroke-width="1.8"/>
  <line x1="60" y1="152" x2="310" y2="160" stroke="#cc4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="135" fill="#cc4444" font-size="10" text-anchor="middle" font-family="Georgia">E3</text>
  <text x="100" y="170" fill="#cc4444" font-size="10" font-family="Georgia">still traveling</text>
  <text x="125" y="138" fill="#884444" font-size="9" font-family="Georgia">&#10007; too late</text>

  <!-- Consumer: orange node on the right -->
  <circle cx="540" cy="160" r="20" fill="#1a1000" stroke="#d35400" stroke-width="2.5" filter="url(#go)"/>
  <text x="540" y="166" fill="#d35400" font-size="14" text-anchor="middle" font-family="Georgia" font-weight="bold">C</text>
  <text x="540" y="130" fill="#d35400" font-size="11" text-anchor="middle" font-family="Georgia">CONSUMER</text>
  <text x="540" y="200" fill="#885500" font-size="10" text-anchor="middle" font-family="Georgia">needs the value</text>

  <!-- Orange arrow from consumer to center node -->
  <line x1="520" y1="160" x2="370" y2="160" stroke="#d35400" stroke-width="1.5" marker-end="url(#ao)"/>
  <text x="445" y="150" fill="#d35400" font-size="10" text-anchor="middle" font-family="Georgia">demands value</text>

  <!-- Commit label -->
  <text x="340" y="210" fill="#44cc66" font-size="11" text-anchor="middle" font-family="Georgia">commits now &#8212; value = f(E1, E2)</text>

  <!-- Bottom annotation -->
  <text x="360" y="290" fill="#666666" font-size="11" text-anchor="middle" font-family="Georgia">E3 arrives too late. Joins the next layer instead.</text>
</svg>
