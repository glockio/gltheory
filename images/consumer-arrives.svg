<!-- DESCRIPTION: Convergence at a pending node. An upward-growing DAG with green committed nodes at the bottom/middle layers and a pending node (transitioning purple-to-green) at the top. Three events travel toward the pending node: E1 and E2 have arrived (green, solid traced paths with tick markers), E3 is still traveling (red, dashed). An orange CONSUMER node appears to the right, demanding the value. The pending node commits with f(E1, E2). E3 is too late and joins the next layer. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="DM Sans, sans-serif">

  <defs>
    <!-- Arrow markers -->
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#1e8449" stroke="none"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#c0392b" stroke="none"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d35400" stroke="none"/>
    </marker>
    <!-- Half-purple half-green gradient for transitioning node -->
    <linearGradient id="commit-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7d3c98"/>
      <stop offset="45%" stop-color="#7d3c98"/>
      <stop offset="55%" stop-color="#1e8449"/>
      <stop offset="100%" stop-color="#1e8449"/>
    </linearGradient>
  </defs>

  <!-- ============================================ -->
  <!-- BOTTOM LAYER: committed nodes (green, solid) -->
  <!-- ============================================ -->

  <!-- Bottom row: y=310 -->
  <circle cx="160" cy="310" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
  <circle cx="260" cy="310" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
  <circle cx="360" cy="310" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
  <circle cx="460" cy="310" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>
  <circle cx="560" cy="310" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.7"/>

  <!-- Middle-lower row: y=250 -->
  <circle cx="210" cy="250" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.8"/>
  <circle cx="360" cy="250" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.8"/>
  <circle cx="510" cy="250" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.8"/>

  <!-- Middle-upper row: y=190 -->
  <circle cx="280" cy="190" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.9"/>
  <circle cx="440" cy="190" r="12" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5" opacity="0.9"/>

  <!-- ============================================ -->
  <!-- DAG EDGES (upward from children to parents)  -->
  <!-- ============================================ -->

  <!-- Bottom to middle-lower -->
  <line x1="160" y1="298" x2="210" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="298" x2="210" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="260" y1="298" x2="360" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="360" y1="298" x2="360" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="460" y1="298" x2="360" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="460" y1="298" x2="510" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="560" y1="298" x2="510" y2="262" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>

  <!-- Middle-lower to middle-upper -->
  <line x1="210" y1="238" x2="280" y2="202" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="360" y1="238" x2="280" y2="202" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="360" y1="238" x2="440" y2="202" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="510" y1="238" x2="440" y2="202" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>

  <!-- Middle-upper to pending node -->
  <line x1="280" y1="178" x2="360" y2="127" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>
  <line x1="440" y1="178" x2="360" y2="127" stroke="#1a1a1a" stroke-width="1" opacity="0.25"/>

  <!-- Committed checkmarks on some nodes -->
  <text x="210" y="254" text-anchor="middle" font-size="10" fill="white" font-weight="700">&#10003;</text>
  <text x="360" y="254" text-anchor="middle" font-size="10" fill="white" font-weight="700">&#10003;</text>
  <text x="510" y="254" text-anchor="middle" font-size="10" fill="white" font-weight="700">&#10003;</text>
  <text x="280" y="194" text-anchor="middle" font-size="10" fill="white" font-weight="700">&#10003;</text>
  <text x="440" y="194" text-anchor="middle" font-size="10" fill="white" font-weight="700">&#10003;</text>

  <!-- "committed" label for bottom layers -->
  <text x="62" y="314" text-anchor="middle" font-size="9" fill="#1e8449" opacity="0.7">committed</text>
  <text x="62" y="254" text-anchor="middle" font-size="9" fill="#1e8449" opacity="0.8">committed</text>
  <text x="62" y="194" text-anchor="middle" font-size="9" fill="#1e8449" opacity="0.9">committed</text>

  <!-- ======================================================== -->
  <!-- THE PENDING NODE — transitioning purple to green (top)    -->
  <!-- ======================================================== -->

  <circle cx="360" cy="115" r="18" fill="url(#commit-grad)" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Checkmark appearing -->
  <text x="360" y="121" text-anchor="middle" font-size="16" fill="white" font-weight="700">&#10003;</text>

  <!-- Commit label below the node -->
  <text x="360" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#1e8449">commits now</text>
  <text x="360" y="72" text-anchor="middle" font-size="10" fill="#1a1a2e">value = f(E1, E2)</text>

  <!-- ======================================================== -->
  <!-- EVENT E1 — arrived from the LEFT, traced path with ticks -->
  <!-- ======================================================== -->

  <!-- E1 source node -->
  <circle cx="100" cy="205" r="9" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="100" y="209" text-anchor="middle" font-size="8" fill="white" font-weight="700">E1</text>

  <!-- Traced path: thick green line through the tree -->
  <!-- E1 path: (100,205) -> (210,250) -> (280,190) -> (360,115) -->
  <polyline points="109,200 210,245" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7"/>
  <polyline points="210,245 280,185" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7"/>
  <polyline points="280,185 348,120" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7" marker-end="url(#arr-green)"/>

  <!-- Tick markers along the E1 path -->
  <circle cx="145" cy="225" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="145" y="228" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">3</text>
  <circle cx="240" cy="220" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="240" y="223" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">2</text>
  <circle cx="310" cy="158" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="310" y="161" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">1</text>

  <!-- E1 label -->
  <text x="100" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#1e8449">E1 &#8212; arrived &#10003;</text>

  <!-- ======================================================== -->
  <!-- EVENT E2 — arrived from the RIGHT, traced path with ticks -->
  <!-- ======================================================== -->

  <!-- E2 source node -->
  <circle cx="620" cy="205" r="9" fill="#1e8449" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="620" y="209" text-anchor="middle" font-size="8" fill="white" font-weight="700">E2</text>

  <!-- Traced path: thick green line through the tree -->
  <!-- E2 path: (620,205) -> (510,250) -> (440,190) -> (360,115) -->
  <polyline points="611,200 510,245" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7"/>
  <polyline points="510,245 440,185" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7"/>
  <polyline points="440,185 372,120" fill="none" stroke="#2471a3" stroke-width="3" opacity="0.7" marker-end="url(#arr-green)"/>

  <!-- Tick markers along the E2 path -->
  <circle cx="575" cy="225" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="575" y="228" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">3</text>
  <circle cx="480" cy="220" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="480" y="223" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">2</text>
  <circle cx="410" cy="158" r="7" fill="white" stroke="#2471a3" stroke-width="1.2"/>
  <text x="410" y="161" text-anchor="middle" font-size="7" fill="#2471a3" font-weight="700">1</text>

  <!-- E2 label -->
  <text x="620" y="185" text-anchor="middle" font-size="11" font-weight="700" fill="#1e8449">E2 &#8212; arrived &#10003;</text>

  <!-- ======================================================== -->
  <!-- EVENT E3 — still traveling, dashed red, hasn't reached    -->
  <!-- ======================================================== -->

  <!-- E3 source node — far away bottom-left -->
  <circle cx="100" cy="340" r="9" fill="white" stroke="#c0392b" stroke-width="1.8"/>
  <text x="100" y="344" text-anchor="middle" font-size="8" fill="#c0392b" font-weight="700">E3</text>

  <!-- Dashed red path — only partway through the tree -->
  <polyline points="109,335 160,310" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" opacity="0.6"/>
  <polyline points="160,305 210,250" fill="none" stroke="#c0392b" stroke-width="2" stroke-dasharray="5,4" opacity="0.4"/>
  <!-- Faded further continuation (not reaching) -->
  <polyline points="210,245 280,190" fill="none" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="3,5" opacity="0.2"/>

  <!-- E3 label -->
  <text x="100" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#c0392b">E3 &#8212; still traveling</text>

  <!-- "too late" annotation -->
  <text x="175" y="280" font-size="10" font-weight="700" fill="#c0392b">too late &#8212;</text>
  <text x="175" y="293" font-size="10" fill="#c0392b">joins next layer</text>

  <!-- ======================================================== -->
  <!-- CONSUMER NODE — orange, demanding the value               -->
  <!-- ======================================================== -->

  <!-- Consumer node -->
  <circle cx="700" cy="100" r="22" fill="white" stroke="#d35400" stroke-width="2.5"/>
  <text x="700" y="105" text-anchor="middle" font-size="12" fill="#d35400" font-weight="700">C</text>

  <!-- Consumer labels -->
  <text x="700" y="74" text-anchor="middle" font-size="11" font-weight="700" fill="#d35400">CONSUMER</text>
  <text x="700" y="136" text-anchor="middle" font-size="9" fill="#7a7a6a">needs the value</text>

  <!-- Arrow from consumer to pending node -->
  <line x1="678" y1="104" x2="382" y2="113" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="530" y="98" text-anchor="middle" font-size="10" font-weight="600" fill="#d35400">demands value</text>

  <!-- ======================================================== -->
  <!-- BOTTOM ANNOTATION                                         -->
  <!-- ======================================================== -->

  <line x1="100" y1="385" x2="800" y2="385" stroke="#1a1a1a" stroke-width="0.5" opacity="0.15"/>
  <text x="450" y="398" text-anchor="middle" font-size="12" fill="#1a1a2e">A consumer appears. The node commits with whatever inputs have arrived. E3 was still traveling. Too late.</text>

</svg>
