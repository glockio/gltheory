<!-- DESCRIPTION: Spreadsheet dependency chain — A1 changes (blue), B1 and C1 wait for A1 (amber/pending), D1 waits for both B1 and C1 (amber/pending). Curved arrows show dependency flow. Illustrates topological ordering. -->
<svg viewBox="0 0 900 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Soft blue glow for the "just changed" cell -->
    <filter id="blue-pulse" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Curved arrow markers -->
    <marker id="dep-blue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,1 L0,7 L9,4 z" fill="#2471a3" opacity="0.65"/>
    </marker>
    <marker id="dep-amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,1 L0,7 L9,4 z" fill="#d4a017" opacity="0.65"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="900" height="350" fill="#ffffff"/>

  <!-- ================================================================ -->
  <!-- CELL A1 — CHANGED (blue highlight)                              -->
  <!-- ================================================================ -->
  <g id="cell-a1">
    <!-- Cell label (small, above) -->
    <text x="128" y="58" font-family="'DM Sans', sans-serif" font-size="13" fill="#888888" text-anchor="middle" font-weight="500">A1</text>

    <!-- Cell rectangle — light blue, bold border, with glow -->
    <rect x="58" y="66" width="140" height="90" rx="8" fill="#dbeaf7" stroke="#2471a3" stroke-width="2.5" filter="url(#blue-pulse)"/>

    <!-- Sparkle dot (top-right, "just changed" indicator) -->
    <circle cx="183" cy="80" r="6" fill="#2471a3" opacity="0.5"/>
    <circle cx="183" cy="80" r="3" fill="#ffffff" opacity="0.9"/>

    <!-- Big value -->
    <text x="128" y="124" font-family="'DM Sans', sans-serif" font-size="32" fill="#2471a3" text-anchor="middle" font-weight="700">5</text>

    <!-- Status -->
    <text x="128" y="178" font-family="'DM Sans', sans-serif" font-size="11" fill="#2471a3" text-anchor="middle" font-weight="600">changed!</text>
  </g>

  <!-- ================================================================ -->
  <!-- CELL B1 — PENDING (amber, waiting for A1)                       -->
  <!-- ================================================================ -->
  <g id="cell-b1">
    <text x="348" y="32" font-family="'DM Sans', sans-serif" font-size="13" fill="#888888" text-anchor="middle" font-weight="500">B1</text>

    <rect x="278" y="40" width="140" height="90" rx="8" fill="#fef9e8" stroke="#d4a017" stroke-width="1.8"/>

    <!-- Formula -->
    <text x="348" y="80" font-family="'DM Sans', sans-serif" font-size="18" fill="#b8860b" text-anchor="middle" font-weight="600">=A1 &#xd7; 2</text>

    <!-- Hourglass / waiting indicator -->
    <text x="348" y="108" font-family="'DM Sans', sans-serif" font-size="20" fill="#d4a017" text-anchor="middle" letter-spacing="4" opacity="0.7">. . .</text>

    <!-- Status -->
    <text x="348" y="152" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="500">waiting for A1</text>
  </g>

  <!-- ================================================================ -->
  <!-- CELL C1 — PENDING (amber, waiting for A1)                       -->
  <!-- ================================================================ -->
  <g id="cell-c1">
    <text x="348" y="182" font-family="'DM Sans', sans-serif" font-size="13" fill="#888888" text-anchor="middle" font-weight="500">C1</text>

    <rect x="278" y="190" width="140" height="90" rx="8" fill="#fef9e8" stroke="#d4a017" stroke-width="1.8"/>

    <!-- Formula -->
    <text x="348" y="230" font-family="'DM Sans', sans-serif" font-size="18" fill="#b8860b" text-anchor="middle" font-weight="600">=A1 + 3</text>

    <!-- Waiting indicator -->
    <text x="348" y="260" font-family="'DM Sans', sans-serif" font-size="20" fill="#d4a017" text-anchor="middle" letter-spacing="4" opacity="0.7">. . .</text>

    <!-- Status -->
    <text x="348" y="300" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="500">waiting for A1</text>
  </g>

  <!-- ================================================================ -->
  <!-- CELL D1 — PENDING (amber, waiting for B1 AND C1)                -->
  <!-- ================================================================ -->
  <g id="cell-d1">
    <text x="588" y="108" font-family="'DM Sans', sans-serif" font-size="13" fill="#888888" text-anchor="middle" font-weight="500">D1</text>

    <rect x="518" y="116" width="140" height="90" rx="8" fill="#fef9e8" stroke="#d4a017" stroke-width="1.8"/>

    <!-- Formula -->
    <text x="588" y="156" font-family="'DM Sans', sans-serif" font-size="18" fill="#b8860b" text-anchor="middle" font-weight="600">=B1 + C1</text>

    <!-- Waiting indicator -->
    <text x="588" y="186" font-family="'DM Sans', sans-serif" font-size="20" fill="#d4a017" text-anchor="middle" letter-spacing="4" opacity="0.7">. . .</text>

    <!-- Status -->
    <text x="588" y="226" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="500">waiting for B1 and C1</text>
  </g>

  <!-- ================================================================ -->
  <!-- DEPENDENCY ARROWS (curved, friendly)                            -->
  <!-- ================================================================ -->

  <!-- A1 -> B1 -->
  <path d="M 198 90 C 230 70, 255 58, 278 72"
        stroke="#2471a3" stroke-width="2.2" fill="none" stroke-linecap="round"
        marker-end="url(#dep-blue)"/>

  <!-- A1 -> C1 -->
  <path d="M 198 135 C 230 165, 255 195, 278 225"
        stroke="#2471a3" stroke-width="2.2" fill="none" stroke-linecap="round"
        marker-end="url(#dep-blue)"/>

  <!-- B1 -> D1 -->
  <path d="M 418 95 C 455 110, 490 125, 518 148"
        stroke="#d4a017" stroke-width="2.2" fill="none" stroke-linecap="round"
        marker-end="url(#dep-amber)"/>

  <!-- C1 -> D1 -->
  <path d="M 418 225 C 455 210, 490 190, 518 172"
        stroke="#d4a017" stroke-width="2.2" fill="none" stroke-linecap="round"
        marker-end="url(#dep-amber)"/>

  <!-- ================================================================ -->
  <!-- STEP BADGES (subtle numbered circles)                           -->
  <!-- ================================================================ -->

  <!-- Step 1 on A1 -->
  <circle cx="72" cy="78" r="10" fill="#2471a3" opacity="0.12"/>
  <text x="72" y="82" font-family="'DM Sans', sans-serif" font-size="11" fill="#2471a3" text-anchor="middle" font-weight="700">1</text>

  <!-- Step 2 on B1 -->
  <circle cx="292" cy="52" r="10" fill="#d4a017" opacity="0.12"/>
  <text x="292" y="56" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="700">2</text>

  <!-- Step 2 on C1 -->
  <circle cx="292" cy="202" r="10" fill="#d4a017" opacity="0.12"/>
  <text x="292" y="206" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="700">2</text>

  <!-- Step 3 on D1 -->
  <circle cx="532" cy="128" r="10" fill="#d4a017" opacity="0.12"/>
  <text x="532" y="132" font-family="'DM Sans', sans-serif" font-size="11" fill="#b8860b" text-anchor="middle" font-weight="700">3</text>

  <!-- ================================================================ -->
  <!-- NARRATIVE TEXT (below the cells)                                 -->
  <!-- ================================================================ -->

  <text x="450" y="322" font-family="'DM Sans', sans-serif" font-size="12.5" fill="#999999" text-anchor="middle">
    A1 changed  &#x2192;  B1 and C1 wait  &#x2192;  D1 waits for both  &#x2192;  topological order
  </text>

  <text x="450" y="344" font-family="'DM Sans', sans-serif" font-size="11.5" fill="#888888" text-anchor="middle" font-style="italic">
    C1 can't compute until A1 is ready. D1 can't compute until B1 AND C1 are ready. They wait. In order.
  </text>

  <!-- ================================================================ -->
  <!-- RIGHT-SIDE RESULT HINT (what everything will become)            -->
  <!-- ================================================================ -->
  <g opacity="0.4">
    <text x="710" y="148" font-family="'DM Sans', sans-serif" font-size="10" fill="#1e8449" text-anchor="start">&#x2192; 10</text>
    <text x="710" y="168" font-family="'DM Sans', sans-serif" font-size="10" fill="#1e8449" text-anchor="start">&#x2192; 8</text>
    <text x="710" y="188" font-family="'DM Sans', sans-serif" font-size="10" fill="#1e8449" text-anchor="start">&#x2192; 18</text>

    <text x="700" y="148" font-family="'DM Sans', sans-serif" font-size="9" fill="#999999" text-anchor="end">B1</text>
    <text x="700" y="168" font-family="'DM Sans', sans-serif" font-size="9" fill="#999999" text-anchor="end">C1</text>
    <text x="700" y="188" font-family="'DM Sans', sans-serif" font-size="9" fill="#999999" text-anchor="end">D1</text>
  </g>

</svg>
