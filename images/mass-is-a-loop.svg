<!-- DESCRIPTION: Side-by-side comparison of photon (straight chain of orange dots, no internal structure, travels at C) vs massive particle (self-perpetuating topological knot of blue/red dots shown across three animation frames, must spend budget maintaining itself so travels slower than C) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <style>
    text { font-family: 'DM Sans', sans-serif; }
  </style>

  <!-- White background -->
  <rect width="900" height="420" fill="white"/>

  <!-- ===== ARROW MARKERS ===== -->
  <defs>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#d35400"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="#999"/>
    </marker>
  </defs>

  <!-- ===== PANEL HEADERS ===== -->

  <!-- Left panel header -->
  <text x="225" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#d35400">PHOTON</text>
  <text x="225" y="58" text-anchor="middle" font-size="12" fill="#666">(no internal structure)</text>

  <!-- Right panel header -->
  <text x="675" y="38" text-anchor="middle" font-size="18" font-weight="700" fill="#c0392b">MASSIVE PARTICLE</text>
  <text x="675" y="58" text-anchor="middle" font-size="12" fill="#666">(self-perpetuating topology)</text>

  <!-- Dashed vertical divider -->
  <line x1="450" y1="20" x2="450" y2="370" stroke="#bbb" stroke-width="1.5" stroke-dasharray="8,5"/>

  <!-- ===== LEFT PANEL: PHOTON ===== -->

  <!-- Photon chain: 5 orange dots in a straight horizontal line with arrows -->
  <circle cx="70" cy="150" r="8" fill="#d35400"/>
  <circle cx="145" cy="150" r="8" fill="#d35400"/>
  <circle cx="220" cy="150" r="8" fill="#d35400"/>
  <circle cx="295" cy="150" r="8" fill="#d35400"/>
  <circle cx="370" cy="150" r="8" fill="#d35400"/>

  <!-- Arrows between dots -->
  <line x1="82" y1="150" x2="133" y2="150" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="157" y1="150" x2="208" y2="150" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="232" y1="150" x2="283" y2="150" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>
  <line x1="307" y1="150" x2="358" y2="150" stroke="#d35400" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Subtle motion streak underneath -->
  <line x1="70" y1="185" x2="360" y2="185" stroke="#d35400" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-orange)" opacity="0.45"/>

  <!-- Left panel description -->
  <text x="225" y="228" text-anchor="middle" font-size="13" fill="#555">Nothing to maintain.</text>
  <text x="225" y="248" text-anchor="middle" font-size="13" fill="#555">All budget goes forward.</text>
  <text x="225" y="282" text-anchor="middle" font-size="16" font-weight="700" fill="#d35400">Speed = C</text>

  <!-- ===== RIGHT PANEL: MASSIVE PARTICLE ===== -->

  <!-- Frame 1 (tick 1) — dense knot cluster -->
  <g transform="translate(520, 115)">
    <!-- 6 nodes with dense internal wiring -->
    <circle cx="0" cy="0" r="6" fill="#2471a3"/>
    <circle cx="28" cy="-18" r="6" fill="#c0392b"/>
    <circle cx="52" cy="2" r="6" fill="#2471a3"/>
    <circle cx="10" cy="22" r="6" fill="#c0392b"/>
    <circle cx="42" cy="24" r="6" fill="#2471a3"/>
    <circle cx="26" cy="6" r="5" fill="#c0392b"/>
    <!-- Internal connections — many edges forming a knot -->
    <line x1="0" y1="0" x2="28" y2="-18" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="52" y2="2" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="0" y1="0" x2="10" y2="22" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="52" y1="2" x2="42" y2="24" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="10" y1="22" x2="42" y2="24" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="52" y2="2" stroke="#c0392b" stroke-width="1.1" opacity="0.35"/>
    <line x1="10" y1="22" x2="26" y2="6" stroke="#c0392b" stroke-width="1.3" opacity="0.5"/>
    <line x1="42" y1="24" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="42" y2="24" stroke="#2471a3" stroke-width="1.1" opacity="0.3"/>
    <line x1="52" y1="2" x2="26" y2="6" stroke="#c0392b" stroke-width="1.1" opacity="0.4"/>
    <!-- tick label -->
    <text x="26" y="50" text-anchor="middle" font-size="11" fill="#888" font-style="italic">tick 1</text>
  </g>

  <!-- Arrow from frame 1 to frame 2 -->
  <line x1="582" y1="142" x2="614" y2="152" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Frame 2 (tick 2) — identical knot, shifted right and slightly down -->
  <g transform="translate(622, 132)">
    <circle cx="0" cy="0" r="6" fill="#2471a3"/>
    <circle cx="28" cy="-18" r="6" fill="#c0392b"/>
    <circle cx="52" cy="2" r="6" fill="#2471a3"/>
    <circle cx="10" cy="22" r="6" fill="#c0392b"/>
    <circle cx="42" cy="24" r="6" fill="#2471a3"/>
    <circle cx="26" cy="6" r="5" fill="#c0392b"/>
    <line x1="0" y1="0" x2="28" y2="-18" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="52" y2="2" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="0" y1="0" x2="10" y2="22" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="52" y1="2" x2="42" y2="24" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="10" y1="22" x2="42" y2="24" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="52" y2="2" stroke="#c0392b" stroke-width="1.1" opacity="0.35"/>
    <line x1="10" y1="22" x2="26" y2="6" stroke="#c0392b" stroke-width="1.3" opacity="0.5"/>
    <line x1="42" y1="24" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="42" y2="24" stroke="#2471a3" stroke-width="1.1" opacity="0.3"/>
    <line x1="52" y1="2" x2="26" y2="6" stroke="#c0392b" stroke-width="1.1" opacity="0.4"/>
    <text x="26" y="50" text-anchor="middle" font-size="11" fill="#888" font-style="italic">tick 2</text>
  </g>

  <!-- Arrow from frame 2 to frame 3 -->
  <line x1="684" y1="159" x2="716" y2="169" stroke="#999" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Frame 3 (tick 3) — identical knot, shifted further right and down -->
  <g transform="translate(724, 149)">
    <circle cx="0" cy="0" r="6" fill="#2471a3"/>
    <circle cx="28" cy="-18" r="6" fill="#c0392b"/>
    <circle cx="52" cy="2" r="6" fill="#2471a3"/>
    <circle cx="10" cy="22" r="6" fill="#c0392b"/>
    <circle cx="42" cy="24" r="6" fill="#2471a3"/>
    <circle cx="26" cy="6" r="5" fill="#c0392b"/>
    <line x1="0" y1="0" x2="28" y2="-18" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="52" y2="2" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="0" y1="0" x2="10" y2="22" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="52" y1="2" x2="42" y2="24" stroke="#c0392b" stroke-width="1.3" opacity="0.55"/>
    <line x1="10" y1="22" x2="42" y2="24" stroke="#2471a3" stroke-width="1.3" opacity="0.55"/>
    <line x1="28" y1="-18" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="52" y2="2" stroke="#c0392b" stroke-width="1.1" opacity="0.35"/>
    <line x1="10" y1="22" x2="26" y2="6" stroke="#c0392b" stroke-width="1.3" opacity="0.5"/>
    <line x1="42" y1="24" x2="26" y2="6" stroke="#2471a3" stroke-width="1.3" opacity="0.5"/>
    <line x1="0" y1="0" x2="42" y2="24" stroke="#2471a3" stroke-width="1.1" opacity="0.3"/>
    <line x1="52" y1="2" x2="26" y2="6" stroke="#c0392b" stroke-width="1.1" opacity="0.4"/>
    <text x="26" y="50" text-anchor="middle" font-size="11" fill="#888" font-style="italic">tick 3</text>
  </g>

  <!-- Right panel description -->
  <text x="675" y="260" text-anchor="middle" font-size="12.5" fill="#555">Each tick: internal edges sum → same shape again.</text>
  <text x="675" y="292" text-anchor="middle" font-size="13" fill="#555">The knot persists. Some budget maintaining itself</text>
  <text x="675" y="312" text-anchor="middle" font-size="13.5" font-weight="700" fill="#c0392b">→ moves forward slower than C.</text>

  <!-- ===== BOTTOM SPANNING TEXT ===== -->
  <line x1="60" y1="370" x2="840" y2="370" stroke="#ddd" stroke-width="1"/>
  <text x="450" y="400" text-anchor="middle" font-size="15" font-weight="700" fill="#333">A photon is a straight line. A particle is a knot that keeps tying itself.</text>

</svg>
